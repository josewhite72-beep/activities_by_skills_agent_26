<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f2d4a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skills Agent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<title>Activities By Skills Agent · Generando actividades</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f2d4a;
  --navy-mid: #1a3f63;
  --teal: #00b896;
  --teal-light: #00d4ac;
  --amber: #f5a623;
  --coral: #ff6b6b;
  --purple: #7c3aed;
  --green: #059669;
  --cream: #faf8f3;
  --text: #1a1a2e;
  --text-muted: #5a6a7a;
  --surface: #ffffff;
  --border: #dde4ed;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(15,45,74,0.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-text-size-adjust: 100%; }
body {
  font-family: "DM Sans", sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* TOP BAR */
.topbar {
  background: var(--navy);
  color: white;
  padding: 14px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.25);
}
.topbar-brand { display: flex; align-items: center; gap: 10px; }
.logo-mark {
  width: 34px; height: 34px;
  background: var(--teal);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-family: "Syne", sans-serif;
  font-weight: 800; font-size: 15px; color: var(--navy);
}
.brand-text { font-family: "Syne", sans-serif; font-weight: 700; font-size: 17px; color: white; }
.brand-sub { font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 300; letter-spacing: 0.5px; }
.btn-back {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  padding: 7px 14px;
  border-radius: 8px;
  font-family: "Syne", sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
}

/* MAIN */
.main {
  flex: 1;
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
  padding: 20px 16px 100px;
}

/* CONTEXT BANNER */
.context-banner {
  background: var(--navy);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}
.ctx-chips { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
.ctx-chip {
  font-size: 11px; font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
}
.ctx-grade { background: rgba(0,184,150,0.25); color: var(--teal-light); }
.ctx-scenario { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
.ctx-theme { background: rgba(245,166,35,0.2); color: #fac862; }
.ctx-skill { background: rgba(124,58,237,0.25); color: #a78bfa; }
.ctx-cefr { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5); font-style: italic; }

/* SECTION HEADER */
.section-header { margin-bottom: 16px; }
.section-eyebrow {
  font-size: 10px; font-weight: 500; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--teal); margin-bottom: 4px;
}
.section-title {
  font-family: "Syne", sans-serif; font-size: 22px;
  font-weight: 700; color: var(--navy); letter-spacing: -0.5px;
}
.section-desc { font-size: 13px; color: var(--text-muted); margin-top: 5px; line-height: 1.5; }

/* SKILL TAB BAR */
.skill-tabs {
  display: flex; gap: 6px; margin-bottom: 20px;
  overflow-x: auto; scrollbar-width: none; padding-bottom: 2px;
}
.skill-tabs::-webkit-scrollbar { display: none; }
.skill-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-family: "Syne", sans-serif;
  font-size: 12px; font-weight: 600;
  color: var(--text-muted);
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}
.skill-tab.active {
  background: var(--navy); color: white; border-color: var(--navy);
}
.skill-tab.done {
  border-color: var(--teal);
  color: var(--teal);
}
.skill-tab.done .tab-dot { background: var(--teal); }
.tab-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--border);
}

/* LOADING STATE */
.loading-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 20px;
  text-align: center;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-label {
  font-family: "Syne", sans-serif;
  font-size: 14px; font-weight: 600; color: var(--navy);
  margin-bottom: 6px;
}
.loading-sub { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
.loading-steps {
  margin-top: 16px; text-align: left;
  display: flex; flex-direction: column; gap: 8px;
}
.loading-step {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 12px; color: var(--text-muted);
  background: #f8f9fa;
}
.loading-step.active {
  background: rgba(0,184,150,0.08);
  color: var(--navy); font-weight: 500;
}
.loading-step.done { color: var(--teal); }
.step-status { font-size: 14px; width: 20px; text-align: center; }

/* ACTIVITY CARDS */
.activity-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 14px;
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: fadeSlideIn 0.3s ease-out;
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.activity-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px;
}
.activity-num {
  width: 30px; height: 30px;
  border-radius: 9px;
  background: var(--navy);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-family: "Syne", sans-serif;
  font-size: 13px; font-weight: 700;
  flex-shrink: 0;
}
.activity-header-text { flex: 1; }
.activity-type-badge {
  font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 3px 8px; border-radius: 20px;
  margin-bottom: 4px; display: inline-block;
}
.activity-title {
  font-family: "Syne", sans-serif;
  font-size: 15px; font-weight: 700; color: var(--navy);
  line-height: 1.3;
}
.activity-body { padding: 16px; }
.activity-body p {
  font-size: 14px; color: var(--text);
  line-height: 1.65; margin-bottom: 10px;
}
.activity-body p:last-child { margin-bottom: 0; }
.activity-body strong { color: var(--navy); font-weight: 500; }
.activity-body ul, .activity-body ol {
  padding-left: 20px; margin: 8px 0 10px;
  display: flex; flex-direction: column; gap: 4px;
}
.activity-body li {
  font-size: 14px; color: var(--text); line-height: 1.5;
}
.activity-section-label {
  font-family: "Syne", sans-serif;
  font-size: 10px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-muted);
  margin: 14px 0 6px;
}
.activity-vocab {
  display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px;
}
.vocab-pill {
  font-size: 11px; padding: 3px 9px;
  background: rgba(15,45,74,0.07);
  border-radius: 20px; color: var(--navy);
  font-weight: 500;
}
.rubric-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px; margin-top: 6px;
  border-radius: 8px; overflow: hidden;
}
.rubric-table th {
  background: var(--navy); color: white;
  padding: 7px 10px; text-align: left;
  font-family: "Syne", sans-serif; font-weight: 600;
  font-size: 11px;
}
.rubric-table td {
  padding: 7px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: top; line-height: 1.4;
}
.rubric-table tr:last-child td { border-bottom: none; }
.rubric-table tr:nth-child(even) td { background: #f8fafd; }

/* SKILL COLOR CODING */
.skill-listening .activity-num { background: #0369a1; }
.skill-listening .activity-type-badge { background: rgba(3,105,161,0.1); color: #0369a1; }
.skill-speaking .activity-num { background: #7c3aed; }
.skill-speaking .activity-type-badge { background: rgba(124,58,237,0.1); color: #7c3aed; }
.skill-reading .activity-num { background: #059669; }
.skill-reading .activity-type-badge { background: rgba(5,150,105,0.1); color: #059669; }
.skill-writing .activity-num { background: #d97706; }
.skill-writing .activity-type-badge { background: rgba(217,119,6,0.1); color: #d97706; }
.skill-mediation .activity-num { background: #be185d; }
.skill-mediation .activity-type-badge { background: rgba(190,24,93,0.1); color: #be185d; }

/* BOTTOM BAR */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(250,248,243,0.96);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 12px 16px max(16px, env(safe-area-inset-bottom));
  box-shadow: 0 -1px 0 var(--border), 0 -8px 24px rgba(15,45,74,0.08);
  z-index: 50;
}
.bottom-row {
  max-width: 680px; margin: 0 auto;
  display: flex; gap: 10px;
}
.btn-export {
  flex: 1; padding: 14px 18px;
  border: none; border-radius: var(--radius);
  font-family: "Syne", sans-serif;
  font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-export:active { transform: scale(0.97); }
.btn-export-pdf {
  background: var(--navy); color: white;
}
.btn-export-doc {
  background: rgba(0,184,150,0.12);
  color: var(--teal);
  border: 1.5px solid rgba(0,184,150,0.3);
}
.btn-export:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.btn-export.ready { background: linear-gradient(135deg, var(--teal) 0%, #00a382 100%) !important; color: var(--navy) !important; box-shadow: 0 4px 20px rgba(0,184,150,0.35); }

/* REGENERATE */
.regen-row {
  max-width: 680px; margin: 0 auto 14px;
  display: flex; gap: 10px; justify-content: flex-end;
}
.btn-regen {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--surface);
  font-size: 12px; font-weight: 500;
  color: var(--text-muted);
  cursor: pointer; transition: all 0.2s;
}
.btn-regen:hover { border-color: var(--teal); color: var(--teal); }

/* ERROR */
.error-card {
  background: #fff5f5; border: 1.5px solid #fed7d7;
  border-radius: var(--radius); padding: 20px;
  margin-bottom: 16px; text-align: center;
}
.error-icon { font-size: 32px; margin-bottom: 10px; }
.error-title { font-family: "Syne", sans-serif; font-size: 15px; font-weight: 700; color: #c53030; margin-bottom: 6px; }
.error-msg { font-size: 13px; color: #744210; line-height: 1.5; }

/* STREAMING TEXT */
.streaming-text { display: inline; }
.cursor { display: inline-block; width: 2px; height: 14px; background: var(--teal); animation: blink 1s infinite; vertical-align: middle; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* API KEY PROMPT */
.apikey-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.apikey-title {
  font-family: "Syne", sans-serif; font-size: 18px; font-weight: 700; color: var(--navy);
  margin-bottom: 6px;
}
.apikey-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 16px; }
.apikey-input-wrap { position: relative; margin-bottom: 12px; }
.apikey-input-wrap input {
  width: 100%; padding: 12px 44px 12px 14px;
  border: 1.5px solid var(--border); border-radius: var(--radius);
  font-family: "DM Sans", sans-serif; font-size: 14px;
  outline: none; transition: border-color 0.2s;
  background: var(--surface); color: var(--text);
}
.apikey-input-wrap input:focus { border-color: var(--teal); }
.apikey-toggle {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  font-size: 18px; color: var(--text-muted);
}
.btn-start {
  width: 100%; padding: 14px;
  background: var(--navy); color: white; border: none;
  border-radius: var(--radius);
  font-family: "Syne", sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
}
.btn-start:active { transform: scale(0.98); }
.btn-start:disabled { opacity: 0.4; cursor: not-allowed; }
.apikey-note {
  font-size: 11px; color: var(--text-muted);
  margin-top: 10px; text-align: center; line-height: 1.5;
}
.apikey-note a { color: var(--teal); text-decoration: none; }

/* PRINT */
@media print {
  .topbar, .bottom-bar, .skill-tabs, .btn-regen, .regen-row,
  .context-banner, .section-header, .apikey-card { display: none !important; }
  .activity-card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
  body { background: white; }
}
</style>
</head>

<header class="topbar">
  <div class="topbar-brand">
    <div class="logo-mark">AG</div>
    <div>
      <div class="brand-text">Activities By Skills Agent</div>
      <div class="brand-sub">Desarrollado por José R. White · Panamá</div>
    </div>
  </div>
  <button class="btn-back" onclick="goBack()">← Formulario</button>
</header>

<main class="main" id="mainContent">
  <!-- RENDERED BY JS -->
</main>

<div class="bottom-bar" id="bottomBar" style="display:none;">
  <div class="bottom-row">
    <button class="btn-export btn-export-pdf" id="btnExportPage" onclick="window.location.href='export.html'" disabled style="background:var(--navy);color:white;font-size:14px;padding:15px;">

    </button>
    <div style="display:flex;gap:8px;">
      <button class="btn-export btn-export-pdf" id="btnPDF" onclick="exportPDF()" disabled style="flex:1;font-size:12px;padding:11px 8px;">

      </button>
      <button class="btn-export btn-export-doc" id="btnCopy" onclick="copyAll()" disabled style="flex:1;font-size:12px;padding:11px 8px;">
        📋 Copiar
      </button>
    </div>
  </div>
</div>

y is Monday.\").","Can respond to questions about time using basic words and phrases to indicate days (e.g., \"What is tomorrow?\" \"Tomorrow is Wednesday.\" or \"It's the weekend.\")."]},"reading":{"general":"Can recognize familiar words in simple texts.","specific":["Reading: Find familiar words in a text.","Reading: Identify one-step written directions with visual support.","Phonemic Awareness: Identify sounds of the letters of the alphabet when supported with a concrete item or picture representing that sound."],"learning_outcomes":["Can find and point to familiar words in simple texts (e.g., \"Monday,\" \"Tuesday\").","Can identify and follow one-step written directions with visual support (e.g., following the instruction, \"Point to the word 'Monday'\" in the sentence \"Today is Monday,\" supported by a calendar picture).","Can identify the sounds of the letters of the alphabet in familiar vocabulary related to days of the week and daily routines when supported with a concrete item or picture representing that sound (e.g., identifying the sound /w/ in \"Wednesday\" supported with a picture)."]},"writing":{"general":"Can write about oneself using simple words.","specific":["Productive: Write their own name and other very familiar words without assistance.","Interactive: Draw pictures related to a simple sentence they have written."],"learning_outcomes":["Can write their name and days of the week without assistance (e.g., \"Yamileth\" and \"Tuesday\").","Can write simple greetings on cards (e.g., \"Happy Monday!\").","Can draw pictures for sentences they have written (e.g., a greeting card for the sentence \"Happy Monday!\")."]},"mediation":{"general":"Can use mediation strategies such as gestures and body language to express basic ideas.","specific":["Text: Use pictures or objects to express ideas.","Concept: Use facial expressions and simple gestures to help explain feelings or needs."],"learning_outcomes":["Can use simple drawings or pictures to communicate days of the week to peers (e.g., drawing a picture of a calendar showing the days of the week).","Can use gestures and facial expressions to express basic ideas about days of the week to others (e.g., pointing to a picture representing a specific day).","Can clarify misunderstandings about days of the week using body language (e.g., pointing to the correct day on a calendar)."]}},"competences":{"linguistic":{"grammatical_features":["Noun + verb + noun (e.g., \"Today is Monday.\")","Present simple (e.g., \"It is the weekend.\")","WH-questions (e.g., \"What day is today?\")"],"vocabulary":["Nouns: Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday, weekend, day, week","Verbs: be (am, is, are)","Adverbs of time: today, tomorrow","Numbers: 1-20","Adjectives: relaxing, exciting, busy, quiet","Prepositions of time: on, before, after"],"pronunciation_phonemic_awareness":["Pronunciation: /w/ in \"weekend\" and /d/ in \"day\"","Phonemic awareness: Recognizing sounds of letters of the alphabet in familiar words related to days of the week and routines"]},"pragmatic":["Exchanging questions and answers: Exchanging questions and answers about the current day using simple phrases like \"Today is Monday.\"","Using time-related vocabulary: Identifying words for days and weekends by using or pointing to them"],"sociolinguistic":["Classroom schedules: Using polite expressions when talking about the days of the week and routines."]},"assessment":["Days of the Week Calendar","Day of the Week Song","Daily Schedule Chart"]},{"id":2,"title":"Nice Weather Today!","themes":["It's Sunny!","It's Raining."],"standards":{"listening":{"general":"Can identify sounds of familiar words and basic phrases spoken slowly and clearly.","specific":["Receptive: Follow very simple directions and instructions.","Interactive: Respond to simple conversations on familiar topics by using gestures or by pointing."],"learning_outcomes":["Can follow basic instructions related to weather (e.g., \"Look outside, it's sunny.\").","Can recognize weather-related words like \"sunny\" or \"raining\" in conversations.","Can respond to questions about the weather (e.g., \"What is the weather today?\")."]},"speaking":{"general":"Can use basic language and formulaic expressions to describe things and answer questions.","specific":["Productive: Use basic words or phrases to identify time words.","Interactive: Exchange simple questions and answers about the current day."],"learning_outcomes":["Can count weather features up to 20, with help (e.g., \"Let's count the clouds! One, two, three.\" \"Can you count all the raindrops?\").","Can answer simple questions about the weather, using one- or two-word responses (e.g., responding \"cold\" when asked, \"What is the weather today?\").","Can express simple feelings or reactions to weather using words and gestures (e.g., saying \"I'm hot.\" while fanning themselves or \"I'm cold.\" with a shivering gesture)."]},"reading":{"general":"Can recognize familiar words in simple texts.","specific":["Reading: Identify one-step written directions with visual support.","Reading: Match simple words to corresponding pictures.","Phonemic Awareness: Identify sounds of the letters of the alphabet when supported with a concrete item or picture representing that sound."],"learning_outcomes":["Can identify weather-related words in simple text instructions (e.g., matching \"sun\" to a picture of the sun).","Can match simple weather-related words to corresponding pictures (e.g., matching the word \"sunny\" to a picture of a sunny day).","Can identify sounds of the letters of the alphabet when supported with a concrete item or picture representing that sound in familiar words related to weather (e.g., identifying the sound of the letter /r/ in the word \"rainy\" when shown a picture of raindrops)."]},"writing":{"general":"Can write about oneself using simple words.","specific":["Productive: Fill in a form with their name and age with adult help.","Interactive: Write simple phrases with errors on a drawing or postcard."],"learning_outcomes":["Can write their name and simple phrases on a weather-related drawing (e.g., labeling a personal drawing of a sunny day with their name and a simple phrase describing the drawing).","Can write simple phrases related to the weather (e.g., \"It is sunny.\") with support.","Can label pictures of different weather conditions (e.g., drawing a cloud and writing \"cloudy\")."]},"mediation":{"general":"Can use mediation strategies such as gestures and body language to express basic ideas.","specific":["Text: Draw a single picture that represents a simple story or event.","Communication: Use gestures to show how to play a very simple game."],"learning_outcomes":["Can clarify or confirm understanding of weather by pointing to pictures or using simple words.","Can draw simple pictures representing the weather and label them with help.","Can use gestures or body language to describe weather (e.g., pretending to shiver when it's cold)."]}},"competences":{"linguistic":{"grammatical_features":["Present continuous (e.g., \"It is raining.\")","Subject + verb + adjective (e.g., \"It is sunny.\")","WH-questions (e.g., \"What is the weather today?\")"],"vocabulary":["Nouns: numbers 1-20, weather, sun, rain, clouds, wind, day, storm, snow","Verbs: rain, shine, blow, fall, clear up","Adjectives: sunny, rainy, cloudy, warm, cold, cool, clear, windy"],"pronunciation_phonemic_awareness":["Pronunciation: /s/ in \"sunny\" and /r/ in \"raining\"","Phonemic awareness: Initial sound of letter /w/ in the word \"weather\" and identification of sounds of letters of the alphabet in familiar vocabulary (e.g., /r/ in \"rainy\")"]},"pragmatic":["Talking about weather: Describe simple weather conditions (e.g., \"It is sunny.\") and describe simple reactions to weather (e.g., \"I'm cold.\" or \"I'm hot.\")","Asking questions about weather: Ask basic questions, such as \"What is the weather today?\" to learn about daily conditions"],"sociolinguistic":["Weather conversations: Engaging in simple weather-related conversations."]},"assessment":["Weather Wheel","Weather Journal","Weather Report Video"]},{"id":3,"title":"Colors in Our World","themes":["That's a Purple Flower.","It's an Orange Cat."],"standards":{"listening":{"general":"Can identify sounds of familiar words and basic phrases spoken slowly and clearly.","specific":["Receptive: Identify the topic of a conversation that involves familiar subjects.","Interactive: Respond to simple conversations on familiar topics by using gestures or by pointing."],"learning_outcomes":["Can show comprehension of age-appropriate numbers when paired with familiar objects (e.g., identifying \"three blue flowers\" by pointing to the correct group).","Can identify colors and objects when spoken about (e.g., \"blue bird\" or \"red flower\").","Can follow simple instructions related to colors and familiar objects by pointing or gesturing (e.g., \"Find the blue bird.\")."]},"speaking":{"general":"Can use basic language and formulaic expressions to describe things and answer questions.","specific":["Productive: Name primary and secondary colors.","Interactive: Express likes or dislikes using simple words and pointing."],"learning_outcomes":["Can describe objects using colors and simple sentences (e.g., \"That's a blue bird.\").","Can answer questions about colors and objects, using one or two-word responses (e.g., \"What color is it?\" \"Blue.\").","Can express likes and dislikes, using simple words and gestures (e.g., \"I like red.\")."]},"reading":{"general":"Can recognize familiar words in simple texts.","specific":["Reading: Identify pictures that show what happened in a simple story heard.","Reading: Identify simple words for very common symbols.","Phonemic Awareness: Identify sounds of the letters of the alphabet when supported with a concrete item or picture representing that sound."],"learning_outcomes":["Can listen to a simple story and identify corresponding pictures that illustrate key events (e.g., recognizing the picture of a blue bird mentioned in the story).","Can identify simple words for very common symbols, matching them to images (e.g., linking \"flower\" with its picture).","Can identify the initial sounds of letters of the alphabet in common objects and things (e.g., /f/ in \"fish,\" /b/ in \"bird,\" and /k/ in \"cat\")."]},"writing":{"general":"Can write about oneself using simple words.","specific":["Productive: Write numbers up to 10 with guidance.","Interactive: Write one-word answers to simple questions."],"learning_outcomes":["Can write numbers up to ten with teacher guidance to represent objects in drawings (e.g., drawing four flowers and writing \"4,\" drawing five stars, and writing \"5.\").","Can respond to simple questions about objects or colors by writing one-word answers with teacher support (e.g., \"What color is this?\" Write \"blue.\" \"What is this?\" Write \"cat.\").","Can use simple drawings to communicate about objects and add one-word descriptions (e.g., drawing a green leaf and writing \"leaf,\" drawing a red apple and writing \"apple\")."]},"mediation":{"general":"Can use mediation strategies such as gestures and body language to express basic ideas.","specific":["Text: Identify a few familiar words from a story by connecting them to prior knowledge.","Concept: Use a word and a gesture or drawing to describe a familiar object."],"learning_outcomes":["Can use simple drawings to communicate about objects (e.g., drawing a blue bird).","Can use gestures or point to objects to clarify their responses when describing colors.","Can describe objects and concepts from a story by connecting prior knowledge with supportive strategies, such as using words and gestures (e.g., saying \"bird\" while flapping arms)."]}},"competences":{"linguistic":{"grammatical_features":["Color + noun (e.g., \"blue bird\")","WH-questions (e.g., \"What color is it?\")","Present simple (e.g., \"It is an orange cat.\")"],"vocabulary":["Nouns: bird, flower, cat, tree, house, leaf, sky","Verbs: see, look, fly, sit, grow, count, be (is), color, show","Adjectives: blue, purple, orange, green, red, tall, small","Determiners/Pronouns: that, this","Quantifiers: two, three, four, many"],"pronunciation_phonemic_awareness":["Pronunciation: /l/ in \"blue\" and \"leaf\"","Phonemic awareness: Identifying initial sounds of letters of the alphabet in common objects and things (e.g., /f/ in \"fish,\" /b/ in \"bird,\" /k/ in \"cat\")"]},"pragmatic":["Recognizing colors and objects: Identify familiar objects by color (e.g., \"blue bird\" or \"red flower.\")","Describing with colors: Use simple color phrases in sentences (e.g., \"That is a red bird.\")","Counting and identifying colors of objects: Identify and count familiar objects while specifying their color (e.g., \"three blue birds\" or \"two red flowers\")"],"sociolinguistic":["Observing surroundings: Describing objects using color and shape while considering their cultural or personal significance."]},"assessment":["Color Nature Walk","Color Sorting Game","Color Collage"]},{"id":4,"title":"My Family and I","themes":["It's My Family!","She Is My Mom!"],"standards":{"listening":{"general":"Can identify sounds of familiar words and basic phrases spoken slowly and clearly.","specific":["Receptive: Show comprehension of basic expressions for greeting and leave-taking if supported by gestures.","Interactive: Answer simple questions about oneself, using gestures or formulaic expressions."],"learning_outcomes":["Can listen for and understand words related to greetings, leave-takings, and family members (e.g., \"hello,\" \"goodbye,\" \"mom,\" \"dad\").","Can follow instructions about family-related activities (e.g., \"Find a picture of your family.\").","Can respond to questions about family members, using gestures or single words (e.g., \"Who is he?\" \"Dad\")."]},"speaking":{"general":"Can use basic language and formulaic expressions to describe things and answer questions.","specific":["Productive: Locate objects and people, using words.","Interactive: Respond nonverbally to simple yes/no questions by nodding or shaking head."],"learning_outcomes":["Can identify family members, using simple sentences (e.g., \"She is my mom.\").","Can answer basic yes/no questions about family members, using nods, gestures, or simple words (e.g., \"Is she your mom?\").","Can participate in conversations about their family, using one-word responses (e.g., \"Who is she?\" \"Mom.\") or two-word responses (e.g., \"Who is she?\" \"My sister.\")."]},"reading":{"general":"Can recognize familiar words in simple texts.","specific":["Reading: Recognize when written, without visual support, not only their own name but also the names of classmates or family members.","Reading: Point to simple words in the text that identify objects or characters in a picture book.","Phonemic Awareness: Identify sounds of the letters of the alphabet when supported with a concrete item or picture representing that sound."],"learning_outcomes":["Can recognize family-related words, including own name, in written texts (e.g., \"mom,\" \"dad\").","Can match names of family members to pictures in books (e.g., matching the word \"father\" to a picture of a father in a family picture book).","Can identify sounds of the letters of the alphabet when supported with a concrete item or picture representing that sound (e.g., identifying the sound of the letter \"S\" in the word \"sister\" when shown a picture of a sister)."]},"writing":{"general":"Can write about oneself using simple words.","specific":["Productive: Write their own name and other very familiar words without assistance.","Interactive: Draw pictures related to a simple sentence they have written."],"learning_outcomes":["Can write other very familiar family-related words without assistance when labeling a family drawing (e.g., \"mom,\" \"dad\").","Can draw pictures related to simple sentences they have written about family members (e.g., drawing a picture of \"my mom\" to accompany the sentence, \"This is my mom.\").","Can write familiar family words on cards, without assistance."]},"mediation":{"general":"Can use mediation strategies such as gestures and body language to express basic ideas.","specific":["Text: Use pictures or objects to express ideas.","Communication: Use gestures and demonstrations to help classmates perform a simple task."],"learning_outcomes":["Can use pictures and gestures to describe their family to classmates (e.g., miming or displaying a drawing or picture of a family member).","Can clarify responses by pointing to family pictures or objects (e.g., pointing to a picture of their mother).","Can use simple gestures or facial expressions to show who they are talking about in their family (e.g., pointing to a family member's picture)."]}},"competences":{"linguistic":{"grammatical_features":["Personal pronouns + verb (e.g., \"I am\" \"She is\")","Possessive adjectives (e.g., \"my mom\")","WH-questions (e.g., \"Who is she/he?\")"],"vocabulary":["Nouns: family, mom, dad, brother, sister, aunt, uncle, cousin, grandmother, grandfather, pet, home","Verbs: be (is, are), love, live, play, visit, hug, help, talk, smile","Adjectives: old, young, friendly, tall, short","Personal pronouns: she, he","Possessive adjectives: my, your, his, her"],"pronunciation_phonemic_awareness":["Pronunciation: /m/ in \"mom\" and /d/ in \"dad\"","Phonemic awareness: Matching letter sounds to words, such as /b/ in \"brother\" and /s/ in \"sister\""]},"pragmatic":["Introducing family members: Use simple sentences to describe family (e.g., \"She is my mom.\")","Asking about family: Respond to basic questions about family members (e.g., \"Who is he?\" \"He is my brother.\")"],"sociolinguistic":["Describing Family Roles: Using appropriate language to describe family members and their roles (e.g., \"This is my mother.\")."]},"assessment":["Family Portrait","Family Member Interview","Digital Family Tree"]},{"id":5,"title":"Colors of Things that Go","themes":["That's a Blue Bus.","That's a Red Bike."],"standards":{"listening":{"general":"Can identify sounds of familiar words and basic phrases spoken slowly and clearly.","specific":["Receptive: Catch the main idea of a short, simple story or announcement with visual support or illustrations.","Interactive: Identify objects in the immediate environment in response to simple questions."],"learning_outcomes":["Can recognize colors and transportation-related words, such as \"car\" and \"bus,\" in simple announcements with visual aids (e.g., circling the picture of a \"red car\" when it is mentioned in a short visual announcement).","Can follow simple instructions related to transportation items as heard in simple stories (e.g., \"Find the green car.\").","Can respond to simple questions about transportation vehicles by pointing or naming them (e.g., \"What color is the car?\")."]},"speaking":{"general":"Can use basic language and formulaic expressions to describe things and answer questions.","specific":["Productive: Name common objects and people, including family members.","Interactive: Take part in very simple classroom games using one or two repeated lines."],"learning_outcomes":["Can name transportation vehicles using color words (e.g., \"That's a green car.\").","Can answer simple questions about transportation and colors using one or two words (e.g., \"What color is the car?\").","Can participate in classroom activities involving transportation vocabulary (e.g., \"naming vehicles\")."]},"reading":{"general":"Can recognize familiar words in simple texts.","specific":["Reading: Sequence pictures to demonstrate comprehension of texts that include a clear beginning, middle, and end.","Reading: Show comprehension of the main action or event in a very simple storybook with pictures.","Phonemic Awareness: Identify sounds of the letters of the alphabet when supported with a concrete item or picture representing that sound."],"learning_outcomes":["Can sequence pictures to show a clear beginning, middle, and end of the action in a simple story (e.g., \"Marta sees the red bus.\" \"The red bus stops.\" \"People exit the bus.\").","Can show comprehension of the main action or event in a simple storybook by pointing to pictures (e.g., pointing to the bus in response to the question, \"How does Marta go to school?\").","Can identify sounds of the letters of the alphabet when supported with a concrete item or picture representing that sound (e.g., identifying the sound /y/ in the word \"yellow\" when shown a picture of a yellow taxi)."]},"writing":{"general":"Can write about oneself using simple words.","specific":["Productive: Fill in a form with their name and age with adult help.","Interactive: Write very simple sentences with assistance, even if errors are present."],"learning_outcomes":["Can complete a simple form with teacher assistance, filling in details about transportation items (e.g., writing \"red\" for the color of a bus).","Can write simple words independently to label transportation items on drawings (e.g., \"bus,\" \"car\").","Can write very simple sentences with assistance, even if errors are present (e.g., \"This is a green car.\")."]},"mediation":{"general":"Can use mediation strategies such as gestures and body language to express basic ideas.","specific":["Text: Draw a single picture that represents a simple story or event.","Communication: Lead a simple classroom activity like a lineup or cleanup using gestures and basic words."],"learning_outcomes":["Can use gestures or drawings to describe transportation vehicles in the classroom (e.g., drawing a picture of a car or miming the act of driving a car to describe the word \"car\").","Can clarify responses by pointing to pictures of transportation vehicles when needed (e.g., pointing to a picture of a car).","Can use basic words and body language to explain how transportation vehicles are used during classroom activities (e.g., pretending to drive by moving hands like holding a steering wheel)."]}},"competences":{"linguistic":{"grammatical_features":["Color + noun (e.g., \"green car\")","WH-questions (e.g., \"What color is the car?\")","Present simple (e.g., \"It is a red bike.\")"],"vocabulary":["Nouns: car, bus, bike, truck, train, taxi","Verbs: drive, ride, see, go, stop, be (is)","Adjectives: green, blue, red, yellow, purple, blue, red, orange, small, big, old, new","Demonstratives: this, that","Preposition of place: on"],"pronunciation_phonemic_awareness":["Pronunciation: /k/ in \"car\" and /b/ in \"bus\"","Phonemic awareness: Initial sound at the beginning of vehicle-related vocabulary (e.g., /k/ in \"car\") and identification of sounds of letters of the alphabet in familiar vocabulary (e.g., /y/ in \"yellow\")"]},"pragmatic":["Describing objects: When describing colors in transportation, use phrases that describe vehicles, like \"It is a red bike.\" \"That is a green car.\" or \"It's a blue bus.\"","Answering questions about colors and objects: Respond with one-word answers or gestures for vehicles and colors (e.g., \"Point to the blue bus.\")"],"sociolinguistic":["Norms of politeness for making requests: Using culturally appropriate norms of politeness in communication when describing transportation (e.g., \"Please, point to the blue car.\")."]},"assessment":["Vehicle Color Matching","Vehicle Drawing Game","Transportation Chart"]},{"id":6,"title":"Shapes Around Us","themes":["I See a Rectangle.","That Is a Circle."],"standards":{"listening":{"general":"Can identify sounds of familiar words and basic phrases spoken slowly and clearly.","specific":["Receptive: Recognize simple classroom instructions spoken slowly and clearly.","Interactive: Respond to simple conversations on familiar topics by using gestures or by pointing."],"learning_outcomes":["Can follow simple classroom instructions about shapes using gestures or actions (e.g., \"Point to the square.\" \"Find the triangle.\").","Can point to and name shapes during activities when prompted (e.g., \"What is this?\" Student points to a circle and says, \"circle\").","Can respond to very simple shape-related commands by pointing (e.g., pointing to the circle in response to a command)."]},"speaking":{"general":"Can use basic language and formulaic expressions to describe things and answer questions.","specific":["Productive: Name common classroom objects and familiar people.","Interactive: Engage with very simple classroom commands."],"learning_outcomes":["Can identify and name common shapes and colors in daily classroom routines with teacher guidance (e.g., \"This is a circle.\" \"It is blue.\").","Can use simple greetings and farewells in a storytelling activity involving shapes and colors (e.g., \"Hello, red circle!\" \"Goodbye, blue square!\").","Can point to and name familiar classroom shapes and colors during activities with teacher prompts (e.g., pointing to a shape when prompted, \"Show me the triangle.\")."]},"reading":{"general":"Can recognize familiar words in simple texts.","specific":["Reading: Recognize familiar words in simple texts.","Reading: Match simple words to corresponding pictures.","Phonemic Awareness: Identify sounds of the letters of the alphabet when supported with a concrete item or picture representing that sound."],"learning_outcomes":["Can point to pictures of shapes when prompted during reading activities (e.g., pointing to a picture of a triangle in a storybook when asked, \"What is this shape?\").","Can match simple shape-related words to pictures (e.g., \"square,\" \"circle\").","Can produce the sound of the alphabet letters when supported by a concrete item or picture representing the sound (e.g., /s/ in \"square\")."]},"writing":{"general":"Can write about oneself using simple words.","specific":["Productive: Write numbers up to ten with guidance.","Interactive: Write one-word answers to simple questions."],"learning_outcomes":["Can write numbers and shape-related words with teacher guidance (e.g., counting the number of squares in a picture and writing the number and the shape's name below the picture).","Can label pictures of shapes with simple words like \"square\" or \"circle.\"","Can write simple one-word answers to questions about shapes with support (e.g., writing the word \"circle\" in response to the question, \"What shape is this?\")."]},"mediation":{"general":"Can use mediation strategies such as gestures and body language to express basic ideas.","specific":["Communication: Use gestures and demonstrations to help classmates perform a simple task.","Concept: Use a word and a gesture or drawing to describe a familiar object."],"learning_outcomes":["Can use gestures and simple words to describe shapes to classmates (e.g., using hands to represent the shape of a circle).","Can use a combination of drawings and words to clarify their responses about shapes (e.g., drawing the shape of a triangle and writing the word next to it).","Can describe shapes using body language and pointing during classroom activities (e.g., miming a square shape by using the arms to create straight lines)."]}},"competences":{"linguistic":{"grammatical_features":["Shape + noun (e.g., \"a square table\")","WH-questions (e.g., \"What shape is it?\")","Present simple (e.g., \"That is a circle.\")"],"vocabulary":["Nouns: square, rectangle, circle, triangle, oval, diamond, star","Personal pronoun: it","Verbs: see, look, draw, find, be (is)","Adjectives: round, square, tall, long, short, big, small","Demonstratives: this, that"],"pronunciation_phonemic_awareness":["Pronunciation: /s/ in \"square\" and /r/ in \"rectangle\"","Phonemic awareness: Shape names, initial sounds in names of shapes (e.g., /s/ in \"square\")"]},"pragmatic":["Identifying shapes: Recognize and name shapes like squares and circles during classroom activities","Describing shapes: Use simple phrases to talk about shapes (e.g., \"This is a rectangle.\")"],"sociolinguistic":["Shape and color recognition: Describing characteristics of objects around using the names of shapes and colors (e.g., \"The sun is yellow.\")."]},"assessment":["Shape Collage","Shape Sorting Activity","Digital Shape Game"]},{"id":7,"title":"Shapes on Our Plates","themes":["It's a Square Cracker.","It's a Round Orange."],"standards":{"listening":{"general":"Can identify sounds of familiar words and basic phrases spoken slowly and clearly.","specific":["Receptive: Recognize familiar words and basic phrases.","Interactive: Identify objects in the immediate environment in response to simple questions."],"learning_outcomes":["Can recognize simple sentences about food shapes (e.g., \"Oranges are round.\").","Can follow basic instructions involving food shapes (e.g., \"Find the round apple.\").","Can respond to questions about food shapes using words or gestures (e.g., \"What shape is the cracker?\" \"A square.\")."]},"speaking":{"general":"Can use basic language and formulaic expressions to describe things and answer questions.","specific":["Productive: Name primary and secondary colors.","Interactive: Answer questions using simple words."],"learning_outcomes":["Can identify and name primary and secondary colors when describing the color and shape of food items (e.g., \"This is a red apple.\" \"The brown cracker is square.\").","Can answer simple questions about both colors and shapes using one or two words (e.g., \"What shape is the orange?\" \"It's round.\" or \"What color is the cracker?\" \"It's brown.\").","Can use gestures to support responses about colors and shapes of food items (e.g., pointing to a round object when asked to find a shape or indicating a green fruit)."]},"reading":{"general":"Can recognize familiar words in simple texts.","specific":["Reading: Recognize familiar words in simple texts.","Reading: Identify simple words for very common symbols.","Phonemic Awareness: Identify sounds of the letters of the alphabet when supported with a concrete item or picture representing that sound."],"learning_outcomes":["Can point to and name familiar food and shape-related words in simple texts (e.g., recognizing the word \"apple\" in the sentence, \"The apple is round.\").","Can identify simple words related to shapes (e.g., pointing to a cracker and saying \"square\").","Can recognize sounds of letters related to the names of food items when supported with visuals (e.g., identifying the /ɔ/ sound in \"orange\" along with the letter O when shown a round orange, or the /b/ sound in \"banana\" when shown its crescent shape)."]},"writing":{"general":"Can write about oneself using simple words.","specific":["Productive: Label common items using a model to copy from.","Interactive: Write simple phrases with errors on a drawing or postcard."],"learning_outcomes":["Can label food items in drawings with simple words (e.g., writing \"round\" under a picture of an orange).","Can write simple phrases with guidance, describing food shapes (e.g., \"This is a square cracker.\").","Can copy simple sentences about food shapes with teacher support (e.g., copying the word \"juice box\" under a picture of juice box with the teacher's support)."]},"mediation":{"general":"Can use mediation strategies such as gestures and body language to express basic ideas.","specific":["Text: Use pictures or objects to express ideas.","Concept: Use facial expressions and simple gestures to help explain feelings or needs."],"learning_outcomes":["Can use gestures or body language to describe food items (e.g., pretending to hold a round apple).","Can clarify responses using pictures or pointing to food-related visuals (e.g., showing the picture of a cracker to clarify its meaning).","Can use facial expressions and gestures to help describe food preferences and shapes (e.g., pretending to take a bite of an apple and using the hands to show that it is round)."]}},"competences":{"linguistic":{"grammatical_features":["Adjective + noun (e.g., \"round apple\")","WH-questions (e.g., \"What shape is it?\")","Present simple (e.g., \"Oranges are round.\")"],"vocabulary":["Nouns: pineapple, lemon, lime, mango, papaya, cracker, banana, food, juice box, snack, meal","Verbs: eat, cut, hold, see, mix","Adjectives: round, square, oval, big, small, healthy, tasty, orange, black, brown, white","Demonstratives: this, that"],"pronunciation_phonemic_awareness":["Pronunciation: /r/ in \"round\" and /k/ in \"cracker\"","Phonemic awareness: Recognizing sounds of letters of the alphabet in names of shapes and foods (e.g., /æ/ in \"apple\")"]},"pragmatic":["Identifying food shapes: Identifying and describing foods by shape (e.g., \"The cracker is square.\").","Asking about shapes in food: Engage in simple questions about food items (e.g., \"What shape is the apple?\")"],"sociolinguistic":["Describing food: Using simple words to describe the colors and shapes of fruits and other foods, such as \"orange\" and \"cracker.\"."]},"assessment":["Food Shape Match","Food Shape Sorting","Digital Food Shape Chart"]},{"id":8,"title":"It's Our Garden.","themes":["The Pink Flowers!","A Tall Tree!"],"standards":{"listening":{"general":"Can identify sounds of familiar words and basic phrases spoken slowly and clearly.","specific":["Receptive: Catch the main idea of a short, simple story or announcement with visual support or illustrations.","Interactive: Respond to simple conversations on familiar topics by using gestures or by pointing."],"learning_outcomes":["Can recognize nature-related words like \"tree,\" \"flowers,\" and \"bushes\" in simple conversations or stories (e.g., \"The tree is tall.\" \"The flowers are pink.\").","Can follow basic instructions related to outdoor environments in conversations (e.g., \"Look at the tall tree.\").","Can respond to questions about nature by pointing or using gestures (e.g., pointing to a tree in response to the question \"Do you see a tree?\" or \"Can you point to the tree?\")."]},"speaking":{"general":"Can use basic language and formulaic expressions to describe things and answer questions.","specific":["Productive: Name primary and secondary colors.","Interactive: Express likes or dislikes using simple words and pointing."],"learning_outcomes":["Can identify and name colors of familiar nature objects (e.g., \"green trees,\" \"pink flowers,\" or \"yellow leaves\").","Can respond to simple questions about nature with words or gestures (e.g., \"What is this?\" Student points and says, \"tree.\").","Can express likes or dislikes about nature-related objects using simple words and pointing (e.g., \"I like trees\" while pointing to a tree)."]},"reading":{"general":"Can recognize familiar words in simple texts.","specific":["Reading: Match simple words to corresponding pictures.","Reading: Identify simple words for very common symbols.","Phonemic Awareness: Identify sounds of the letters of the alphabet when supported with a concrete item or picture representing that sound."],"learning_outcomes":["Can match nature-related words with primary or secondary colors to corresponding pictures (e.g., \"pink flowers,\" \"green tree,\" \"yellow leaves\").","Can recognize written words for nature symbols when supported by pictures (e.g., leaves, seeds).","Can recognize sounds of letters related to nature-related vocabulary when supported with visuals (e.g., identifying the /s/ sound in \"sun\" when shown a picture of the sun or the /t/ sound in \"tree\" when shown an image of a tree)."]},"writing":{"general":"Can write about oneself using simple words.","specific":["Productive: Write simple greetings on cards.","Interactive: Write very simple sentences with assistance, even if errors are present."],"learning_outcomes":["Can write simple greetings or nature-related phrases on cards (e.g., \"Happy garden day!\").","Can write simple sentences about the garden or nature with teacher support (e.g., \"This is a tall tree\").","Can label pictures of plant es when spoken slowly and clearly.","specific":["Receptive: Identify specific information in descriptions and narratives.","Interactive: Engage in discussions about personal and school experiences based on texts heard."],"learning_outcomes":["Can identify details from spoken narratives about animal habitats (e.g., \"Which animal is faster, the jaguar or the deer?\" \"The deer is faster.\").","Can listen to descriptions of wildlife and respond to questions (e.g., \"What animals live in Panama?\").","Can listen to descriptions of personal and school experiences involving animals and engage in discussions by sharing opinions and asking follow-up questions (e.g., \"During our school trip, we saw a sloth hanging from a tree.\" \"What did you see during the trip?\")."]},"reading":{"general":"Can engage in intensive and extensive reading of short texts to extract information and details.","specific":["Reading: Interpret charts, graphs, and diagrams.","Reading: Respond to questions based on class readings.","Phonemic Awareness: Demonstrate knowledge of phonemic awareness by applying knowledge of basic syllabification rules when decoding two-syllable or three-syllable or compound words."],"learning_outcomes":["Can interpret a chart showing the habitats of local animals and describe key information (e.g., \"This chart shows that jaguars live in Darién National Park and are considered endangered. They need large forested areas to survive.\").","Can respond to questions based on readings about wildlife (e.g., \"What do sloths eat?\").","Can recognize common compound words and segment them accurately into syllables (e.g., \"wildlife\" into \"wild-life\")."]},"speaking":{"general":"Can describe basic information in simple discussions with peers.","specific":["Productive: Explain how to play a common game.","Interactive: Exchange simple ideas about current events in group discussions."],"learning_outcomes":["Can explain the rules of a typical game related to wildlife or nature themes (e.g., \"I will describe the animal. You guess.\").","Can describe and ask questions about current changes in animal behavior in a group discussion (e.g., \"Jaguars now hunt closer to rivers because the prey moves there to find water.\").","Can exchange ideas about current news related to wildlife or habitats in a group discussion (e.g., \"There is news about volunteers protecting sea turtle nests in Veraguas.\")."]},"writing":{"general":"Can compose short, purpose-driven texts, such as summaries, descriptive paragraphs, and project reports, demonstrating growing independence in structure and clarity.","specific":["Productive: Write instructions for a simple game or craft.","Interactive: Write simple comments on a peer's short text."],"learning_outcomes":["Can write instructions for a wildlife guessing game (e.g., \"Choose an animal card and describe its habitat.\").","Can provide steps for a nature craft related to animals (e.g., \"Cut out shapes to make a sloth.\").","Can write supportive comments on a peer's description of wildlife (e.g., \"I like your information about the jaguar.\")."]},"mediation":{"general":"Can facilitate communication with peers through simplified language, clarification, aiding understanding in group interactions, and interpretation of cultural differences in communication.","specific":["Text: Contextualize basic classroom instructions supported with visual aids.","Communication: Facilitate discussions on classroom rules."],"learning_outcomes":["Can contextualize classroom instructions using visual aids (e.g., shows a picture of a jaguar for the instruction, \"Choose your favorite animal.\").","Can facilitate a discussion on classroom rules by using simple gestures (e.g., making a \"quiet\" gesture for \"no talking\").","Can support instructions with visual aids to help peers understand (e.g., points to a picture and says, \"This is the jaguar's habitat. You have to write about it.\")."]}},"competences":{"linguistic":{"grammar":["Comparative and superlative adjectives (e.g., \"The harpy eagle is stronger than the hawk.\" \"What bird is the fastest in Panama?\" \"The peregrine falcon is the fastest.\").","There is/there are to describe habitats (e.g., \"There are many endangered animals in Panama.\")","Present simple to describe habits (e.g., \"The sloth moves slowly.\")"],"vocabulary":{"nouns":"habitat, wildlife, jaguar, forest, predator, prey, species, adaptation, jungle, biodiversity","verbs":"protect, live, grow, hunt, survive, adapt, migrate, observe, conserve","adjectives":"endangered, nocturnal, wild, diverse, camouflaged, resilient","demonstratives":"this, that","prepositions":"in, on","adverbs":"naturally, here, there, quickly"},"pronunciation":"Practice syllable division in compound nouns (e.g., \"wildlife\" into \"wild-life\")."},"pragmatic":["Discussing habitats: \"Jaguars live in the forest.\"","Using comparatives: \"The eagle is larger than the parrot.\""],"sociolinguistic":"Facilitate group discussions about environmental topics and follow instructions in collaborative activities (e.g., \"Cut out shapes to make a sloth.\")."},"assessment":["[{'id': 'grade7_scenario2_project1', 'name': 'Wildlife Documentary Storyboard', 'category': 'Video Creation', 'overview': 'Students create a mini wildlife documentary storyboard, using present simple, comparative, and superlative adjectives to describe Panama\\'s animals (e.g., \"The sloth hangs from a branch, and the jaguar hides behind some trees.\" \"The jaguar is faster than the sloth.\").', 'skills': ['Observation: Describing wildlife using comparatives and habitat-related language.', 'Research: Presenting factual information visually and orally.'], 'technology': ['Use video editing software for documentaries, virtual tour tools, and infographic creation software.']}, {'id': 'grade7_scenario2_project2', 'name': 'Wildlife Habitat Tour Map', 'category': 'Digital Design', 'overview': 'Students design a tour map of a local wildlife habitat, using \"there is\" or \"there are\" to describe the environment.', 'skills': ['Observation: Describing wildlife using comparatives and habitat-related language.', 'Research: Presenting factual information visually and orally.'], 'technology': ['Use video editing software for documentaries, virtual tour tools, and infographic creation software.']}, {'id': 'grade7_scenario2_project3', 'name': 'Animal Adaptation Infographic', 'category': 'Research & Presentation', 'overview': 'Students research animals, their habitats, and unique characteristics to create an infographic explaining how animals survive in their habitat using comparative forms (e.g., \"The harpy eagle is stronger than most birds.\").', 'skills': ['Observation: Describing wildlife using comparatives and habitat-related language.', 'Research: Presenting factual information visually and orally.'], 'technology': ['Use video editing software for documentaries, virtual tour tools, and infographic creation software.']}]"]},{"id":3,"title":"Legends of Panama","themes":["My Favorite Legend","Once upon a Time…"],"standards":{"listening":{"general":"Can extract both the main ideas and specific details in information heard from descriptions and narratives when spoken slowly and clearly.","specific":["Receptive: Identify main ideas and supporting details in spoken texts.","Interactive: Ensure mutual understanding in group interactions through clarification and confirmation."],"learning_outcomes":["Can identify key elements in spoken legends (e.g., \"Who is the hero in the story?\").","Can clarify and respond to questions about the order of events to support group interactions (e.g., \"What happened first?\").","Can summarize a story's events during discussions (e.g., \"The hero saved the village.\")."]},"reading":{"general":"Can engage in intensive and extensive reading of short texts to extract information and details.","specific":["Reading: Show comprehension of the main plot and characters in short stories.","Reading: Extract key facts and details from informational texts.","Phonemic Awareness: Demonstrate knowledge of phonemic awareness by reading base words and inflectional endings (-s, -es, -ed, -ing)."],"learning_outcomes":["Can show comprehension of the main plot and characters of simple legends (e.g., \"The hero was fighting the monster when the village was attacked.\").","Can extract key facts from texts about Panamanian legends (e.g., \"The legend of La India Dormida takes place in El Valle de Antón.\").","Can read words with past tense (-ed) /t/, /d/, or /ɪd/ and recognize their pronunciation (e.g., emphasis goes in the pronunciation of /ɪd/ in \"waited\" in the sentence, \"The villagers waited for the hero.\")."]},"speaking":{"general":"Can describe basic information in simple discussions with peers.","specific":["Productive: Present their views on simple issues.","Interactive: Respond to classmates' presentations."],"learning_outcomes":["Can present views on topics within the legend (e.g., \"The hero was brave because he helped others.\").","Can respond to classmates' ideas about Panamanian legends and ask follow-up questions (e.g., \"I agree with you. La Tulivieja was terrifying. What would you have done if you had heard her crying by the river at night?\").","Can describe short stories or legends to peers (e.g., \"There once was a clever rabbit.\")."]},"writing":{"general":"Can compose short, purpose-driven texts, such as summaries, descriptive paragraphs, and project reports, demonstrating growing independence in structure and clarity.","specific":["Productive: Create a short narrative based on a picture.","Interactive: Collaborate on a group project report."],"learning_outcomes":["Can write a short narrative inspired by a picture of a Panamanian legend (e.g., \"Once upon a time, La India Dormida watched over the valley. After the battle, the villagers remembered her sacrifice.\").","Can share ideas for a group project on legends in Panama (e.g., \"Let's include the legend of El Gallo Vicente.\").","Can contribute sentences for a group report on a Panamanian legend (e.g., \"Our report is about the legend of La India Dormida.\")."]},"mediation":{"general":"Can facilitate communication with peers through simplified language, clarification, aiding understanding in group interactions, and interpretation of cultural differences in communication.","specific":["Text: Summarize a classmate's presentation for a teacher.","Communication: Assist in resolving misunderstandings among peers."],"learning_outcomes":["Can summarize a classmate's presentation for the teacher, using key points (e.g., \"He told a story about a hero who was fighting a monster.\").","Can assist in resolving misunderstandings among peers by using simple gestures (e.g., says, \"The hero is brave.\" and shows a strong pose).","Can help clarify for peers the main idea of a legend (e.g., says, \"This story is about bravery.\" and gives a thumbs-up)."]}},"competences":{"linguistic":{"grammar":["Past continuous (e.g., was fighting)","Adverbs of time (e.g., yesterday, last month, last week)","Past simple to narrate events (e.g., celebrated, ended)"],"vocabulary":{"nouns":"legend, monster, hero, treasure, story, village, town, myth, dialogue, creature, ghost, witch, spirit, river, mountain","verbs":"fight, save, rescue, defend, explore, encounter, narrate, venture, appear, disappear, transform, follow","adjectives":"brave, strong, old, ancient, hidden, exciting, mysterious, kind, evil","adverbs":"bravely, mysteriously, silently, loudly, often, at night","sequencers":"once upon a time, after, before, during","time_markers":"suddenly, one day, long ago, in the end"},"pronunciation":"Read words with past tense -ed, /t/, /d/, or /ɪd/, and recognize their pronunciation (e.g., (/ɪd/) in, \"The villagers waited for the king.\")"},"pragmatic":["Telling a story: \"Once upon a time, the hero saved the village.\"","Sequencing events: \"First, the hero saw the witch. Then, he fought with her.\""],"sociolinguistic":"Clarify details in group discussions and present short stories or legends to peers (e.g., \"The man was fighting the monster when the village was attacked.\")."},"assessment":["[{'id': 'grade7_scenario3_project1', 'name': 'Comic Strip Panamanian Legend', 'category': 'Creative Writing', 'overview': 'Students create a comic strip-style version of a Panamanian legend, using past simple and past continuous to narrate events (e.g., \"Whenever the hero fought the monster, the river rose.\").', 'skills': ['Storytelling: Using narrative style to describe events.', 'Creativity: Bringing legends to life through animation, digital books, or audio formats.'], 'technology': ['Use animation software, digital storybook tools, and podcast recording/editing tools.']}, {'id': 'grade7_scenario3_project2', 'name': 'Legendary Storybook', 'category': 'Digital Design', 'overview': 'Students design a storybook of their favorite Panamanian legend, using adverbs of sequence (e.g., \"First, the man was walking; then, he saw the monster\").', 'skills': ['Storytelling: Using narrative style to describe events.', 'Creativity: Bringing legends to life through animation, digital books, or audio formats.'], 'technology': ['Use animation software, digital storybook tools, and podcast recording/editing tools.']}, {'id': 'grade7_scenario3_project3', 'name': 'Storytelling Role Play Video', 'category': 'Video Creation', 'overview': 'Students write a role-play about their favorite legend. Then, they work together in groups to perform and record a video of the role-play, using the past simple and the past continuous to tell the story and include effects for a dramatic impact.', 'skills': ['Storytelling: Using narrative style to describe events.', 'Creativity: Bringing legends to life through animation, digital books, or audio formats.'], 'technology': ['Use animation software, digital storybook tools, and podcast recording/editing tools.']}]"]},{"id":4,"title":"The Importance of Water","themes":["How We Use Water Everyday","Clean Water Is Important Because…"],"standards":{"listening":{"general":"Can extract both the main ideas and specific details in information heard from descriptions and narratives when spoken slowly and clearly.","specific":["Receptive: Comprehend multi-step instructions for academic tasks.","Interactive: Respond to questions and requests in a school setting."],"learning_outcomes":["Can follow multi-step instructions about water usage in a school setting (e.g., \"Please turn off the tap.\").","Can respond to questions about water conservation (e.g., \"Why is it important to save water?\" \"If we don't save water, we will face water shortages.\").","Can identify details from a spoken explanation of the importance of water (e.g., \"What do we use water for?\" \"For cooking, drinking, and agriculture.\")."]},"reading":{"general":"Can engage in intensive and extensive reading of short texts to extract information and details.","specific":["Reading: Follow instructions for academic tasks or projects.","Reading: Extract key facts and details from informational texts.","Phonemic Awareness: Demonstrate knowledge of phonemic awareness by applying knowledge of basic syllabification rules when decoding two-syllable, three-syllable, or compound words."],"learning_outcomes":["Can follow instructions related to water conservation (e.g., \"We need to save water every day.\").","Can extract key details from texts about the importance of water (e.g., \"If we don't keep water clean, people will get sick. Clean water is important for health.\").","Can demonstrate phonemic awareness by applying basic syllabification rules when decoding two-syllable, three-syllable, or compound words (e.g., \"forecast,\" \"important\")."]},"speaking":{"general":"Can describe basic information in simple discussions with peers.","specific":["Interactive: Discuss personal future plans.","Productive: Develop simple arguments based on texts studied."],"learning_outcomes":["Can discuss personal future plans to help save water (e.g., \"I will use clean water for cooking.\").","Can develop simple arguments about the importance of water conservation (e.g., \"Water is an important resource in Panama. If we protect our rivers and streams, we will have fresh water for a longer time.\").","Can express ideas about water-related projects in class discussions (e.g., \"Our ideas to save water are: 1. Turn off the tap. 2. Collect rainwater...\")."]},"writing":{"general":"Can compose short, purpose-driven texts, such as summaries, descriptive paragraphs, and project reports, demonstrating growing independence in structure and clarity.","specific":["Productive: Summarize a short story or text.","Interactive: Participate in collaborative story-writing with peers."],"learning_outcomes":["Can summarize the main points of a text on water importance (e.g., \"Water is essential for people's health and plants because it helps them grow and stay alive.\").","Can contribute sentences in a collaborative story about water conservation (e.g., \"The family saved water every day.\").","Can collaborate in a group to write ideas on water usage and conservation (e.g., \"We use water for cooking and cleaning.\")."]},"mediation":{"general":"Can facilitate communication with peers through simplified language, clarification, aiding understanding in group interactions, and interpretation of cultural differences in communication.","specific":["Concept: Guide peers through setting up a classroom activity.","Concept: Assist in explaining the rules of a classroom game."],"learning_outcomes":["Can guide peers through setting up a classroom activity about water conservation (e.g., \"First, place the poster about saving water on the wall. Then, arrange the chairs for the group discussion.\").","Can assist in explaining the rules of a classroom game focused on water usage (e.g., \"In this game, you have to match pictures of water-saving actions with their descriptions. The team with the most matches wins.\").","Can help classmates understand steps for a science experiment on water filtration (e.g., \"First, pour the dirty water into the filter. Then, watch how the clean water comes out from the bottom.\")."]}},"competences":{"linguistic":{"grammar":["First conditional (e.g., \"If we don't save water, we will face water shortages.\")","For + verb + ing to express the purpose of an action (e.g., \"We use water for drinking, cooking, and cleaning.\")","Subject + verb + complement + because + cause (e.g., \"We save water because it is a limited resource.\")"],"vocabulary":{"nouns":"water, resource, forecast, cloud, flood, drought, shortage, tap, filter, sanitation, rainwater, drop, filtration","verbs":"save, drink, waste, conserve, rise, fall, turn off, use, leak, collect, limit, purify","adjectives":"potable, clear, essential, humid, limited, important, polluted, available, drinkable","prepositions":"over, from, without, for, in, through","adverbs":"daily, carefully, wisely, slowly, completely","quantifiers":"some, a lot of","conjunction":"because"},"pronunciation":"Use of basic syllabification rules when decoding two-syllable, three-syllable, or compound words (e.g., \"forecast\" and \"important\")"},"pragmatic":["Expressing cause-effect: \"If we waste water, there will be less for everyone.\"","Expressing the purpose of an action: \"We use water for cooking and drinking.\""],"sociolinguistic":"In classroom group discussions, discuss and propose solutions to environmental issues such as water conservation (e.g., \"We could save water by turning off taps while washing hands.\")."},"assessment":["[{'id': 'grade7_scenario4_project1', 'name': 'Water Conservation Public Service Announcement (PSA)', 'category': 'Video Creation', 'overview': 'Students create a public service announcement about water conservation, using the first conditional to explain consequences (e.g., \"If we don\\'t save water, we will run out.\").', 'skills': [
