["Can distinguish between key facts and minor details in spoken narratives about the town (e.g., \"The town square has a fountain.\").","Can follow spoken directions to locate places on a map (e.g., \"Where is the library?\").","Can adapt to changes in group discussions about map directions by clarifying and confirming details with peers (e.g., \"I thought the library was next to the school. Can you show me again on the map?\")."]},"reading":{"general":"Can engage in intensive and extensive reading of short texts to extract information and details.","specific":["Reading: Interpret charts, graphs, and diagrams.","Reading: Summarize sections of texts in written form.","Phonemic Awareness: Demonstrate knowledge of phonemic awareness by applying knowledge of basic syllabification rules when decoding two-syllable, three-syllable, or compound words."],"learning_outcomes":["Can interpret a diagram showing the layout of the town by extracting key information from a text (e.g., \"The school is next to the market.\").","Can summarize written instructions about traditional building techniques (e.g., \"First, we collect the palm leaf. Second, we dry the leaves.\").","Can identify syllable division and apply appropriate stress patterns in two-syllable words, three-syllable words, and compound nouns (e.g., \"monument,\" \"streetlamp,\" \"tradition\")."]},"speaking":{"general":"Can describe basic information in simple discussions with peers.","specific":["Productive: Describe changes in places.","Interactive: Talk about preferences and familiar topics in a guided class discussion."],"learning_outcomes":["Can describe and compare changes in local places on a map (e.g., \"The market used to be small, but now it is larger.\").","Can discuss preferences for places in the town square (e.g., \"I like La Fondita de Lucia. It has good Panamanian food. What do you think?\").","Can ask and answer questions about location preferences (e.g., \"Where is the library? Do you like it there?\")."]},"writing":{"general":"Can compose short, purpose-driven texts, such as summaries, descriptive paragraphs, and project reports, demonstrating growing independence in structure and clarity.","specific":["Productive: Write descriptive reviews about content or products.","Interactive: Write information for a presentation with peers in a coherent manner."],"learning_outcomes":["Can describe with peers features of the town square for a class presentation (e.g., \"Next to the market is the Town Council.\").","Can write a short descriptive review of a town square attraction, highlighting personal impressions and details (e.g., \"The town square was lively and colorful. The market is next to the tall building in the middle of the town, and I enjoyed trying the local food.\").","Can help organize information about the town square for a presentation by describing its key features and surroundings (e.g., \"The town square has a central plaza with a fountain, and there are shops and restaurants around it.\")."]},"mediation":{"general":"Can facilitate communication with peers through simplified language, clarification, aiding understanding in group interactions, and interpretation of cultural differences in communication.","specific":["Communication: Interpret cultural differences in communication.","Concept: Clarify misunderstandings in group discussions."],"learning_outcomes":["Can interpret cultural differences by using simple examples and gestures (e.g., says, \"In Panama, people use palm leaves to make roofs.\" and gestures to a roof or points out a window).","Can clarify misunderstandings in group discussions by pointing to visuals (e.g., pointing to the map and saying, \"The park is here, not there.\").","Can resolve misunderstandings about locations using simple phrases (e.g., saying, \"This is the library.\" and pointing it on a map)."]}},"competences":{"linguistic":{"grammar":["Imperatives and sequencing words for indicating the order of actions (e.g., \"First, we collect the palm leaves. Second, we dry the leaves.\")","There is/there are to describe locations (e.g., \"There is a bank next to the police station.\")","WH-questions for asking about places (e.g., \"Where is the hospital?\" \"It is in front of the art gallery.\")"],"vocabulary":{"nouns":"town square, map, statue, monument, plaza, intersection, fountain, street, building, roof, tradition, park, library, market, school, crosswalk, traffic light, sidewalk, town hall, pedestrian bridge","verbs":"locate, visit, walk, turn, cross, gather, pass, follow, point, describe","adjectives":"historic, modern, busy, quiet, traditional, spacious, small, tall, crowded","demonstratives":"this, that, these, those","prepositions_of_place":"near, between, across from, beside, next to, behind, in front of, under, over, on, at, on the corner of","adverbs":"here, there, nearby, around, ahead, straight"},"pronunciation":"Practice syllable division and stress in two-syllable words, three-syllable words, and compound nouns (e.g., \"monument,\" \"streetlamp,\" \"tradition\")"},"pragmatic":["Asking about locations: \"Where is the school?\"","Describing locations: \"The park is next to the library.\""],"sociolinguistic":"Collaboratively, in small groups, explain directions and describe map details (e.g., \"To get to the park, follow this road up to the intersection.\")."},"assessment":["[{'id': 'grade7_scenario5_project1', 'name': 'Town Photo Tour', 'category': 'Photography', 'overview': 'Students take pictures around town or town squares and organize them into a photo tour, using prepositions of place (e.g., \"The school is next to the market.\") and \"there is/there are\" to describe its features. Photos of the central area of the school can also be used for the photo tour.', 'skills': ['Spatial Awareness: Describing the locations of places in town.', 'Creativity: Creating virtual or physical representations of town squares.'], 'technology': ['Use virtual tour platforms, digital map design tools, and 3D modeling software.']}, {'id': 'grade7_scenario5_project2', 'name': 'Community Landmark Collage', 'category': 'Art & Design', 'overview': 'Students create a collage of local landmarks by drawing or using magazine cutouts. They arrange the images using imperatives and sequencing words (e.g., \"First, draw the park; then, add the school.\"), and describe the locations with there is/there are and prepositions of place (e.g., \"There is a library next to the park.\").', 'skills': ['Spatial Awareness: Describing the locations of places in town.', 'Creativity: Creating virtual or physical representations of town squares.'], 'technology': ['Use virtual tour platforms, digital map design tools, and 3D modeling software.']}, {'id': 'grade7_scenario5_project3', 'name': 'Interactive Town Square Model', 'category': '3D Modeling', 'overview': 'Students build an interactive model of a town square (digital or with cardboard and other materials) and use prepositions and descriptive language to explain its features (e.g., \"The statue is between the fountain and the park.\").', 'skills': ['Spatial Awareness: Describing the locations of places in town.', 'Creativity: Creating virtual or physical representations of town squares.'], 'technology': ['Use virtual tour platforms, digital map design tools, and 3D modeling software.']}]"]},{"id":6,"title":"Arts and Crafts","themes":["This Is a Historical Building.","This Is a Local Artist."],"standards":{"listening":{"general":"Can extract both the main ideas and specific details in information heard from descriptions and narratives when spoken slowly and clearly.","specific":["Receptive: Comprehend multi-step instructions for academic tasks.","Interactive: Respond to questions and requests in a school setting."],"learning_outcomes":["Can show comprehension of descriptions inspired by local artists or related to their work to complete an arts and crafts project (e.g., \"Prepare materials for a painting inspired by Olga Sinclair's colorful murals.\").","Can respond to questions and requests related to arts and crafts in the school setting (e.g., \"Who is your favorite artist?\" \"What are some of their works?\").","Can summarize a peer's description of an artwork (e.g., \"It is a painting that depicts Panamanian rural life.\")."]},"reading":{"general":"Can engage in intensive and extensive reading of short texts to extract information and details.","specific":["Reading: Analyze simple editorials or opinion pieces.","Reading: Create visual presentations summarizing informational texts.","Phonemic Awareness: Demonstrate knowledge of phonemic awareness by applying knowledge of affixes to base words in context."],"learning_outcomes":["Can analyze simple editorials or opinion pieces related to arts and crafts, identifying key themes and viewpoints (e.g., \"What is the cultural significance of this piece of art?\").","Can create a drawing or a model of a famous historical building based on a text description (e.g., \"The Biomuseo is a colorful building with a unique design by Frank Gehry.\").","Can decode and accurately pronounce words by applying knowledge of affixes to base words in context, such as past tense verbs and gerunds, enhancing phonemic awareness (e.g., played, playing)."]},"speaking":{"general":"Can describe basic information in simple discussions with peers.","specific":["Productive: Describe a favorite hobby.","Interactive: Role-play everyday situations."],"learning_outcomes":["Can describe a favorite craft or art activity (e.g., \"My favorite craft is making baskets. First, you prepare the materials and soak the fibers.\").","Can role-play conversations about buying art (e.g., \"I'd like to buy this tagua carving. How much does it cost?\").","Can discuss local art in a conversation with peers (e.g., \"This artist has created beautiful sculptures.\")."]},"writing":{"general":"Can compose short, purpose-driven texts, such as summaries, descriptive paragraphs, and project reports, demonstrating growing independence in structure and clarity.","specific":["Productive: Write emails, letters, or texts describing past events.","Interactive: Write a class project proposal with guidance."],"learning_outcomes":["Can write a letter describing a visit to a local artist (e.g., \"Yesterday, we visited an artist who makes molas.\").","Can write brief messages about past art or craft events (e.g., \"Last week, our class made baskets.\").","Can draft a proposal for a project on local art with support (e.g., \"We want to study Guna Yala art.\")."]},"mediation":{"general":"Can facilitate communication with peers through simplified language, clarification, aiding understanding in group interactions, and interpretation of cultural differences in communication.","specific":["Concept: Assist in explaining the rules of a classroom game.","Concept: Guide peers through setting up a classroom activity."],"learning_outcomes":["Can assist in explaining the rules of an art-related game with basic actions (e.g., gesturing \"Draw something blue.\").","Can guide peers through setting up a classroom activity by demonstrating steps (e.g., showing how to fold paper for \"First, fold the paper.\").","Can provide support by explaining each part of a craft activity (e.g., points to the markers and says, \"Now add colors here.\")."]}},"competences":{"linguistic":{"grammar":["Present perfect (e.g., \"This artist has created beautiful sculptures.\")","Present and past simple to describe life and achievements (e.g., \"Yesterday, we visited an artist who makes molas.\")","Imperatives to explain how to create something (e.g., \"My favorite craft is making baskets. First, you prepare the materials and soak the fibers.\")"],"vocabulary":{"nouns":"artist, craft, basket, sculpture, gallery, studio, exhibition, canvas, building, mural, mola, tagua carving","verbs":"create, paint, sculpt, design, carve, display","adjectives":"creative, artistic, handmade, colorful, abstract, bold, vibrant, minimalistic, timeless, unique, detailed","prepositions":"with, from, by","adverbs":"skillfully, originally"},"pronunciation":"Identification and articulation of inflectional endings (-ed, -ing in past tense verbs and gerunds)"},"pragmatic":["Describing creations: \"The building is a two-story structure, with a rectangular design and white stone facades.\"","Describing achievements of artists: \"This artist has created beautiful sculptures.\"","Describing how to create something: \"First, you prepare the materials and soak the fibers.\""],"sociolinguistic":"Propose and develop steps for art projects in class while engaging in feedback exchanges (e.g., \"Start the mola by drawing geometric shapes, then cut out the fabric.\")."},"assessment":["[{'id': 'grade7_scenario6_project1', 'name': 'Digital Art Exhibition', 'category': 'Digital Design', 'overview': 'Students curate a digital exhibition of local artists, using the present perfect to describe their achievements (e.g., \"The artist has created many famous pieces.\"), and the present simple or past simple tense to describe their lives.', 'skills': ['Art Appreciation: Using descriptive language to talk about artists and crafts.', 'Creativity: Designing digital exhibits or tutorials.'], 'technology': ['Use video recording/editing tools and digital design platforms for exhibits and presentations.']}, {'id': 'grade7_scenario6_project2', 'name': 'Art History Presentation', 'category': 'Research & Presentation', 'overview': 'Students research a famous artist or craftsman from Panama and present their life and achievements using the present perfect and adjectives (e.g., \"She has designed many famous molas.\").', 'skills': ['Art Appreciation: Using descriptive language to talk about artists and crafts.', 'Creativity: Designing digital exhibits or tutorials.'], 'technology': ['Use video recording/editing tools and digital design platforms for exhibits and presentations.']}, {'id': 'grade7_scenario6_project3', 'name': 'Historic Building Video', 'category': 'Video Creation', 'overview': 'Students create a video about a historical building in their community, using imperatives, present simple, and descriptive adjectives to describe its location, features, and significance (e.g., \"This building has beautiful stone walls.\").', 'skills': ['Art Appreciation: Using descriptive language to talk about artists and crafts.', 'Creativity: Designing digital exhibits or tutorials.'], 'technology': ['Use video recording/editing tools and digital design platforms for exhibits and presentations.']}]"]},{"id":7,"title":"The Healing Plants of Panama","themes":["The Soothing Guanábana","Sábila Is Helpful for Burns."],"standards":{"listening":{"general":"Can extract both the main ideas and specific details in information heard from descriptions and narratives when spoken slowly and clearly.","specific":["Receptive: Follow extended speech on familiar topics.","Interactive: Ensure mutual understanding in group interactions through clarification and confirmation."],"learning_outcomes":["Can follow spoken explanations about herbal remedies (e.g., \"How do we prepare it?\").","Can clarify understanding of instructions about plant uses (e.g., \"Can you repeat how to use the plant?\").","Can interpret peer feedback on how to use healing plants by summarizing key points (e.g., \"Juan Carlos said that guanábana (soursop) helps with digestion.\")."]},"reading":{"general":"Can engage in intensive and extensive reading of short texts to extract information and details.","specific":["Reading: Analyze simple editorials or opinion pieces.","Reading: Respond to questions based on class readings.","Phonemic Awareness: Demonstrate knowledge of phonemic awareness by applying knowledge of basic syllabification rules when decoding two-syllable, three-syllable, or compound words."],"learning_outcomes":["Can analyze information about healing plants in Panama (e.g., \"The text describes the most common healing plants of Panama.\").","Can respond to questions about the types and benefits of plants in class discussions (e.g., \"What is mint for?\" \"It is good for the stomach.\").","Can apply basic syllabification rules to decode and accurately pronounce two-syllable, three-syllable, or compound words, enhancing phonemic awareness (e.g., \"treatment,\" \"therapeutic\")."]},"speaking":{"general":"Can describe basic information in simple discussions with peers.","specific":["Productive: Present basic information about personal and community topics.","Interactive: Exchange simple ideas in group discussions about current events."],"learning_outcomes":["Can present basic information on a plant's uses (e.g., \"Guanábana (soursop) is used to treat infections.\").","Can exchange information about medicinal plants used in Panamanian home remedies (e.g., \"My grandfather Bill uses ginger tea for colds. What does your family use?\").","Can ask and answer questions about plant benefits (e.g., \"What is sábila (aloe vera) used for?\")."]},"writing":{"general":"Can compose short, purpose-driven texts, such as summaries, descriptive paragraphs, and project reports, demonstrating growing independence in structure and clarity.","specific":["Productive: Compose a simple thank-you letter with support.","Interactive: Reply to a message written on paper, in a text app, or in an email."],"learning_outcomes":["Can write a thank-you letter to someone who shared plant remedies (e.g., \"Thank you for teaching us about guanábana (soursop).\").","Can respond to a text message about plant uses in a familiar way (e.g., \"Sara will remember to use sábila (aloe vera) for burns.\").","Can reply with simple feedback to a message about medicinal plants (e.g., \"Thank you for the information on sábila (aloe vera).\")."]},"mediation":{"general":"Can facilitate communication with peers through simplified language, clarification, aiding understanding in group interactions, and interpretation of cultural differences in communication.","specific":["Concept: Clarify misunderstandings in group discussions.","Communication: Interpret cultural differences in communication."],"learning_outcomes":["Can clarify misunderstandings in group discussions by pointing to visual aids (e.g., points to a picture of sábila (aloe vera) and says, \"This is for burns.\").","Can interpret cultural differences in communication by explaining remedies and using culturally relevant expressions or gestures (e.g., says, \"This is used to heal.\" while pointing to a leaf and using the Panamanian expression dale to indicate agreement or encouragement).","Can explain simple plant remedies for peers, using visuals (e.g., points to a leaf and says, \"This helps skin.\")."]}},"competences":{"linguistic":{"grammar":["Infinitive of purpose: used to + infinitive verb (e.g., \"Hojas de menta (mint leaves) are used to relieve headaches.\")","Should/shouldn't for giving advice (e.g., \"You should use sábila (aloe vera) for burns.\")","Present simple for facts (e.g., \"The leaves of hierba de limón (lemongrass) are good for colds.\")"],"vocabulary":{"nouns":"plant, leaf, root, remedy, ginger, infections, treatment, herb, application, soursop, aloe vera, lemongrass, mint leaves","verbs":"treat, heal, soothe, apply, grow, boil, prepare","adjectives":"useful, medicinal, natural, therapeutic","prepositions":"for, with","adverbs":"traditionally, safely"},"pronunciation":"Application of syllable division rules when forming and decoding two-syllable, three-syllable, or compound words (e.g., words such as \"treatment\" and \"therapeutic\")."},"pragmatic":["Giving advice on usage: \"You should use sábila (aloe vera) for burns.\"","Stating purpose: \"Guanábana (soursop) is used to treat infections.\""],"sociolinguistic":"Present and exchange simple health-related advice and remedies in discussions or role-play scenarios."},"assessment":["[{'id': 'grade7_scenario7_project1', 'name': 'Healing Plant Guide', 'category': 'Digital Design', 'overview': 'Students create a guide of Panama\\'s healing plants, using the infinitive of purpose (e.g., \"Guanábana (soursop) is used to treat infections.\"), and \"should/shouldn\\'t\" to give advice (e.g., \"You should use sábila (aloe vera) for burns.\").', 'skills': ['Health Knowledge: Using advice structures to describe plant remedies.', 'Communication: Presenting information about healing plants in multiple formats.'], 'technology': ['Use app design tools, video editing tools, and digital guide creation software.']}, {'id': 'grade7_scenario7_project2', 'name': 'Healing Plant Remedies', 'category': 'Presentation', 'overview': 'Students design a simple presentation listing common healing plants and their uses, incorporating advice structures (e.g., \"You should try this for colds.\").', 'skills': ['Health Knowledge: Using advice structures to describe plant remedies.', 'Communication: Presenting information about healing plants in multiple formats.'], 'technology': ['Use app design tools, video editing tools, and digital guide creation software.']}, {'id': 'grade7_scenario7_project3', 'name': 'Plant Remedy Commercial', 'category': 'Video Creation', 'overview': \"Students create a short commercial advertising the benefits of a healing plant. They use the simple present for facts and should/shouldn't for advice.\", 'skills': ['Health Knowledge: Using advice structures to describe plant remedies.', 'Communication: Presenting information about healing plants in multiple formats.'], 'technology': ['Use app design tools, video editing tools, and digital guide creation software.']}]"]},{"id":8,"title":"Famous Panamanians","themes":["I Love These Entertainers.","My Favorite Athletes!"],"standards":{"listening":{"general":"Can extract both the main ideas and specific details in information heard from descriptions and narratives when spoken slowly and clearly.","specific":["Receptive: Comprehend multi-step instructions for academic tasks.","Interactive: Respond appropriately to spoken questions in familiar settings."],"learning_outcomes":["Can comprehend multi-step instructions related to presentations about famous Panamanians (e.g., \"First, research the achievements of a famous Panamanian. Next, create a slide with their most important accomplishment. Finally, rehearse your presentation.\").","Can respond to spoken questions about famous Panamanians (e.g., \"Who is the most famous athlete?\").","Can summarize information from discussions on public figures and share key takeaways (e.g., \"She has won many awards, including Athlete of the Year.\")."]},"reading":{"general":"Can engage in intensive and extensive reading of short texts to extract information and details.","specific":["Reading: Show comprehension of the main plot and characters in short stories.","Reading: Summarize sections of texts in written form.","Phonemic Awareness: Demonstrate knowledge of phonemic awareness by reading base words and inflectional endings (-s, -es, -ed, -ing)."],"learning_outcomes":["Can show comprehension of the plot in a short story (e.g., \"This is Adalberto Carrasquilla. He is one of the best soccer players in Panama.\").","Can summarize and extract key details from a text about the achievements of famous people (e.g., \"She is Atheyna Bylon. She is a famous boxer and an Olympic medalist.\").","Can read sentences fluently by recognizing and pronouncing base words with inflectional endings (-ed, -ing), demonstrating phonemic awareness (e.g., \"He improved his own marks.\")."]},"speaking":{"general":"Can describe basic information in simple discussions with peers.","specific":["Productive: Propose collaboratively the steps to develop a simple project.","Interactive: Negotiate the organization of a project or presentation."],"learning_outcomes":["Can discuss and propose steps to create a project about famous people (e.g., \"We can make a poster about Hillary Heron.\").","Can negotiate the organization of a simple project (e.g., \"Let's write down different tasks for the poster project, and then we can choose the ones we want to do.\").","Can describe basic resources for a group project (e.g., \"You can use an online biography tool to find more details about Erika Ender's music career.\" \"You can use a dictionary app to find definitions.\")."]},"writing":{"general":"Can compose short, purpose-driven texts, such as summaries, descriptive paragraphs, and project reports, demonstrating growing independence in structure and clarity.","specific":["Productive: Write instructions for a simple game or craft.","Interactive: Write simple comments on a peer's short text."],"learning_outcomes":["Can write clear instructions for a game about identifying famous Panamanians and their achievements, including opening and closing steps (e.g., \"Step 1: Each player draws a card. Step 2: Give clues about the figure's achievements. Step 3: Reveal the correct answer.\").","Can write brief, supportive comments on a peer's text about a famous Panamanian (e.g., \"Roberto Durán is considered one of the greatest boxers in the world.\" \"I enjoyed reading about Roberto Durán.\").","Can provide feedback on a classmate's description of a notable figure (e.g., \"I didn't know Mariano Rivera won so many awards!\")."]},"mediation":{"general":"Can facilitate communication with peers through simplified language, clarification, aiding understanding in group interactions, and interpretation of cultural differences in communication.","specific":["Text: Simplify messages for peers.","Concept: Clarify misunderstandings in group discussions."],"learning_outcomes":["Can simplify messages for peers by using gestures and actions to convey meaning (e.g., says, \"He's a singer.\" and pretends to hold a microphone and sing to represent the singer Sech).","Can clarify misunderstandings in group discussions with simple gestures (e.g., mimics jumping moves and says \"Irving Saladino was a long jumper.\").","Can use visual aids to simplify achievements of a famous Panamanian (e.g., points to medals and says, \"He won many awards.\")."]}},"competences":{"linguistic":{"grammar":["Present continuous for future events (e.g., \"She is training for a new tournament.\")","Comparatives and superlatives (e.g., \"Roberto Durán is better known than other boxers. Roberto Duran is considered one of the greatest boxers in the world.\")","Past simple for achievements (e.g., \"Atheyna Bylon won a medal in the Olympic Games.\")"],"vocabulary":{"nouns":"entertainer, athlete, achievement, award, singer, actor, recognition, competition, performance, fan","verbs":"win, achieve, inspire, train, perform, compete","adjectives":"famous, popular, talented, skilled, specialized","comparative":"more","superlative":"best"},"pronunciation":"Practice reading inflectional endings (ed, -ing) in sentences (e.g., \"He improved his own marks.\")"},"pragmatic":["Describing achievements: \"Mariano Rivera won many awards.\"","Comparing figures: \"Sech is more popular than other singers.\""],"sociolinguistic":"Describing achievements of celebrities and developing reports on notable figures (e.g., \"She is Atheyna Bylon. She is a famous boxer and an Olympic medalist.\")."},"assessment":["[{'id': 'grade7_scenario8_project1', 'name': 'Famous Panamanians Project', 'category': 'Digital Design', 'overview': 'Students create a poster or web page showcasing famous Panamanians. They use the present continuous tense to describe their ongoing activities (e.g., \"Sech is releasing a new song.\"), and past simple to highlight their achievements (e.g., \"Mariano Rivera won many awards.\").', 'skills': ['Communication: Describing the ongoing and past achievements of famous Panamanians.', 'Creativity: Presenting information through digital mediums like webpages and vlogs.'], 'technology': ['Use web design tools, infographic software, and video editing tools.']}, {'id': 'grade7_scenario8_project2', 'name': 'Biography Timeline', 'category': 'Research & Presentation', 'overview': 'Students research a famous Panamanian and create a summary of her/his life and achievements using comparatives (e.g., \"He is more famous than most athletes.\").', 'skills': ['Communication: Describing the ongoing and past achievements of famous Panamanians.', 'Creativity: Presenting information through digital mediums like webpages and vlogs.'], 'technology': ['Use web design tools, infographic software, and video editing tools.']}, {'id': 'grade7_scenario8_project3', 'name': 'Panamanian Influencer Review', 'category': 'Video Creation', 'overview': 'Students create a short essay or video reviewing the work of a famous Panamanian influencer. They use the present continuous tense and comparatives to describe their influence (e.g., \"She is more popular now than she was last year.\").', 'skills': ['Communication: Describing the ongoing and past achievements of famous Panamanians.', 'Creativity: Presenting information through digital mediums like webpages and vlogs.'], 'technology': ['Use web design tools, infographic software, and video editing tools.']}]"]}]},"Grade 8":{"level":"A2.3","scenarios":[{"id":1,"title":"Cultural Connections","themes":["I Celebrate This Tradition Because...","In This Region, They Have a Custom Of..."],"standards":{"listening":{"general":"Can analyze simple information and questions about familiar topics when spoken slowly and clearly.","specific":["Receptive: Show recognition of specific details when listening to explanations","Interactive: Contribute to simple discussions on a variety of issues"],"learning_outcomes":["Can follow audio narratives about Panamanian cultural events and show recognition by answering questions about key details","Can contribute to simple discussions about celebrations and customs in their community by sharing personal experiences and responding to peers' questions","Can follow a short story about a cultural tradition and recall main details"]},"reading":{"general":"Can analyze a variety of short texts.","specific":["Reading: Comprehend descriptions in simple texts","Reading: Summarize the main points of various non-fiction texts","Phonemic Awareness: Demonstrate knowledge of phonemic awareness by pronouncing the irregular present verbs ending in third person singular '-s', '-es', and '-ies'"],"learning_outcomes":["Can comprehend descriptions in simple texts about cultural traditions","Can summarize the main points of texts about national festivals by using text features like headings and captions","Can accurately pronounce irregular present tense verbs ending in the third-person singular '-s', '-es', and '-ies' by producing the correct sounds /s/, /z/, and /ɪz/ in words related to cultural traditions"]},"speaking":{"general":"Can engage in simple discussions by asking and responding to questions, exchanging information, and providing brief explanations about familiar topics.","specific":["Productive: Present on a personally significant topic","Interactive: Engage in discussions about various real-world topics, asking and responding to questions"],"learning_outcomes":["Can present about a personally significant tradition","Can engage in discussions about cultural traditions by asking and responding to questions and using follow-up prompts","Can ask and respond to questions about regional festivals by providing relevant details"]},"writing":{"general":"Can collaboratively create short texts, such as diary entries, creative pieces, and class reports, demonstrating growing coherence.","specific":["Productive: Write a diary entry about a significant event","Interactive: Respond to peer writing"],"learning_outcomes":["Can write a diary entry describing a cultural event in a coherent and organized manner","Can respond with simple feedback to peer writing about a cultural event","Can write a short paragraph sharing feelings about a cultural celebration"]},"mediation":{"general":"Can mediate peer understanding by summarizing information, interpreting visuals, and explaining ideas with aigns promoting balanced technology use for their school community.', 'skills': [\"Critical Thinking: Analyzing technology's role in daily life\", 'Self-Awareness: Recognizing personal technology habits'], 'technology': ['Digital journaling apps (used after the challenge)', 'Video documentary tools', 'Survey platforms']}]"]},{"id":8,"title":"Planning for My Future Education","themes":["I Expect My Future to Be...","My Personal Goals for the Future Include..."],"standards":{"listening":{"general":"Can analyze simple information and questions about familiar topics when spoken slowly and clearly.","specific":["Receptive: Follow audio narratives","Interactive: Engage in role-play exercises to resolve conflicts"],"learning_outcomes":["Can follow narratives about educational plans","Can engage in discussions about future education","Can understand information about educational opportunities"]},"reading":{"general":"Can analyze a variety of short texts.","specific":["Reading: Analyze the structure of various texts","Reading: Interpret characters' motives in short stories","Phonemic Awareness: Demonstrate knowledge of phonemic awareness by practicing minimal pair sounds"],"learning_outcomes":["Can analyze texts about educational pathways","Can understand requirements for different educational programs","Can accurately produce minimal pair sounds"]},"speaking":{"general":"Can engage in simple discussions by asking and responding to questions, exchanging information, and providing brief explanations about familiar topics.","specific":["Productive: Explain a recent learning experience","Interactive: Engage in discussions about academic and future professional interests"],"learning_outcomes":["Can explain educational goals and expectations","Can discuss plans for future studies","Can ask and answer questions about educational choices"]},"writing":{"general":"Can collaboratively create short texts, such as diary entries, creative pieces, and class reports, demonstrating growing rategic Planning: Mapping out educational pathways', 'Goal Articulation: Clearly expressing future aspirations'], 'technology': ['Portfolio creation tools', 'Timeline visualization software', 'Presentation platforms']}, {'id': 'grade8_scenario8_project2', 'name': 'Future Self Interview', 'category': 'Creative Visualization', 'overview': \"Students create videos interviewing their 'future selves' about their educational journey and achievements.\", 'skills': ['Strategic Planning: Mapping out educational pathways', 'Goal Articulation: Clearly expressing future aspirations'], 'technology': ['Portfolio creation tools', 'Timeline visualization software', 'Presentation platforms']}, {'id': 'grade8_scenario8_project3', 'name': 'Education Fair Presentation', 'category': 'Information Sharing', 'overview': 'Students research and present information about different educational opportunities and pathways.', 'skills': ['Strategic Planning: Mapping out educational pathways', 'Goal Articulation: Clearly expressing future aspirations'], 'technology': ['Portfolio creation tools', 'Timeline visualization software', 'Presentation platforms']}]"]}]},"Grade 9":{"level":"A2.4","scenarios":[{"id":1,"title":"A Guide to Panama","themes":["Our Historical Sites","Take a Trip to the Panama Canal"],"standards":{"listening":{"general":"Can identify main ideas, specific details, and speaker intent in short oral texts on familiar topics spoken at a moderate to normal speed.","specific":["Receptive: Analyze the tone and purpose of spoken advertisements.","Interactive: Engage in role-play exercises."],"learning_outcomes":["Can analyze the tone in spoken advertisements to understand promotional language (e.g., \"The advertisement describes the Panama Canal as educational because of its historical importance.\").","Can participate in role-play activities about planning visits to historical sites by responding to questions and sharing details (e.g., \"Where can I learn about pirates?\" \"You can visit Portobelo Fort. It was built to protect Panama from pirate attacks.\").","Can engage in audio narratives by recognizing details on Panama's history (e.g., \"La Amistad Panama-Corea monument is a symbol of friendship between the two countries.\")."]},"reading":{"general":"Can show comprehension of the main points in extended narratives and a variety of texts.","specific":["Reading: Analyze articles on general interest topics.","Reading: Outline the main information from simple diagrams (e.g., graphs, bar charts)."],"learning_outcomes":["Can analyze articles about Panama's historical sites by identifying key features (e.g., \"The article is about San Lorenzo Fort as an important archaeological site. It is one of the oldest Spanish military forts in Panama.\").","Can outline from bar charts information on Panama's tourism trends from bar charts (e.g., \"This chart shows that more tourists visit Casco Viejo during December for the holiday celebrations, and this chart shows that more tourists visit the Panama Canal during the February.\").","Can analyze informational texts to compare historical sites (e.g., \"We can compare Panama Viejo and El Valle de Antón. Panama Viejo is an important colonial site with ruins from the Spanish settlement, while El Valle de Antón is a volcanic caldera known for its natural beauty and outdoor attractions, such as hiking trails and hot springs.\")."]},"speaking":{"general":"Can engage in conversations about familiar topics that involve following multi-step instructions, and describing stories in a straightforward way.","specific":["Productive: Give simple directions to a location.","Interactive: Explain personal viewpoints in discussions."],"learning_outcomes":["Can give simple and appropriate directions to a historical location in Panama, incorporating landmarks for clarity (e.g., \"Walk past the Balboa statue, then turn right to reach the Panama Canal visitor center.\").","Can express interest in Panama's cultural sites for simple reasons (e.g., I like Amador Causeway's atmosphere because it's a great place to walk and enjoy the view of the city and the ocean.).","Can explain in discussions personal viewpoints about visiting historical sites (e.g., \"I think the Metropolitan Cathedral in Panama City is impressive because it represents colonial architecture and has been beautifully restored.\")."]},"writing":{"general":"Can compose short structured texts, including reflections, descriptive paragraphs, and surveys or forms, demonstrating clear organization with detailed content.","specific":["Productive: Write short fiction and nonfiction texts.","Interactive: Compose a group piece of writing about a common interest."],"learning_outcomes":["Can write a short nonfiction piece about a well-known site in Panama (e.g., \"Barro Colorado Island is a famous scientific research site located in Lake Gatun.\").","Can create a fictional narrative about a visitor's trip to a historical or natural site in Panama, using descriptive details about cultural significance and activities (e.g., \"Alice is visiting Isla Taboga. She will visit the old church, swim at the beach, eat pescado frito, and buy local crafts.\").","Can compose a group description of a historical site (e.g., \"The Emberá villages, located along Panama's rivers, offer tourists a chance to experience traditional ways of life.\")."]},"mediation":{"general":"Can mediate peer interactions by resolving conflicts, interpreting information, and explaining abstract ideas with clarity and precision.","specific":["Text: Summarize articles for classroom discussions.","Concept: Explain cultural differences."],"learning_outcomes":["Can summarize information from a map of Panama, using visuals and gestures to identify key locations for a class discussion (e.g., points to Casco Viejo on the map and describes it as a historic site).","Can clarify cultural concepts, using multiple languages (e.g., described heritage in both English and a familiar language if needed).","Can mediate cultural discussions by using body language, visuals, and comparisons between Panamanian and global historical sites (e.g., \"The Suez Canal is longer than the Panama Canal. Let me show you on this map.\")."]}},"competences":{"linguistic":{"grammar":["Present simple and simple past for describing places and their importance (e.g., \"Panama has many historical sites.\" \"Casco Viejo is very attractive to tourists because it was once a vibrant colonial village.\")","Future tense with \"going to\" for plans (e.g., \"I am going to visit the Panama Canal next month.\")","Possessive forms with \"s\" (e.g., \"Panama's historical sites.\")"],"vocabulary":{"nouns":"historical sites, ruins, Panama Canal, Casco Viejo, landmarks, architecture, heritage, monument, destination, visitor, museum, tour, Causeway, colony, ruins, port, fort","verbs":"attract, visit, guide, find, explore, travel, preserve, describe, inform, learn, reach, locate, transit, turn, walk","adjectives":"historical, cultural, famous, ancient, preserved, tourist-friendly, informative, renowned"},"pronunciation":"Practice pronouncing minimal pairs in long and short vowels (e.g., /ɪ/ / in \"sit\" and /i/ in \"seat\") Focus on stress in multisyllabic words (e.g., \"culture,\" \"cultural,\" \"history,\" \"historical,\" \"inform,\" and \"information\")"},"pragmatic":["Understanding intent and context: \"The tone of this article is informative because it provides detailed historical facts about Casco Viejo.\"","Comparing and contrasting: \"Casco Viejo is more vibrant, while Panama Viejo is quieter and more serene.\""],"sociolinguistic":"Participate in conversations about travel plans and historical knowledge, providing relevant descriptions and responses (e.g., \"Casco Viejo is a very attractive tourist destination because it was once a vibrant colonial village.\")."},"assessment":["[{'id': 'grade9_scenario1_project1', 'name': 'Digital Tourist Guide', 'category': 'Website Design', 'overview': 'Students design an interactive digital guide showcasing Panama\\'s historical sites. They describe the sites using the simple present and past tense (e.g., \"Panama has many historical sites.\").', 'skills': ['Descriptive Writing: Using the simple present and past tense when talking about historical sites.', 'Communication: Using the future tense and possessive forms in travel discussions.'], 'technology': ['Use website creation tools, video editing software, and virtual reality design platforms.']}, {'id': 'grade9_scenario1_project2', 'name': 'Historical Site Video Documentary', 'category': 'Video Creation', 'overview': 'Students create a short video documentary about a local historical site, using the future tense to talk about upcoming visits (e.g., \"I am going to visit the Panama Canal.\").', 'skills': ['Descriptive Writing: Using the simple present and past tense when talking about historical sites.', 'Communication: Using the future tense and possessive forms in travel discussions.'], 'technology': ['Use website creation tools, video editing software, and virtual reality design platforms.']}, {'id': 'grade9_scenario1_project3', 'name': 'Virtual Reality History Tour', 'category': 'Virtual Reality Design', 'overview': 'Students design a virtual reality tour of Panama\\'s most famous historical sites, incorporating possessive forms to highlight key features (e.g., \"Panama\\'s historical sites attract tourists.\").', 'skills': ['Descriptive Writing: Using the simple present and past tense when talking about historical sites.', 'Communication: Using the future tense and possessive forms in travel discussions.'], 'technology': ['Use website creation tools, video editing software, and virtual reality design platforms.']}]"]},{"id":2,"title":"Technology in Education","themes":["The Use of Technology in School","When It's Better to Ignore Technology"],"standards":{"listening":{"general":"Can identify main ideas, specific details, and speaker intent in short oral texts on familiar topics spoken at a moderate to normal speed.","specific":["Receptive: Interpret spoken advice on common problems.","Interactive: Respond to questions in group discussions."],"learning_outcomes":["Can interpret spoken advice to understand limits on technology use (e.g., \"I think this app is helpful because it makes it easy to access our homework and assignments, but I try not to use it too much so I don't get distracted by my phone.\").","Can respond to questions in group discussions by sharing opinions on technology use (e.g., \"I love this app because it has fun videos.\").","Can respond in discussions by giving examples of useful or distracting apps (e.g., \"In the audio, it is clear that video apps distract students during class.\")."]},"reading":{"general":"Can show comprehension of the main points in extended narratives and a variety of texts.","specific":["Reading: Summarize the main points of different types of texts.","Reading: Identify the main topic and related ideas in a simple structured text."],"learning_outcomes":["Can summarize and compare key points in two texts about technology in school (e.g., \"One article says that using tablets helps students because they can find information quickly, while the other says it's distracting because students use them to play games.\").","Can identify the main topic and supporting ideas in a text about educational apps (e.g., \"The main idea is that some apps can help students memorize information faster.\").","Can summarize articles on classroom technology use preferences (e.g., \"Two reasons students dislike technology in the classroom include the lack of charging stations and poor internet connections.\")."]},"speaking":{"general":"Can engage in conversations about familiar topics that involve following multi-step instructions, and describing stories in a straightforward way.","specific":["Productive: Describe a recent personal experience.","Interactive: Exchange two or more ideas in group discussions on familiar subjects."],"learning_outcomes":["Can describe and recommend an educational app during a group discussion based on a recent personal experience (e.g., \"I used a language learning app for language practice, and it helped me learn new vocabulary easily.\").","Can exchange ideas in group discussions about useful technology in school by sharing personal preferences and comparing features (e.g., \"I prefer tablets for reading because they are light and easy to use, but laptops are better for writing reports.\").","Can participate in discussions about technology limitations by suggesting solutions or alternatives (e.g., \"We should limit technology use during lunch to talk more with friends. Instead, we can play outdoor games to stay active.\")."]},"writing":{"general":"Can compose short structured texts, including reflections, descriptive paragraphs, and surveys or forms, demonstrating clear organization with detailed content.","specific":["Productive: Draft a persuasive paragraph on a familiar topic.","Interactive: Write daily observations about everyday situations and activities."],"learning_outcomes":["Can draft a persuasive paragraph outlining the pros and cons of tech-free time during school hours (e.g., \"While technology helps us stay informed, taking breaks can reduce eye strain and increase social interaction.\").","Can write daily observations about using technology at school (e.g., \"Today, I used my tablet to look up information for my science project. It helped me find everything quickly and stay organized.\").","Can record observations on the benefits of technology for learning (e.g., \"Using technology helps me learn faster because I can easily access resources and get immediate feedback on my work.\")."]},"mediation":{"general":"Can mediate peer interactions by resolving conflicts, interpreting information, and explaining abstract ideas with clarity and precision.","specific":["Communication: Facilitate a discussion on a group project.","Concept: Simplify complex concepts for group comprehension."],"learning_outcomes":["Can facilitate a discussion on technology use by encouraging classmates to share opinions (e.g., asks peers to share their favorite school app and explain why it's their favorite).","Can simplify complex technology terms by using simple words and examples (e.g., explains Wi-Fi as the internet that connects phones and computers without wires).","Can clarify technology terms using both English and familiar language to help peers (e.g., explains \"download\" in both languages if classmates are unsure)."]}},"competences":{"linguistic":{"grammar":["Simple present for expressing opinions and comparing preferences (e.g., \"I like technology in school.\" \"Technology is better for learning than traditional methods.\")","Modal \"should\" for making suggestions and modal \"can\" for expressing ability (e.g., \"You should ignore technology when eating.\" \" I can create presentations with my computer.\")","Wh-questions for discussions (e.g., \"What apps do you like the most?\")"],"vocabulary":{"nouns":"technology, apps, tools, school, education, benefit, problem, solution, device, innovation, access, platform, software, curriculum, resources, system, integration, network, instruction, progress","verbs":"use, ignore, prefer, benefit, advise, solve, engage, incorporate, limit, recommend, browse, log in, synchronize","adjectives":"appropriate, useful, beneficial, innovative, educational, accessible, digital, technological","discourse_markers":"while, but, instead, because"},"pronunciation":"Focus on stress in multisyllabic and compound words (e.g., \"educate,\" \"education,\" \"integrate,\" \"historical,\" \"inform,\" \"information,\" \"innovate,\" \"innovative,\" \"software,\" and \"network\") Practice pronouncing minimal pairs with long and short vowels (e.g., /ʊ/ in \"should\" and /uː/ in \"shooed\") Practice intonation patterns with modal verbs \"should\" and \"can\""},"pragmatic":["Weighing benefits and drawbacks: \"Using tablets in school helps us access information easily, but it can be distracting.\"","Suggesting limits: \"We should have tech-free times at lunch so we can talk with each other more.\"","Expressing opinions and comparing preferences: \"I like technology in school.\" \"Technology is better for learning than traditional methods.\""],"sociolinguistic":"Engage in conversations on the appropriate use of technology, offering suggestions for limiting or incorporating it in school (e.g., \"We should use technology in school because it helps learning more than traditional methods.\")."},"assessment":["[{'id': 'grade9_scenario2_project1', 'name': 'Tech Review Blog', 'category': 'Blogging', 'overview': 'Students create a blog reviewing different educational apps. They express preferences using the present simple and offer suggestions using modal verbs (e.g., \"You should ignore technology when...\").', 'skills': ['Critical Thinking: Using modal verbs and expressing preferences in discussions.', 'Debate: Discussing the pros and cons of technology in education.'], 'technology': ['Use blogging platforms, debate tools, and digital journaling apps.']}, {'id': 'grade9_scenario2_project2', 'name': 'Classroom Tech Debate', 'category': 'Debate', 'overview': 'Students debate the pros and cons of technology in education, using Wh-questions and modals to express their opinions (e.g., \"I think we should...\").', 'skills': ['Critical Thinking: Using modal verbs and expressing preferences in discussions.', 'Debate: Discussing the pros and cons of technology in education.'], 'technology': ['Use blogging platforms, debate tools, and digital journaling apps.']}, {'id': 'grade9_scenario2_project3', 'name': 'Tech-Free Challenge Journal', 'category': 'Digital Journaling', 'overview': 'Students document their experiences during a \"Tech-Free Day\" challenge, using reflective writing and modal verbs (e.g., \"You should avoid...\").', 'skills': ['Critical Thinking: Using modal verbs and expressing preferences in discussions.', 'Debate: Discussing the pros and cons of technology in education.'], 'technology': ['Use blogging platforms, debate tools, and digital journaling apps.']}]"]},{"id":3,"title":"Renewable Energy in Panama","themes":["What Is Renewable Energy?","Why Is Renewable Energy Important for Panama?"],"standards":{"listening":{"general":"Can identify main ideas, specific details, and speaker intent in short oral texts on familiar topics spoken at a moderate to normal speed.","specific":["Receptive: Analyze longer narratives.","Interactive: Participate in group problem-solving sessions."],"learning_outcomes":["Can describe key ideas from longer narratives about renewable energy in Panama by summarizing main points and supporting details (e.g., \"In the article about Panama's renewable energy projects, they explained how solar panels in rural areas provide electricity to homes, reduce reliance on fossil fuels, and improve daily life for families.\").","Can participate in group problem-solving by sharing ideas and proposing realistic solutions for Panama's energy challenges, including rural areas (e.g., \"We can install solar panels in remote villages to provide electricity for schools and reduce reliance on generators.\").","Can actively participate by asking thoughtful questions to explore energy-saving ideas (e.g., \"How does wind power help protect the environment?\")."]},"reading":{"general":"Can show comprehension of the main points in extended narratives and a variety of texts.","specific":["Reading: Interpret written instructions for daily activities.","Reading: Recognize the language on a simple form asking for personal information."],"learning_outcomes":["Can interpret instructions on saving energy in daily routines (e.g., \"To save energy, you should turn off the TV when you're not watching, and unplug chargers when they're not in use.\").","Can identify and fill in the required information in surveys and forms related to renewable energy in Panama (e.g., \"Indicate if your home uses solar panels,\" \"yes or no,\" or \"Check whether your home uses LED bulbs or traditional bulbs.\").","Can interpret steps in a guide on setting up home energy-saving habits (e.g., \"Summarize instructions on how to unplug devices at school and reduce fan or A/C use during the day.\")."]},"speaking":{"general":"Can engage in conversations about familiar topics that involve following multi-step instructions, and describing stories in a straightforward way.","specific":["Productive: Express opinions about familiar topics.","Interactive: Collaborate verbally in small group projects."],"learning_outcomes":["Can express simple opinions on renewable energy by providing logical reasons and relevant examples (e.g., \"I believe solar energy is better because Panama has long hours of sunlight, making it efficient and cost-effective.\" \"I think wind energy is helpful because Penonomé has strong, consistent winds, which makes wind turbines effective at generating power.\").","Can collaborate in small groups to choose the best renewable energy option for a specific situation (e.g., \"We think wind turbines are good for the countryside in Los Santos because there's a lot of open space and strong winds.\" \"We think hydroelectric power is good for areas near the Chiriquí Viejo River because it can provide consistent energy.\").","Can share a personal view on conserving energy (e.g., \"We should all unplug devices when they're not in use to save energy and protect the environment.\")."]},"writing":{"general":"Can compose short structured texts, including reflections, descriptive paragraphs, and surveys or forms, demonstrating clear organization with detailed content.","specific":["Productive: Write reflective pieces on short stories.","Interactive: Comment on peers' writing in various formats, including on paper and online."],"learning_outcomes":["Can write a reflective paragraph explaining how Panama can benefit from renewable energy (e.g., \"Panama can benefit from renewable energy because it can reduce pollution and save money.\" \"Using wind farms as they do in Penonomé can provide clean energy to rural areas and reduce the country's dependence on fossil fuels.\").","Can comment on a peer's description of renewable energy sources (e.g., \"I agree with your point about solar power. Another benefit is that it's available everywhere, even in remote areas.\").","Can provide feedback on a group's project about energy-saving tips (e.g., \"I like your ideas. Maybe you could also talk about using energy-efficient light bulbs to save more energy.\")."]},"mediation":{"general":"Can mediate peer interactions by resolving conflicts, interpreting information, and explaining abstract ideas with clarity and precision.","specific":["Text: Clarify written instructions for peers.","Communication: Participate in conflict resolution strategies with peers."],"learning_outcomes":["Can help clarify misunderstandings about energy sources by combining gestures and visual aids to make complex instructions easier to understand (e.g., using hand motions to show how solar panels collect sunlight alongside pictures or diagrams).","Can mediate disagreements in group projects by suggesting taking turns and encouraging raising their hands to ask questions (e.g., suggests each peer takes turns sharing their energy-saving ideas, or says, \"Why don't we all raise our hands to ask questions before voting on the best idea?\").","Can help resolve misunderstandings about energy sources by using gestures alone to explain key concepts (e.g., using hand movements to demonstrate how a dam holds water to generate electricity)."]}},"competences":{"linguistic":{"grammar":["Gerunds as subjects (e.g., \"Saving energy is important.\")","Using the present continuous to describe ongoing actions related to the use of renewable energy sources (e.g., \"We are installing more solar panels and wind turbines to generate clean energy.\")","Adverbial clauses for justification (e.g., \"Renewable energy is vital because it preserves natural resources.\")"],"vocabulary":{"nouns":"energy, solar, wind, source, electricity, power, resource, preservation, sustainability, environment, conservation, technology, efficiency, grid, turbine, panels, infrastructure, climate, generators, hydropower, fossil fuels, consumption, plant, reliance","verbs":"convert, preserve, generate, provide, justify, analyze, discuss, implement, harness, store, switch, consume, invest, emit, plug, unplug, save, agree","adjectives":"clean, renewable, natural, sustainable, efficient, environmental, green, resourceful, sunny, windy, limited, cost-effective","adverbs":"efficiently, sustainably, naturally, currently","adverbial_clauses":"because, since, as, due to, as a result of"},"pronunciation":"Focus on stress in multisyllabic and compound words (e.g., \"renew,\" \"renewable,\" \"preserve,\" \"preservation,\" \"energy,\" \"energetic,\" \"sustainable,\" \"sustainability,\" \"climate,\" and \"climatic\") Practice pronouncing minimal pairs with long and short vowels (e.g., /ɛ/ in \"pen\" and /eɪ/ in \"pain\")"},"pragmatic":["Explaining environmental benefits: \"Solar energy doesn't run out, helps keep the air clean, and preserves natural resources.\"","Justifying opinions: \"Renewable energy is better because it reduces pollution and preserves resources.\""],"sociolinguistic":"During discussions on Panama's use of renewable energy sources, provide solutions and ideas, focusing on justification and analysis (e.g., \"We need to reduce dependence on fossil fuels, increasing solar energy projects. This benefits both the environment and the economy.\")."},"assessment":["[{'id': 'grade9_scenario3_project1', 'name': 'Renewable Energy Infographic', 'category': 'Infographic Design', 'overview': 'Students design an infographic explaining different types of renewable energy sources. They use gerunds and the present simple to describe their importance (e.g., \"Saving energy is important.\").', 'skills': ['Environmental Awareness: Describing renewable energy and explaining its importance and benefits.', 'Presentation: Justifying renewable energy solutions.'], 'technology': ['Use infographic design tools, podcast platforms, and proposal writing software.']}, {'id': 'grade9_scenario3_project2', 'name': 'Renewable Energy Proposal', 'category': 'Proposal Writing', 'overview': 'Students collaborate on a proposal to increase their school\\'s use of renewable energy. They justify their suggestions using adverbial clauses and the present continuous (e.g., \"...because renewable energy helps...\").', 'skills': ['Environmental Awareness: Describing renewable energy and explaining its importance and benefits.', 'Presentation: Justifying renewable energy solutions.'], 'technology': ['Use infographic design tools, podcast platforms, and proposal writing software.']}, {'id': 'grade9_scenario3_project3', 'name': 'Renewable Energy Podcast', 'category': 'Podcast Creation', 'overview': \"Students create a podcast discussing Panama's renewable energy sources and their benefits, using the present simple and adverbial clauses to justify their claims.\", 'skills': ['Environmental Awareness: Describing renewable energy and explaining its importance and benefits.', 'Presentation: Justifying renewable energy solutions.'], 'technology': ['Use infographic design tools, podcast platforms, and proposal writing software.']}]"]},{"id":4,"title":"Our Indigenous Heritage","themes":["Learning About Our Diverse Cultures","Researching Our History"],"standards":{"listening":{"general":"Can identify main ideas, specific details, and speaker intent in short oral texts on familiar topics spoken at a moderate to normal speed.","specific":["Receptive: Demonstrate comprehension of detailed descriptions in personal stories.","Interactive: Interpret peer feedback in collaborative projects."],"learning_outcomes":["Can identify details from audio stories about Indigenous traditions in Panama (e.g., \"What materials are used to make the Emberá clothing?\" \"What instruments are played during Guna ceremonies?\" \"What foods are prepared for traditional Ngäbe-Buglé festivals?\").","Can interpret cultural descriptions and provide feedback (e.g., \"I think we can add a description of the traditional dance that the Emberá people perform at their festivals. It's a big part of their celebrations.\").","Can interpret peer feedback on a project about Indigenous cultures by summarizing key suggestions and identifying areas for improvement (e.g., \"My classmate liked the cultural elements in our project but suggested adding more pictures of the Guna people wearing traditional clothing to better showcase their culture.\")."]},"reading":{"general":"Can show comprehension of the main points in extended narratives and a variety of texts.","specific":["Reading: Comprehend descriptive texts about places or events.","Reading: Summarize the main points of different types of texts."],"learning_outcomes":["Can comprehend descriptive texts about Indigenous events in Panama (e.g., \"The festival has two main events: the traditional dance and the cooking contest. It's a time for the community to come together\").","Can summarize the main points of a text about Indigenous history (e.g., \"Identify customs practiced at the Ngäbe-Buglé community.\" \"Describe the beadwork used in Emberá traditional clothing.\" \"List the types of dances performed during Guna Yala ceremonies.\").","Can comprehend from descriptive texts details about Indigenous arts and crafts (e.g., \"The Guna people use bright colors like red, yellow, and blue in their art.\")."]},"speaking":{"general":"Can engage in conversations about familiar topics that involve following multi-step instructions, and describing stories in a straightforward way.","specific":["Productive: Narrate both fiction and non-fiction stories.","Interactive: Conduct interviews on personal interests."],"learning_outcomes":["Can narrate a story about an Indigenous festival in Panama's comarcas, including sensory details (e.g., \"At the Ngäbe-Buglé celebration, we saw woven chaquiras, heard traditional flute music, and watched the dancers perform their ancestral steps.\" \"During the Guna Yala celebration, we admired the vibrant molas with intricate patterns and listened to chants while the community shared stories of their ancestors.\" \"At the Emberá cultural festival, we saw beautifully painted jagua designs on the dancers' skin, heard the rhythmic beat of the drums, and tasted freshly cooked patacones.\").","Can conduct a brief interview about a peer's cultural background (e.g., \"What traditions does your family celebrate?\").","Can describe the history of an indigenous group in class discussions (e.g., \"I'm interested in learning about the Guna people's history\")."]},"writing":{"general":"Can compose short structured texts, including reflections, descriptive paragraphs, and surveys or forms, demonstrating clear organization with detailed content.","specific":["Productive: Write simple texts giving key information about oneself and one's culture.","Interactive: Edit narrative texts written by peers."],"learning_outcomes":["Can write a simple text sharing a personal cultural tradition (e.g., \"Describe your family's celebration of Carnival and explain a key tradition, such as attending parades or dancing at the culecos.\").","Can edit a peer's narrative on Indigenous traditions by suggesting additional details (e.g., \"I think you can add more details about the colors in traditional clothing.\").","Can edit a peer's descriptive paragraph on a festival (e.g., \"You could add some adjectives like 'colorful' or 'exciting' to make it sound more vivid and fun.\")."]},"mediation":{"general":"Can mediate peer interactions by resolving conflicts, interpreting information, and explaining abstract ideas with clarity and precision.","specific":["Text: Summarize articles for classroom discussions.","Concept: Explain cultural differences."],"learning_outcomes":["Can explain cultural differences by using pictures of traditional artifacts and gestures (e.g., points to a handmade Ngäbe-Buglé chácara and explaining how it is woven by hand, holds up a Guna Yala mola and describes its vibrant patterns and stories, or shows an Emberá basket and explains how it is crafted from natural fibers like palm leaves).","Can explain Indigenous cultural differences using visuals and gestures (e.g., shows a picture of traditional clothing and gestures to highlight its colors).","Can summarize key points from an article about indigenous cultures to help peers understand important traditions and practices during classroom discussions (e.g., creating a mind map about how the Naso Tjër Di celebrate their festival)."]}},"competences":{"linguistic":{"grammar":["Present simple and past simple for describing Indigenous cultures (e.g., \"There are eight Indigenous groups.\" \"Gunas migrated in the 16th century.\").","Adjectives for adding detail in descriptions (e.g., colorful traditional clothing)","Present perfect for ongoing actions (e.g., \"They have preserved traditions.\")"],"vocabulary":{"nouns":"Indigenous, cultures, traditions, patterns, diversity, migration, heritage, preservation, history, customs, ancestry, community, language, identity, art, knowledge, ritual, ceremony, belief, land, family roots, cultural background, beadwork","verbs":"preserve, respect, celebrate, migrate, honor, engage, discuss, propose, protect, sustain","adjectives":"vibrant, colorful, preserved, traditional, diverse, ancestral, cultural, historical"},"pronunciation":"Focus on stress in multisyllabic and compound words (e.g., \"Indigenous,\" \"ancestry,\" \"migration,\" \"identity,\" \"vibrant,\" and \"handmade.\") Practice minimal pairs with long and short vowels (e.g., /ə/ in \"but\" and /u/ in \"boot\")"},"pragmatic":["Acknowledging cultural value: \"The Guna people's customs are unique and valuable to our nation.\"","Sharing historical importance: \"Groups like the Emberá have lived here for centuries and maintain traditional ways.\""],"sociolinguistic":"Discuss the preservation of Indigenous cultures and propose ideas for cultural preservation in group projects (e.g., \"How have communities in Panama worked to preserve Indigenous cultures in recent years?\")."},"assessment":["[{'id': 'grade9_scenario4_project1', 'name': 'Indigenous Culture Website', 'category': 'Website Design', 'overview': \"Students will create a website dedicated to Panama's Indigenous cultures. They will describe their traditions and history, using the present simple and past tenses.\", 'skills': ['Cultural Exploration: Describing Indigenous history and cultures.', 'Communication: Highlighting cultural preservation efforts.'], 'technology': ['Use website design platforms, social media, and virtual exhibition tools.']}, {'id': 'grade9_scenario4_project2', 'name': 'Indigenous Heritage Exhibition', 'category': 'Virtual Exhibition', 'overview': \"Students create a virtual exhibition about Panama's Indigenous peoples, using adjectives to describe their clothing, customs, and cultural artifacts.\", 'skills': ['Cultural Exploration: Describing Indigenous history and cultures.', 'Communication: Highlighting cultural preservation efforts.'], 'technology': ['Use website design platforms, social media, and virtual exhibition tools.']}, {'id': 'grade9_scenario4_project3', 'name': 'Heritage Preservation Campaign', 'category': 'Social Media Campaign', 'overview': 'Students design a social media campaign to raise awareness of preserving Indigenous cultures. They use the present perfect to describe ongoing efforts (e.g., \"They have preserved their traditions by maintaining their cultural practices.\").', 'skills': ['Cultural Exploration: Describing Indigenous history and cultures.', 'Communication: Highlighting cultural preservation efforts.'], 'technology': ['Use website design platforms, social media, and virtual exhibition tools.']}]"]},{"id":5,"title":"Transportation in Panama","themes":["The Benefits of Public Transportation","Rules of the Road"],"standards":{"listening":{"general":"Can identify main ideas, specific details, and speaker intent in short oral texts on familiar topics spoken at a moderate to normal speed.","specific":["Receptive: Comprehend discussions on familiar subjects.","Interactive: Contribute to instructions in workshops."],"learning_outcomes":["Can comprehend discussions on road safety rules (e.g., \"Identify why wearing a seatbelt is life-saving.\" \"Using crosswalks in busy areas, like Avenida Balboa, is important to prevent an accident.\" \"Understand why using the sidewalk or staying out of the road is essential when walking near unlit roads in rural areas.\").","Can follow and contribute to instructions in workshops about public transportation (e.g., \"You should walk to the bus stop, then take bus number ten to get to the shopping mall.\").","Can follow instructions for a group activity on transportation options (e.g., \"I think using the bus is more cost-effective than taking a taxi because it's cheaper.\")."]},"reading":{"general":"Can show comprehension of the main points in extended narratives and a variety of texts.","specific":["Reading: Interpret written instructions for daily activities.","Reading: Evaluate text structures and elements."],"learning_outcomes":["Can interpret written instructions on using the metro or metro bus in Panama City (e.g., \"Explain steps for buying or recharging a Metrobus card at an Albrook station kiosk.\").","Can evaluate text structures in brochures about Panama's transit systems (e.g., \"I can see sections like Routes, Ticket Prices, and Timetables. These headings help organize the information clearly.\").","Can interpret directions for navigating a local transit map (e.g., \"To find the bus stop, follow the red line on the map. The bus stop is near the library, right after the park.\")."]},"speaking":{"general":"Can engage in conversations about familiar topics that involve following multi-step instructions, and describing stories in a straightforward way.","specific":["Productive: Talk about daily routines.","Interactive: Participate in class discussions on everyday topics."],"learning_outcomes":["Can talk about a daily routine involving transportation (e.g., \"Every day, I take the bus to school at 5 a.m., and it's usually crowded.\" \"I walk to school along the main road in my town every morning, and I cross the street at the crosswalk near the market.\" 'I take a boat to school from my village in Portobelo, and the ride takes about 20 minutes.\").","Can participate in discussions about transportation preferences (e.g., \"I take the bus because it's more affordable, but the metro is the easiest and fastest way to get around the city.\").","Can discuss road safety rules with specific examples (e.g., \"We have to wear seat belts in the car to stay safe.\")."]},"writing":{"general":"Can compose short structured texts, including reflections, descriptive paragraphs, and surveys or forms, demonstrating clear organization with detailed content.","specific":["Productive: Write instructions for a simple task.","Interactive: Create responses to class survey questions."],"learning_outcomes":["Can write simple instructions for taking transportation to a specific location (e.g., \"To travel from Changuinola to Panama City, first go to the bus terminal and purchase your ticket. Then, board the bus heading to Albrook Terminal. The trip takes about ten hours, so bring snacks and water. Once you arrive, you can take a taxi or the metro to your final destination.\").","Can create responses to survey questions about transportation preferences (e.g., \"Answer with your preference: bus or car, and why.\").","Can write simple instructions about road safety rules (e.g., Some road safety rules are: wear your seatbelt in the car, do not cross the street when the red light is on, and walk on the left side of the sidewalk.\")."]},"mediation":{"general":"Can mediate peer interactions by resolving conflicts, interpreting information, and explaining abstract ideas with clarity and precision.","specific":["Communication: Facilitate a discussion on a group project.","Concept: Interpret graphical information for classmates."],"learning_outcomes":["Can facilitate a group discussion on transportation options by encouraging participation and managing turn-taking, using supportive gestures and prompts to guide the flow of ideas (e.g., gestures toward the speaker to indicate their turn and asks, \"Who would like to share their thoughts on the best route?\").","Can interpret a transportation map by pointing out key locations and using simple explanations (e.g., points to the bus stop in Boquete and explain that it leads to the David terminal, where travelers can catch a bus to Panama City or other destinations).","Can explain public transportation rules using simple words and two languages when necessary (e.g., describes \"fare\" in both English and familiar language)."]}},"competences":{"linguistic":{"grammar":["Modal verbs for advice and obligation (e.g., \"You should take the bus.\" \"You have to stop at red lights.\")","Comparatives and superlatives (e.g., \"The train is faster than the bus.\" \"The plane is the fastest.\")","Phrasal verbs related to transportation (e.g., \"get on\" and \"take off\")"],"vocabulary":{"nouns":"transportation, benefits, rules, road, bus, car, plane, safety, convenience, traffic, vehicle, journey, passenger, highway, route, fare, train, schedule, distance, protocol, delay, rush hour, seatbelt, traffic light, sidewalk","verbs":"travel, drive, fly, ride, follow, suggest, compare, prefer, choose, commute, tap in, get on, get off, wear, board, arrive, catch, avoid, depart, hop on, hope","adjectives":"faster, safest, cheapest, convenient, efficient, reliable, safe, crowded, public, private"},"pronunciation":"Focus on stress in multisyllabic and compound words (e.g., \"transport,\" \"transportation,\" \"convenience,\" \"schedule,\" \"passenger,\" \"vehicle,\" and \"highway\") Practice distinguishing between long and short vowels in minimal pairs (e.g., /æ/ in \"passenger\" versus /ɔː/ in \"port,\" /æ/ in \"tap\" versus /eɪ/ in \"tape\" and /ɒ/ \"hop\" versus /oʊ/ in \"hope\" ) Use word lists and sentence examples to help reinforce vowel contrasts (e.g., \"The passenger taps in when boarding the bus and tapes the badge to their luggage.\" \"I hope you can hop on the bus before it leaves.\")"},"pragmatic":["Making suggestions for convenience: \"Taking the bus is more affordable and avoids traffic.\"","Emphasizing safety in travel: \"You have to follow rules like wearing seatbelts to stay safe on the road.\""],"sociolinguistic":"Participate in role-plays about transportation options and safety rules, providing comparative analyses and following local protocols (e.g., The driver reminds the passengers to follow safety rules before the taxi trip begins by saying, \"Please put your seatbelt on.\")."},"assessment":["[{'id': 'grade9_scenario5_project1', 'name': 'Transportation Map Design', 'category': 'Map Design', 'overview': 'Students design a transportation map of their city, using comparative and superlative forms to describe the fastest and most convenient transportation methods.', 'skills': ['Problem-Solving: Comparing and discussing transportation in Panama.', 'Communication: Giving advice and safety rules to others.'], 'technology': ['Use map design software, video editing tools, and app prototyping platforms.']}, {'id': 'grade9_scenario5_project2', 'name': 'Public Transport Video Public Service Announcement (PSA)', 'category': 'Video Creation', 'overview': 'Students create a PSA about the benefits of public transportation, using modals of obligation and advice (e.g., \"You should take the bus.\").', 'skills': ['Problem-Solving: Comparing and discussing transportation in Panama.', 'Communication: Giving advice and safety rules to others.'], 'technology': ['Use map design software, video editing tools, and app prototyping platforms.']}, {'id': 'grade9_scenario5_project3', 'name': 'Transportation Safety App Prototype', 'category': 'App Prototyping', 'overview': 'Students design an app to promote transportation safety, using phrasal verbs and modal verbs to explain safety rules (e.g., \"You have to wear your seatbelt.\").', 'skills': ['Problem-Solving: Comparing and discussing transportation in Panama.', 'Communication: Giving advice and safety rules to others.'], 'technology': ['Use map design software, video editing tools, and app prototyping platforms.']}]"]},{"id":6,"title":"Wellness: A Way of Life","themes":["How Exercise Helps My Body","The Benefits of Mindfulness"],"standards":{"listening":{"general":"Can identify main ideas, specific details, and speaker intent in short oral texts on familiar topics spoken at a moderate to normal speed.","specific":["Receptive: Follow instructions in educational videos.","Interactive: Respond to questions in group discussions."],"learning_outcomes":["Can follow instructions in educational videos on exercise routines (e.g., \"Demonstrate a stretching routine often used before school sports events.\").","Can respond to questions in discussions about wellness habits (e.g., \"I practice mindfulness because it helps me relax and focus better on my studies. It makes me feel calm and peaceful.\").","Can answer questions about the benefits of mindfulness (e.g., \"Relaxation is important because it reduces stress and makes you feel better.\")."]},"reading":{"general":"Can show comprehension of the main points in extended narratives and a variety of texts.","specific":["Reading: Outline the main information from simple diagrams (e.g., graphs, bar charts).","Reading: Recognize the language on a simple form asking for personal information."],"learning_outcomes":["Can outline key po
