ints from bar charts on fitness benefits and connect them to physical education and extracurricular activities (e.g., \"List two main benefits of regular exercise for students who participate in physical education or extracurricular activities like baseball, soccer, volleyball, and folkloric dance.\").","Can recognize the language used on wellness questionnaires (e.g., \"On the health check-in form, I need to fill out my name, age, and how many hours I sleep each night.\").","Can outline information from graphs on stress-reduction techniques (e.g., \"The graph indicates that deep breathing techniques are the most commonly used method by students to reduce stress, followed by meditation and exercise.\")."]},"speaking":{"general":"Can engage in conversations about familiar topics that involve following multi-step instructions, and describing stories in a straightforward way.","specific":["Productive: Talk about daily routines.","Interactive: Engage in role-plays based on common social situations."],"learning_outcomes":["Can describe daily wellness routines using appropriate vocabulary (e.g., \"I walk to school every morning for exercise.\" \"I stretch before soccer practice.\" \"I take ten deep breaths before studying or taking a test to clear my mind and focus.\").","Can engage in role-plays about wellness habits (e.g., pretends to explain \"I do yoga because it helps me relax.\").","Can role-play explaining a mindfulness activity (e.g., \"Let's breathe deeply to relax our minds and bodies.\")."]},"writing":{"general":"Can compose short structured texts, including reflections, descriptive paragraphs, and surveys or forms, demonstrating clear organization with detailed content.","specific":["Productive: Compose a personal diary entry.","Interactive: Comment on peers' writing in various formats, including on paper and online."],"learning_outcomes":["Can write a diary entry about personal wellness activities, including details about mindfulness and exercise habits and their impact on daily tasks (e.g., \"Every morning, I stretch and meditate for five minutes before school. It helps me stay focused and calm during lessons.\" \"After soccer practice, I take time to reflect on my progress, which helps me feel more motivated.\").","Can comment on a peer's wellness routine entry (e.g., \"I think you can add riding a bike to your routines.\").","Can give feedback on a peer's mindfulness routine description (e.g., \"I loved your tips for mindfulness. Maybe you can add a note on how mindfulness helps with stress.\")."]},"mediation":{"general":"Can mediate peer interactions by resolving conflicts, interpreting information, and explaining abstract ideas with clarity and precision.","specific":["Communication: Resolve misunderstandings in peer interactions.","Concept: Interpret graphical information for classmates."],"learning_outcomes":["Can help peers understand wellness activities by demonstrating exercises with body language (e.g., shows a stretching exercise while explaining its purpose).","Can interpret graphs on exercise benefits by pointing out data and explaining it in simple terms, using familiar extracurricular activities in Panama (e.g., points to the bar on the chart that shows how students' energy improved after practicing baseball or folkloric dance, and explains how the graph shows students' stress levels decreased after participating in track and field or afternoon meditation sessions).","Can clarify wellness terms by using both English and familiar language (e.g., describes \"mindfulness\" in simple terms in both languages)."]}},"competences":{"linguistic":{"grammar":["Present continuous for ongoing actions (e.g., \"I am practicing mindfulness.\")","Present simple for general statements (e.g., \"Mindfulness has many benefits.\")","Collocations with health-related verbs (e.g., energy boost)"],"vocabulary":{"nouns":"wellness, mindfulness, exercise, energy, benefits, strength, flexibility, health, body, mental well-being, routine, practice, meditation, relaxation, nutrition, balance, endurance, resilience, focus, habit","verbs":"boost, improve, strengthen, relax, meditate, exercise, promote, balance, enhance, maintain, walk, stretch, breathe, focus, hydrate","adjectives":"mental, physical, healthy, strong, flexible, mindful, energized, balanced, calm, peaceful"},"pronunciation":"Focus on stress in multisyllabic and compound words (e.g., \"flexible,\" \"flexibility,\" \"resilience,\" \"resilient,\" and \"mindfulness\") Practice distinguishing between long and short vowels in minimal pairs (e.g., /ʊ/ in \"could\" versus /uː/ in \"cooed\", /ʊ/ in \"soot\" versus /uː/ in \"suit\"). Use minimal pair drills and sentences to practice vowel contrasts (e.g., \"He could wear a suit to the meeting.\" \"He cooed at the baby while cleaning the soot from the chimney.\")."},"pragmatic":["Sharing wellness practices: \"I exercise three times a week to stay fit and focused.\"","Supporting varied routines: \"Some people like to meditate because it helps them manage stress.\""],"sociolinguistic":"Engage in group discussions on wellness routines, contributing suggestions and solutions to promote mental and physical well-being."},"assessment":["[{'id': 'grade9_scenario6_project1', 'name': 'Wellness Blog', 'category': 'Blogging', 'overview': 'Students create a blog to share their wellness routines. They describe their habits, using the present continuous and present simple (e.g., \"I am practicing mindfulness.\").', 'skills': ['Personal Reflection: Describing ongoing wellness routines using the present continuous.', 'Communication: Leading a wellness workshop and giving advice using collocations.'], 'technology': ['Use blogging platforms, workshop planning tools, and app review software.']}, {'id': 'grade9_scenario6_project2', 'name': 'Wellness Workshop', 'category': 'Workshop Planning', 'overview': 'Students design and facilitate a wellness workshop for their peers, using collocations with health-related verbs (e.g., energy boost).', 'skills': ['Personal Reflection: Describing ongoing wellness routines using the present continuous.', 'Communication: Leading a wellness workshop and giving advice using collocations.'], 'technology': ['Use blogging platforms, workshop planning tools, and app review software.']}, {'id': 'grade9_scenario6_project3', 'name': 'Fitness Tracker App Review', 'category': 'App Review', 'overview': 'Students review popular fitness tracker apps, using wh-questions to analyze their benefits (e.g., \"How can mindfulness help your health?\").', 'skills': ['Personal Reflection: Describing ongoing wellness routines using the present continuous.', 'Communication: Leading a wellness workshop and giving advice using collocations.'], 'technology': ['Use blogging platforms, workshop planning tools, and app review software.']}]"]},{"id":7,"title":"We Are What We Eat!","themes":["Why Is Nutrition Important?","Healthy Food for a Balanced Diet"],"standards":{"listening":{"general":"Can identify main ideas, specific details, and speaker intent in short oral texts on familiar topics spoken at a moderate to normal speed.","specific":["Receptive: Interpret spoken advice on common problems.","Interactive: Engage in role-play exercises."],"learning_outcomes":["Can interpret spoken advice about nutrition and summarize key points about eating balanced meals and local Panamanian foods (e.g., \"Summarize advice on eating balanced meals, such as including fresh tropical fruits like mangos or plantains.\").","Can engage in role-play exercises on healthy eating by offering suggestions (e.g., \"You should try adding an apple to your lunch. It's a great source of vitamins and fiber!\").","Can engage in discussions by asking questions about food choices (e.g., \"Why is it important to eat vegetables every day? What do they do for our bodies?\")."]},"reading":{"general":"Can show comprehension of the main points in extended narratives and a variety of texts.","specific":["Reading: Analyze articles on general interest topics.","Reading: Identify the main topic and related ideas in a simple structured text."],"learning_outcomes":["Can analyze articles about balanced diets by identifying key nutritional information (e.g., \"The article mentions that fiber and protein are essential for digestion and for keeping us full.\").","Can identify the main topic and related ideas in texts on healthy eating (e.g., \"Explain the main topic and two benefits of eating balanced meals that include Panamanian staples, such as rice, guandú, and fish.\").","Can analyze articles on food choices and their health impacts (e.g., \"The article explains why whole grains are good for us. They help with digestion and give us energy.\")."]},"speaking":{"general":"Can engage in conversations about familiar topics that involve following multi-step instructions, and describing stories in a straightforward way.","specific":["Productive: Explain how to follow and prepare recipes.","Interactive: Respond to peers in group activities."],"learning_outcomes":["Can explain steps to prepare a simple healthy meal (e.g., \"To make a Panamanian-style fruit salad, chop fresh pineapples, mangos, and papayas. Then, add a squeeze of orange for extra flavor.\").","Can express opinions about food choices (e.g., \"I think fruits are the best choice because they have vitamins.\").","Can respond to peers' suggestions in group discussions on nutrition (e.g., \"If you eat enough fruits and vegetables, you will stay healthy.\" \"Yes, I agree, eating vegetables helps us stay healthy.\")."]},"writing":{"general":"Can compose short structured texts, including reflections, descriptive paragraphs, and surveys or forms, demonstrating clear organization with detailed content.","specific":["Productive: Create a narrative about a memorable event or occurrence.","Interactive: Create responses to class survey questions."],"learning_outcomes":["Can write a short narrative about a memorable meal with family, including traditional Panamanian foods (e.g., \"Describe the special Sunday meal of your abuelita's sancocho and rice and explain why it's meaningful to your family.\").","Can create responses to questions about dietary choices (e.g., \"I often eat yogurt because it's healthy and has probiotics that help with digestion.\").","Can respond to survey questions on food preferences (e.g., \"I prefer fruits over other snacks because they are natural and provide more nutrients.\")."]},"mediation":{"general":"Can mediate peer interactions by resolving conflicts, interpreting information, and explaining abstract ideas with clarity and precision.","specific":["Text: Mediate school announcements for new students.","Communication: Facilitate a discussion on a group project."],"learning_outcomes":["Can mediate school announcements on healthy practices for peers by using simple words and two languages if needed (e.g., explains \"balanced\" in both English and familiar language).","Can facilitate a discussion on healthy eating by guiding turn-taking and encouraging classmates to share (e.g., encourages each student to share a favorite healthy food).","Can help peers understand balanced diets by using simple words and two languages if needed (e.g., explains \"balanced\" using examples like eating both meat and vegetables during lunch or adding fruit for dessert.\")."]}},"competences":{"linguistic":{"grammar":["Modal \"should\" for giving advice (e.g., \"You should eat more fruits.\")","First conditional for facts (e.g., \"If you eat well, you stay healthy.\")","Adverbial clauses for justification (e.g., \"Good nutrition is important because it...\")"],"vocabulary":{"nouns":"nutrition, health, benefits, balanced diet, fruits, vegetables, grains, meals, vitamins, minerals, nutrients, fiber, protein, carbohydrates, hydration, calories, metabolism, antioxidants, superfoods, digestion, staple","verbs":"eat, prefer, improve, consume, digest, nourish, balance, advise, recommend, avoid","adjectives":"healthy, balanced, nutritious, beneficial, whole, fresh, organic, low-fat, natural, processed"},"pronunciation":"Focus on stress in multisyllabic and compound words (e.g., \"metabolism,\" \"antioxidant,\" \"carbohydrate,\" \"vitamin,\" and \"organic\") Practice minimal pairs with long and short vowels (e.g., /ɪ/ in \"bit\" and /i/ in \"beat\")"},"pragmatic":["Offering dietary advice: \"You should eat more fruits and vegetables for a balanced diet.\"","Explaining nutrition benefits: \"If we eat a mix of foods, it will give us energy and help us stay healthy.\""],"sociolinguistic":"Provide advice on improving nutrition during role-play conversations and debates about the importance of healthy eating habits (e.g., \"You should try eating more fruits and vegetables during lunch because they give you vitamins. For example, if you eat a balanced breakfast, you will stay focused longer during class.\"). Discuss how healthy eating differs between family celebrations in Panama (e.g., arroz con pollo) and special meals in other cultures."},"assessment":["[{'id': 'grade9_scenario7_project1', 'name': 'Healthy Recipe Video Tutorial', 'category': 'Video Creation', 'overview': 'Students create video tutorials for healthy recipes, using modal verbs for advice (e.g., \"You should eat more vegetables.\").', 'skills': ['Nutrition Awareness: Giving advice about eating habits.', 'Visual Communication: Designing infographics and campaigns about nutrition.'], 'technology': ['Use video editing tools, infographic design platforms, and social media for campaigns.']}, {'id': 'grade9_scenario7_project2', 'name': 'Nutrition Infographic', 'category': 'Infographic Design', 'overview': 'Students design an infographic about balanced diets, using the first conditional to explain health benefits (e.g., \"If you eat well, you stay healthy.\").', 'skills': ['Nutrition Awareness: Giving advice about eating habits.', 'Visual Communication: Designing infographics and campaigns about nutrition.'], 'technology': ['Use video editing tools, infographic design platforms, and social media for campaigns.']}, {'id': 'grade9_scenario7_project3', 'name': 'School Nutrition Campaign', 'category': 'Social Media Campaign', 'overview': 'Students develop a campaign promoting healthy eating in their school, using wh-questions to gather data on food preferences.', 'skills': ['Nutrition Awareness: Giving advice about eating habits.', 'Visual Communication: Designing infographics and campaigns about nutrition.'], 'technology': ['Use video editing tools, infographic design platforms, and social media for campaigns.']}]"]},{"id":8,"title":"Our Wonderful Ocean","themes":["The Animals in Our Waters","Plants That Live in the Ocean"],"standards":{"listening":{"general":"Can identify main ideas, specific details, and speaker intent in short oral texts on familiar topics spoken at a moderate to normal speed.","specific":["Receptive: Analyze the tone and purpose of spoken advertisements.","Interactive: Participate in group problem-solving sessions."],"learning_outcomes":["Can analyze the tone and purpose in Public Service Announcements (PSAs) from local organizations about marine conservation (e.g., \"Identify if a PSA about the Panama Bay wetlands by MarViva is persuasive or informative.\" \"Determine if a government announcement about protecting mangroves is raising awareness or promoting action.\").","Can ask questions to clarify information on marine life (e.g., \"Why is it important to protect coral reefs from pollution?\" \"Reefs provide a habitat for a lot of ocean life.\").","Can participate in group problem-solving discussions by sharing actionable ideas to protect Panama's oceans and coastal ecosystems (e.g., \"Suggest organizing a mangrove replanting day in Juan Díaz to reduce erosion and protect marine life.\" \"Propose creating an educational campaign in schools to teach students about avoiding single-use plastics.\" \"Recommend participating in a beach cleanup at Isla Taboga to reduce plastic waste and raise awareness about marine conservation.\")."]},"reading":{"general":"Can show comprehension of the main points in extended narratives and a variety of texts.","specific":["Reading: Outline the main information from simple diagrams (e.g., graphs, bar charts).","Reading: Comprehend descriptive texts about places or events."],"learning_outcomes":["Can outline the main points from bar charts about marine biodiversity in Panama by identifying key species and trends (e.g., \"List the two most common species found in Coiba National Park's coral reefs.\" \"Summarize the percentage of mangrove coverage shown in the chart for the Gulf of Montijo\" \"Identify changes in fish populations in the Bay of Panama over time-based on the bar chart.\").","Can comprehend descriptive texts about ocean ecosystems in Panama by identifying key characteristics and ecological importance (e.g., \"Describe the coral formations and marine species found in Isla Iguana's reef.\" \"Explain why the Bocas del Toro archipelago is known for its seagrass beds and dolphin populations.\" \"List the unique species that thrive in the Coiba National Park marine reserve.\").","Can outline trends from graphs about ocean pollution levels (e.g., \"The graph shows that plastic waste in the ocean has increased over the past five years.\")."]},"speaking":{"general":"Can engage in conversations about familiar topics that involve following multi-step instructions, and describing stories in a straightforward way.","specific":["Productive: Discuss plans for the future on a variety of topics.","Interactive: Engage in debates on familiar topics."],"learning_outcomes":["Can discuss plans related to ocean conservation, educational visits, or recreational activities in Panama's coastal areas (e.g., \"Next weekend, I am going to visit Punta Culebra to learn about sea turtle conservation.\" \"My family is planning a trip to El Escudo de Veraguas to enjoy the beach and learn about its marine biodiversity.\" 'In the future, I want to participate in a beach cleanup at Playa Venao to help reduce plastic waste.\").","Can engage in a debate about protecting marine life by presenting arguments and supporting evidence related to local conservation efforts (e.g., \"I believe fishing limits near Coiba National Park are necessary to protect endangered fish species like the grouper and ensure sustainable fishing for future generations.\" \"I think stricter regulations around Isla Iguana are important because its coral reefs provide shelter for many species and attract eco-tourism during whale season, which benefits the community.\").","Can share future goals related to ocean conservation (e.g., \"I am planning to join a group that cleans beaches to protect wildlife.\")."]},"writing":{"general":"Can compose short structured texts, including reflections, descriptive paragraphs, and surveys or forms, demonstrating clear organization with detailed content.","specific":["Productive: Write a formal letter to request information.","Interactive: Create a collaborative proposal for a class project."],"learning_outcomes":["Can compose a formal letter requesting information about local marine conservation initiatives in Panama (e.g., \"Request details about volunteering for an ocean cleanup event at Veracruz Beach or participating in a coral reef restoration project at Isla Iguana.\").","Can contribute to a group project description on protecting marine ecosystems (e.g., \"We should mention how protecting marine life can help maintain a healthy environment.\").","Can collaborate on a proposal for a project on ocean conservation (e.g., \"We should reduce plastic use because it harms marine life and pollutes the oceans.\")."]},"mediation":{"general":"Can mediate peer interactions by resolving conflicts, interpreting information, and explaining abstract ideas with clarity and precision.","specific":["Communication: Participate in conflict resolution strategies with peers.","Concept: Simplify complex concepts for group comprehension."],"learning_outcomes":["Can help resolve disagreements on marine conservation ideas by encouraging active listening and respectful turns (e.g., suggests that each student listens fully before responding).","Can simplify ocean ecosystem concepts, using visuals and gestures (e.g., uses hand motions to show how coral reefs provide homes for fish).","Can clarify marine terms in both English and a familiar language for better understanding (e.g., explains \"ecosystem\" in simple words and both languages if needed)."]}},"competences":{"linguistic":{"grammar":["Present simple for describing ocean life (e.g., \"There are many species of fish in our waters.\")","Present continuous for ongoing actions (e.g., \"The sharks are swimming around the coral reef.\")","Modals for suggestions and obligations (e.g., \"We should protect our oceans.\")"],"vocabulary":{"nouns":"ocean, animals, plants, species, coral reefs, marine life, ecosystem, pollution, habitat, biodiversity, fish, currents, shoreline, water, seaweed, plankton, conservation, coastal areas, waves, preservation, Public Service Announcements (PSAs), mangroves, protected zones","verbs":"protect, swim, migrate, pollute, conserve, preserve, sustain, clean, adapt, survive, rehabilitate","adjectives":"marine, aquatic, endangered, diverse, fragile, polluted, healthy, vast, underwater, sustainable"},"pronunciation":"Focus on stress in multisyllabic and compound words (e.g., \"ocean,\" \"ecosystem,\" \"biodiversity,\" \"environment,\" \"environmental,\" \"fragile,\" and \"endangered\") Practice pronunciation of minimal pairs with long and short vowels (e.g., /i/ in \"reef\" and /ɪ/ in \"riff\")"},"pragmatic":["Proposing conservation actions: \"We should stop littering near oceans to protect marine animals.\"","Describing ecological importance: \"Coral reefs are home to many species, so we need to protect them to keep marine life safe.\""],"sociolinguistic":"Provide suggestions during discussions on marine protection and participate in debates on environmental conservation strategies (e.g., \"We should establish more marine protected areas to help preserve ocean biodiversity.\")."},"assessment":["[{'id': 'grade9_scenario8_project1', 'name': 'Marine Life Photo Essay', 'category': 'Photography', 'overview': 'Students create a photo essay documenting marine life, using the present simple and adjectives to describe sea animals and plants (e.g., \"There are many species of fish.\").', 'skills': ['Environmental Awareness: Describing ocean life and suggesting conservation actions.', 'Communication: Using modals and the present continuous in marine life discussions.'], 'technology': ['Use photo editing software, 3D modeling tools, and social media for campaigns.']}, {'id': 'grade9_scenario8_project2', 'name': 'Ocean Conservation Campaign', 'category': 'Social Media Campaign', 'overview': 'Students create an ocean conservation campaign, using modals to suggest actions (e.g., \"We have to protect our oceans.\").', 'skills': ['Environmental Awareness: Describing ocean life and suggesting conservation actions.', 'Communication: Using modals and the present continuous in marine life discussions.'], 'technology': ['Use photo editing software, 3D modeling tools, and social media for campaigns.']}, {'id': 'grade9_scenario8_project3', 'name': 'Coral Reef 3D Model', 'category': '3D Modeling', 'overview': 'Students design a 3D model of a coral reef ecosystem, using the present continuous to describe the actions of marine life (e.g., \"The sharks are swimming.\").', 'skills': ['Environmental Awareness: Describing ocean life and suggesting conservation actions.', 'Communication: Using modals and the present continuous in marine life discussions.'], 'technology': ['Use photo editing software, 3D modeling tools, and social media for campaigns.']}]"]}]},"Grade 10":{"level":"B1.1","scenarios":[{"id":1,"title":"Let's Start a Club!","themes":["There Are So Many Types of Clubs!","Learning to Manage a Club"],"standards":{"listening":{"general":"","specific":["Receptive: Extract key factual information, such as dates, numbers, and quantities, from a presentation.","Interactive: Interpret and relay information in pair and group discussions."],"learning_outcomes":["Can extract detailed factual information from conversations and presentations about club-related tasks, such as goals, timelines, and membership requirements (e.g., 'What are the club's main objectives?' 'When is the registration deadline?' 'How many members are needed for the environmental clean-up event?').","Can interpret and relay key details about different club activities from discussions based on a presentation or lecture (e.g., 'The types of clubs mentioned are the social, sports, and academic clubs.').","Can follow a presentation on club organization and answer specific questions (e.g., 'What date is the club fair?' 'The club fair is scheduled for next Thursday.')."]},"reading":{"general":"","specific":["Reading: Distinguish between facts and opinions in texts on everyday subjects.","Reading: Derive the meaning of simple unknown words from short texts."],"learning_outcomes":["Can distinguish between facts and opinions in announcements, posters, or newsletters about school events (e.g., Fact: 'The music club practices every Thursday.' Opinion: 'The music club is the most fun because it's energetic.').","Can find the meaning of unknown words in a text about club activities (e.g., 'I think in this sentence, 'engage' means to participate actively.').","Can separate factual and opinion-based statements in a list of club benefits (e.g., Fact: 'It is beneficial to join social clubs.' Opinion: 'I believe joining a club improves your social skills.')."]},"speaking":{"general":"","specific":["Productive: Narrate a story or an experience in a structured way.","Interactive: Negotiate project roles and tasks within a group."],"learning_outcomes":["Can narrate a personal experience related to a club activity by including key details and a clear sequence of events (e.g., 'Last year, I joined a sports club at school. First, I signed up during the club fair and then attended weekly practice sessions. During those meetings, I learned new skills and made new friends. Finally, we participated in a school tournament, and it was an unforgettable experience.').","Can negotiate project roles in a group discussion about starting a club by suggesting real club positions and responsibilities (e.g., 'Let's decide who will be the president to lead meetings, the secretary to take notes, and the treasurer to manage the club's budget.').","Can express a preference for a club role and explain reasons (e.g., 'I'd like to be the treasurer because I am good at math.')."]},"writing":{"general":"","specific":["Productive: Develop a notice that clearly conveys information.","Interactive: Participate in a written discussion on paper, through apps, online, or in a forum discussion."],"learning_outcomes":["Can write a short notice to recruit club members that can be shared in any classroom (e.g., 'Join our art club! We meet weekly to create projects together.').","Can respond to a question in a forum about club preferences within classroom settings by providing meaningful reasons (e.g., 'I chose the environmental club because we can help reduce waste by organizing a school-wide recycling program.' 'I joined the debate club because it helps me improve my critical thinking and public speaking skills.').","Can write a brief post describing club goals and activities that can happen in flexible spaces (e.g., 'Our social club meets to share ideas and help each other.')."]},"mediation":{"general":"","specific":["Communication: Facilitate discussions on project goals and tasks.","Text: Clarify written instructions in collaborative projects."],"learning_outcomes":["Can facilitate group discussions by encouraging participation, clarifying ideas, and summarizing goals (e.g., 'Let's brainstorm ideas for improving the club activities.' 'So far, we've agreed to organize a school clean-up day and a community reading event.').","Can clarify written instructions for organizing a club activity by providing a visual checklist (e.g., drawing steps on the board: 'Step 1: Find members; Step 2: Choose activities').","Can help group members understand club tasks by rephrasing instructions (e.g., 'Let's set up a meeting every week,' while pointing to a calendar.)."]}},"competences":{"linguistic":{"grammar":["Simple present for describing things and preferences (e.g., 'There are many types of clubs.' 'I like this club because we can use any room to work together.')","Imperatives for instructions (e.g., 'Set goals,' 'Let's plan activities')","Simple past (e.g., 'Last year, I joined a sports club, and I made new friends.')"],"vocabulary":["clubs","interests","sports","activities","goals","members","requirements","survey","structure","responsibilities","roles","meetings","team","project","event","community","feedback","suggestions","participation","leadership","manage","negotiate","plan","organize","create","engage","discuss","respond","coordinate","assign","delegate","evaluate","contribute","participate","schedule","arrange","support","facilitate","social","structured","organized","goal-oriented","collaborative","responsible","respectful","inclusive","team-based","supportive"],"pronunciation":"Practice the pronunciation of contrastive sounds, focusing on single and double consonants (e.g., /pr/ in 'project' and /tr/ in 'treasure,' /p/ in 'participate' and /t/ in 'team'). Emphasize the stress on the third syllable from the end in verbs ending in -ate (e.g., 'delegate,' 'coordinate,' and 'negotiate'). Stress on imperatives for giving instructions (e.g., emphasize the imperative in 'set goals')."},"pragmatic":"Asking about club preferences (e.g., 'What type of club would you like to join?'). Narrating stories (e.g., 'Last year, I joined a sports club, and I made new friends.').","sociolinguistic":"Negotiate roles and responsibilities when planning a school or community club, responding clearly to feedback and suggestions (e.g., 'I would like to be the treasurer because I am good at math.')."},"assessment":[]},{"id":2,"title":"Advice for Success","themes":["Academic Achievement and Skill Development: How?","My Advice for a Ninth Grader"],"standards":{"listening":{"general":"","specific":["Receptive: Follow the main points in a simple audio recording aimed at a general audience.","Interactive: Organize information from group discussions."],"learning_outcomes":["Can follow the main points in a simple audio recording about study tips and academic advice, identifying key strategies and examples (e.g., 'Lucia said that if I studied regularly, I would get better grades.' 'You should take breaks while studying to stay focused.').","Can identify specific details in a motivational talk on skill development, focusing on future advice (e.g., 'The speaker said that if you practice public speaking, you will gain more confidence.' 'You should set clear goals for the trimester.').","Can organize information from a group discussion on academic goals, summarizing advice given by peers (e.g., 'Kathy suggested that you could manage your time better, and Mariana added that if you joined a study group, you might improve your understanding.')."]},"reading":{"general":"","specific":["Reading: Analyze informational content for specific data.","Reading: Make basic inferences or predictions about a text content from headings, titles, or headlines."],"learning_outcomes":["Can analyze informational texts about academic success to find specific study tips and strategies (e.g., 'The article says that we should create a study schedule to manage our time better.').","Can make predictions about a text's content based on its title or headings. (e.g., 'From the title 'Top 5 Study Tips for Success,' I think the article will suggest ideas like setting goals or taking breaks.').","Can infer the purpose of a section in a study guide by analyzing headings and key phrases. (e.g., 'The heading 'Time Management Strategies' suggests this section will explain how to organize study time effectively.')."]},"speaking":{"general":"","specific":["Productive: Present a summary of information depicted in a book or article.","Interactive: Participate in group discussions on current events."],"learning_outcomes":["Can present a summary of academic advice from an article, highlighting key points and examples (e.g., 'The article explains that if you organize your notes, you will study more effectively. It also suggests taking regular breaks.').","Can participate in group discussions about study habits, sharing personal tips and advice (e.g., 'I think using flashcards really helps. Rubiela recommended that I should try them for vocabulary practice.').","Can express agreement or disagreement during discussions on academic success strategies, providing reasons for their opinions (e.g., 'I agree that setting goals is important because it helps me stay focused.' 'I don't think studying late at night is effective, since I get too tired.')."]},"writing":{"general":"","specific":["Productive: Write a review of a recent event, place, or product.","Interactive: Write collaborative stories or articles."],"learning_outcomes":["Can write a review of a study app or tool, describing its features and usefulness for academic success (e.g., 'This app is great for organizing notes. It helps you stay focused and manage your time better.').","Can collaborate with classmates to write an article on effective study habits, sharing personal experiences and advice (e.g., 'Otto suggested that if I studied earlier, I wouldn't feel so rushed before exams. He recommends setting daily study goals to avoid last-minute cramming.').","Can write a short review of a recent school event, highlighting its impact on academic skills (e.g., 'The study skills workshop was helpful. We learned how to take better notes and manage time effectively.')."]},"mediation":{"general":"","specific":["Communication: Resolve conflicts in group settings.","Text: Summarize complex texts for peers."],"learning_outcomes":["Can resolve simple conflicts in group study sessions by suggesting fair solutions and using clarifying language (e.g., says, 'Let's split the tasks evenly so everyone has a fair part. I'll take notes, and you can make the slides.').","Can summarize the main points of an academic article for peers, highlighting key advice and strategies (e.g., 'This article explains that setting study goals improves focus. Juan pointed out that reviewing notes daily helps retain information better.').","Can mediate disagreements in group projects by rephrasing ideas and ensuring everyone's opinions are heard (e.g., 'Mariana suggested that if we combine both ideas, we can create a stronger project. What does everyone think?')."]}},"competences":{"linguistic":{"grammar":["Second conditional for giving advice (e.g., 'If I studied harder, I would get better grades.' 'If I practiced English more, I would improve my speaking skills.' 'If I were more organized, I would achieve my academic goals.')","Modals for giving advice (e.g., 'You should complete your assignments on time to succeed academically.' 'You must focus on your goals to improve your grades.' 'You can improve your English by practicing every day.')","Future simple for first conditional (e.g., 'If you focus on your studies, you will achieve your academic goals.' 'If you participate in class more, you will become more confident.')"],"vocabulary":["achievement","skill","development","advice","study","goals","improvement","practice","focus","feedback","growth","strategy","effort","progress","plan","discipline","success","solution","potential","performance","time management","learning style","motivation","improve","study","practice","organize","focus","advise","achieve","develop","facilitate","encourage","guide","reflect","evaluate","recommend","suggest","implement","plan","track","discuss","procrastinate","review","revise","brainstorm","organized","focused","improved","developmental","achievable","goal-oriented","actionable","skillful","reflective","disciplined","motivated","consistent","successful","proactive"],"pronunciation":"Practice the pronunciation of contrastive sounds found in academic and advice-related vocabulary, focusing on single and double consonants (e.g., /gr/ in 'growth' and /kr/ in 'create,' /g/ in 'good,' and /k/ in 'could'). Focus on stress patterns for two-syllable nouns and verbs with identical spelling, especially those used in academic contexts (e.g., 'progress,' PROgress, as a noun, meaning improvement, versus proGRESS, as a verb, meaning to advance)."},"pragmatic":"Asking for academic advice politely using appropriate question structures and modals (e.g., 'What study strategies do you recommend to improve my grades?'). Giving study tips to peers using modals for advice and the second conditional for hypothetical situations (e.g., 'You should create a study schedule to stay on track.').","sociolinguistic":"Facilitating peer group discussions on academic success strategies by using inclusive and encouraging language (e.g., 'Let's share study techniques that have worked for us.'). Providing clear, actionable advice to support peers in academic skill development (e.g., 'You should try using a planner to keep track of deadlines.')."},"assessment":[]},{"id":3,"title":"Study Habits for Success","themes":["Learning to Manage Time","How I Learned to Focus"],"standards":{"listening":{"general":"","specific":["Receptive: Identify the main ideas of a complex dialogue in media, provided there is an opportunity for clarification and repetition.","Interactive: Identify the main ideas of feedback provided to solve problems in group settings."],"learning_outcomes":["Can follow a complex dialogue in a podcast about time management strategies, identify key points, and evaluate their usefulness (e.g., 'The speaker recommended avoiding distractions by studying in a quiet space. How effective is this for your environment?').","Can listen to a peer's summary of study habits and identify main ideas (e.g., 'He said the best way is to break down big tasks into smaller, more manageable ones.').","Can determine the key advice from feedback on study routines (e.g., 'It's important to have a set routine, like studying at the same time each day.')."]},"reading":{"general":"","specific":["Reading: Evaluate arguments in opinion pieces.","Reading: Make basic inferences or predictions about a text content from headings, titles, or headlines."],"learning_outcomes":["Can evaluate and reflect on arguments in study habits articles and make connections to personal academic experiences (e.g., 'The article suggests using checklists. I've tried this strategy, and it has helped me stay organized.').","Can make inferences about the main focus of a section based on its title and supporting text (e.g., 'The section titled 'Boost Your Focus' likely discusses concentration techniques such as minimizing distractions and using a timer during study sessions.').","Can predict the type of advice provided in a section on time management by examining headings and context clues (e.g., 'The heading 'Tips for Daily Progress' suggests that the section will include steps for creating a daily routine and using calendars or to-do lists.')."]},"speaking":{"general":"","specific":["Productive: Describe familiar processes or events.","Interactive: Paraphrase a simple statement on familiar topics during discussions."],"learning_outcomes":["Can describe a personal study routine, outlining steps in logical order and giving specific examples (e.g., 'First, I organize my notes by subject. Then, I review my math exercises. Finally, I test myself with flashcards.').","Can paraphrase feedback on study habits during a discussion (e.g., 'So you're saying that I have changed my study habits?').","Can suggest study habit improvements based on past experiences and provide reasons for their effectiveness (e.g., 'I used to forget assignments, so I started using a planner. Now, I submit my work on time and feel less stressed.')."]},"writing":{"general":"","specific":["Productive: Compose a detailed personal narrative.","Interactive: Compile feedback for collaborative writing in a structured manner."],"learning_outcomes":["Can write a detailed narrative about a personal study experience, including reflections on what worked and what could be improved (e.g., 'Last month, I realized I was falling behind in math. I started setting reminders to review my notes every day after dinner. Now, I feel more confident when solving equations.').","Can contribute to a collaborative guide on study strategies by organizing peer feedback and adding recommendations (e.g., 'Peers have suggested writing down homework in an agenda to avoid missing deadlines. Others have recommended setting phone reminders.').","Can compile and paraphrase feedback on study habits during peer review sessions and organize it into a report (e.g., 'The feedback suggests that making a study schedule and using color-coded notes improves time management.')."]},"mediation":{"general":"","specific":["Communication: Assist in negotiations between student groups.","Concept: Interpret graphical data for classroom use."],"learning_outcomes":["Can assist groups in negotiating study-related tasks by rephrasing ideas simply (e.g., asks, 'Can we all agree on study times?' while showing two options: 'morning or afternoon' on the board).","Can interpret basic charts or schedules related to study habits by highlighting key times (e.g., explaining a sample study schedule, pointing to '3-4 p.m.,' for after-school study time).","Can clarify group tasks by explaining simple data from a graph, like a bar chart on 'study hours per week' (e.g., 'More time in English can help.')."]}},"competences":{"linguistic":{"grammar":["Present perfect for achievements (e.g., 'I have developed better habits.')","Past simple for reflecting (e.g., 'I used to procrastinate.')","WH-questions (e.g., 'What have you done to change your study routine?')"],"vocabulary":["study","habits","focus","time","goals","grades","progress","learning","achievements","skills","routines","assignments","strategies","productivity","improvement","management","results","effort","success","inspiration","manage","procrastinate","improve","develop","reflect","suggest","set (goals)","practice","study","focus","achieve","organize","complete","work on","discuss","inspire","evaluate","prioritize","accomplish","effective","frequent","productive","focused","essential","improved","organized","consistent","always","sometimes","every day","when","where","how","after","before","on","at","might","could","should"],"pronunciation":"Practice the pronunciation of contrastive sounds, focusing on single and double consonants (e.g., /sk/ in 'skill' and /st/ in 'study,' /s/ in 'success,' and /t/ in 'type'). Practice the pronunciation of -ed endings for past tenses and past participles (e.g., /d/ in 'improved,' /t/ in 'accomplished,' and /ɪd/ in 'suggested'). Stress the main verb in forms such as: have developed."},"pragmatic":"Expressing achievements in changing habits (e.g., 'I have reorganized my study schedule and improved my grades.'). Expressing past habits (e.g., 'I used to procrastinate, but now I manage my time better.').","sociolinguistic":"Organize group projects that promote collaborative discussions on effective study strategies, emphasizing how language is used to negotiate plans and share experiences, while providing concrete examples of time management techniques adapted to the group's cultural and social norms (e.g., 'Let's create a study schedule where we review one subject per day and take 10-minute breaks after 40 minutes of studying.' 'We should use the Pomodoro technique, where we study for 25 minutes, then take a 5-minute break. This helps us stay focused without feeling overwhelmed.')."},"assessment":[]},{"id":4,"title":"Learning to Research History","themes":["I Learned About the History of Panama","So Many Different Historical Events to Learn!"],"standards":{"listening":{"general":"","specific":["Receptive: Identify a simple chronological sequence in a recorded narrative or dialogue.","Interactive: Respond to and clarify multipart questions."],"learning_outcomes":["Can identify chronological events in a historical narrative or recorded interview about Panama (e.g., 'What happened after the Torrijos-Carter Treaties were signed?').","Can answer multipart questions about a podcast on key historical events with clarification as needed (e.g., 'Who signed the Torrijos-Carter Treaties, and what were the outcomes?').","Can listen to a historical podcast or documentary clip and list in order key events related to Panama's history (e.g., 'First, the treaty was negotiated, then Panama regained control of the canal in 1999.')."]},"reading":{"general":"","specific":["Reading: Analyze informational content for specific data.","Reading: Summarize narratives of significant events, recent or historical."],"learning_outcomes":["Can identify key details and perspectives in a text about Panama's history (e.g., 'What year did Panama declare independence, and how is this event described in different texts?').","Can compare the main events of Panama's history as presented in two different narratives (e.g., 'How does this source describe the canal's construction compared to a second source?').","Can evaluate a historical timeline by explaining the significance of specific events in context (e.g., 'Why was the completion of the Panama Canal in 1914 a pivotal event in global trade?')."]},"speaking":{"general":"","specific":["Productive: Present personal opinions on a variety of topics.","Interactive: Exchange beliefs, opinions, agreements, and disagreements politely."],"learning_outcomes":["Can present and discuss in a polite manner a personal opinion on Panama's history (e.g., 'Historians say the canal transformed Panama's economy.' 'I agree with that.').","Can exchange opinions by supporting arguments with facts and responding to peers (e.g., 'I believe the Panama Canal was crucial for global trade because it shortened maritime routes. What do you think about its environmental impact?').","Can agree or disagree with peers on historical topics (e.g., 'I agree that independence shaped Panama's identity.')."]},"writing":{"general":"","specific":["Productive: Write short, simple essays with basic structure on familiar topics.","Interactive: Provide feedback on peers' essays, including suggested edits."],"learning_outcomes":["Can write a short essay summarizing a historical event and reflecting on its impact (e.g., 'Panama separated from Colombia in 1903, which allowed the country to shape its national identity and control its own policies.').","Can edit a peer's essay for clarity and organization (e.g., 'Try starting with the most important event.').","Can provide feedback on a classmate's essay about Panama's history (e.g., 'You might add more details about the date.')."]},"mediation":{"general":"","specific":["Concept: Explain cultural concepts or idioms to others.","Text: Summarize complex texts for peers."],"learning_outcomes":["Can explain basic historical and cultural concepts, using visuals and simple definitions (e.g., 'Independence means freedom from another country,' while showing a timeline on the board).","Can summarize key points from a history text by listing dates and events on the board (e.g., '1903: Separation of Panama from Colombia' and '1914: Canal Completed').","Can help others understand historical terms with gestures and pointing (e.g., 'colony' as 'when another country is in control,' with a map)."]}},"competences":{"linguistic":{"grammar":["Past simple for historical events (e.g., 'Panama declared independence.')","Reported speech (e.g., 'Historians say the canal transformed Panama's economy.')","Passive voice for describing events (e.g., 'The canal was completed in 1914.')"],"vocabulary":["history","Panama","independence","separation","canal","significance","report","construction","economy","diversity","events","culture","period","identity","routes","engineering","marvel","revolution","transformation","legacy","heritage","declared","learned","shaped","reported","completed","began","transferred","transformed","compare","describe","research","reflect","summarize","analyze","understand","explain","explore","gain","historical","relevant","colonial","diverse","significant","rich","complex","independent","cultural","revolutionary","accomplished"],"pronunciation":"Practice the pronunciation of contrastive sounds, focusing on single consonants (e.g., /s/ in 'say' and /z/ in 'was,' /ð/ in 'they' and /θ/ in 'think'). Stress for two-syllable nouns and verbs with the same spelling (e.g., 'research' with the noun stress on the first syllable, and 'research' with a verb stress that goes on the second syllable). Practice pronunciation of -ed endings for past tenses and past participles (e.g., /d/ in 'improved,' /t/ in 'accomplished,' and /ɪd/ in 'suggested')."},"pragmatic":"Asking about important historical events (e.g., 'When did Panama separate from Colombia?' or 'What impact did the construction of the Panama Canal have on the country's economy?'). Sharing opinions and asking for clarification on historical facts (e.g., 'Do you think the construction of the canal helped Panama's economy immediately?' or 'Why do you believe independence shaped Panama's national identity?').","sociolinguistic":"Engage in group discussions to summarize Panama's historical events, contributing to an insightful analysis (e.g., 'Panama's separation from Colombia in 1903 was a turning point because it led to the canal's construction, which boosted global trade.' 'The U.S. involvement in the canal's construction caused political tensions for years.')."},"assessment":[]},{"id":5,"title":"Planning for a Friend's Visit","themes":["Interesting Things to See","Unique Facts About My Area"],"standards":{"listening":{"general":"","specific":["Receptive: Analyze the tone and implied meaning in discussions.","Interactive: Respond appropriately when participating in discussions on familiar topics."],"learning_outcomes":["Can recognize tone and implied meaning in conversations about visitor safety by identifying key concerns and suggested precautions (e.g., 'They said Panama is generally safe, but emphasized being cautious in crowded areas, which suggests concern about pickpocketing.').","Can identify key attractions from a conversation about a city tour (e.g., 'They said the Panama Canal, the Contemporary Art Museum, and the local beaches are good places to see!').","Can interpret implied suggestions and respond appropriately when discussing travel plans (e.g., 'The guide suggested taking a bus because it makes it easy to get around in the city.')."]},"reading":{"general":"","specific":["Reading: Distinguish between facts and opinions in texts on everyday subjects.","Reading: Analyze the similarities and differences between two texts."],"learning_outcomes":["Can distinguish between factual information and opinions in a travel guide and explain how these impact visitor perceptions (e.g., 'The guide says Panama hats are popular souvenirs, but this might be an opinion to promote local businesses.').","Can compare two guides on Panama City attractions (e.g., 'Both guides say you have to try the restaurants. The local food is amazing.').","Can analyze opinion differences between two restaurant reviews (e.g., 'One reviewer loved the food, but didn't like the decorations. The other reviewer loved everything about the restaurant.')."]},"speaking":{"general":"","specific":["Productive: Present personal opinions on a variety of topics.","Interactive: Engage in problem-solving discussions."],"learning_outcomes":["Can express personal opinions about places to visit by interpreting suggestions and explaining implied meanings (e.g., 'I think when someone says, 'It's popular with tourists,' they really mean it might be overcrowded or too commercial.').","Can solve problems related to directions and locations in the city (e.g., 'To get to the museum, go straight down this street, take the second left, and it will be on your right.').","Can participate in a discussion about planning activities for a friend's visit by asking and answering questions to build a detailed itinerary (e.g., 'What time does the museum open?' 'After the museum, we can visit the seafood market. What do you think?')."]},"writing":{"general":"","specific":["Productive: Create instructions for a task in personal life.","Interactive: Compile feedback for collaborative writing in a structured manner."],"learning_outcomes":["Can write instructions for visiting a local attraction (e.g., 'To reach the museum, walk two blocks from the bus station').","Can compile and organize peer suggestions into a cohesive guide for must-see locations, adding personal insights and recommendations (e.g., 'Several classmates recommended Casco Viejo for its historical significance, and I agree because its restored buildings offer a glimpse into Panama's past.').","Can provide a written response to a friend's question about the best places to visit (e.g., 'In the past, I visited the old town, and it was an unforgettable experience. I know that today, there are more restaurants and walking areas, making it even more enjoyable for visitors.')."]},"mediation":{"general":"","specific":["Text: Mediate information from notices or announcements for broader understanding.","Concept: Interpret graphical data for classroom use."],"learning_outcomes":["Can explain basic information from local area notices or events, using gestures and visuals (e.g., 'The museum is open on weekends,' while pointing to weekend days on a calendar).","Can interpret visitor information charts for peers and explain the significance of highlighted points (e.g., 'This map shows the museum and beach locations. Visiting the museum first makes sense because it's closer to the bus stop.').","Can summarize key details of an announcement by repeating main ideas (e.g., 'The event starts at 3 p.m.' while pointing to the time on a digital clock display)."]}},"competences":{"linguistic":{"grammar":["Past simple and present perfect for contrasting actions over time (e.g., 'Casco Viejo was once a neglected area, but after its restoration, it has become a popular destination for tourists.')","Future with 'will' and 'going to' to express future intentions (e.g., 'I will book a tour of the city for us, and we're going to try that new restaurant by the waterfront.')","Reported speech (e.g., 'They said that the best seafood is found in the seafood market.')"],"vocabulary":["visit","area","location","attraction","plan","direction","market","museum","restaurant","beach","town","history","blocks","cathedral","accommodations","landmark","guide","itinerary","precaution","safety","transportation","see","visit","plan","stay","explore","showcase","witness","connect","miss","recommend","give","explain","guide","describe","enjoy","navigate","direct","advise","arrange","breathtaking","tranquil","interesting","unique","wonderful","must-see","local","national","famous","close","available","safe","go straight","turn right","turn left","across from","next to","between","behind","opposite","in front of"],"pronunciation":"Practice the pronunciation of contrastive sounds, focusing on single and double consonants (e.g., /st/ in 'stay' and /ɪks/ in 'explain,' /tʃ/ in 'chance' and /ʃ/ in 'showcase'). Practice pronouncing the disappearing or reduced syllables after a stressed syllable (e.g., 'interesting' (/ˈɪn.trə.stɪŋ/) and 'restaurant' (/ˈrɛs.trɒnt/)."},"pragmatic":"Asking for recommendations on local attractions (e.g., 'What places should my friend visit?'). Describing popular landmarks (e.g., 'The museum showcases our cultural heritage.').","sociolinguistic":"Participate in group planning for events or trips, offering directions and suggestions clearly, ensuring everyone understands (e.g., 'Let's plan the trip so we visit the Panama Canal in the morning and have lunch at the fish market. After that, we can walk through Casco Viejo.' 'We should meet at the park entrance at 9 a.m. From there, we'll take the first bus to the museum.')."},"assessment":[]},{"id":6,"title":"The Past and Future of Fashion","themes":["How History Is Fashionable","What Is Sustainable Fashion?"],"standards":{"listening":{"general":"","specific":["Receptive: Show comprehension of extended speeches on familiar topics.","Interactive: Organize information from group discussions."],"learning_outcomes":["Can summarize the main points from a talk on sustainable fashion trends (e.g., 'The main points were on using organic cotton and recycled fabrics as eco-friendly materials in fashion.').","Can organize key ideas from a group discussion about current and past fashion trends by taking notes and summarizing (e.g., 'In the 1970s, bright colors and patterns were popular, while today's fashion emphasizes neutral tones and sustainability.').","Can understand and relay ideas from an extended speech on fashion industry changes (e.g., 'Fashion will have to become more sustainable and focus on using recyclable materials')."]},"reading":{"general":"","specific":["Reading: Derive the meaning of simple unknown words from short texts.","Reading: Summarize narratives of significant events, recent or historical."],"learning_outcomes":["Can infer the meaning of unknown words in a fashion trend article by using context clues and comparing terms (e.g., 'The word 'vintage' in this article refers to old-fashioned clothing styles that were popular in previous decades.').","Can summarize main points in a text about past fashion trends (e.g., 'Describe two major styles from a fashion trends article, such as shoulder pads and bold colors from the 1980s.' 'Identify key features of 1990s streetwear, like baggy jeans and graphic t-shirts.').","Can determine the meaning of new terms in a piece about eco-friendly materials (e.g., 'Tagua is an example of eco-friendly material. It is the seed of a tree that can be used to make jewelry.')."]},"speaking":{"general":"","specific":["Productive: Inform others about environmental or community issues.","Interactive: Engage in discussions on global topics like environmental awareness."],"learning_outcomes":["Can inform peers about the impact of certain fashion practices (e.g., 'Vintage clothes reduce waste because they are reused.').","Can engage in a discussion to explain how sustainable fashion benefits the environment (e.g., 'Recycled fabrics will help conserve water and energy in the production process.').","Can discuss sustainable fashion trends and give opinions (e.g., 'I believe more brands will prioritize sustainable materials in their designs to reduce environmental impact.')."]},"writing":{"general":"","specific":["Productive: Develop an argumentative paragraph on a familiar topic or issue.","Interactive: Collaborate on a group argumentative paper."],"learning_outcomes":["Can write an argumentative essay on sustainable fashion practices, providing supporting evidence (e.g., 'Eco-friendly fabrics, like organic cotton and bamboo, help reduce water usage and chemical pollution.').","Can contribute to a group paper on sustainable fashion trends (e.g., 'By 2018, some fashion companies had already implemented recycling programs to reduce waste in their production processes.').","Can help organize group ideas on why retro fashion is popular (e.g., 'They have unique styles and are affordable.')."]},"mediation":{"general":"","specific":["Text: Summarize complex texts for peers.","Communication: Resolve conflicts in group settings."],"learning_outcomes":["Can summarize points from a fashion article by listing keywords (e.g., 'eco-friendly' and 'vintage' on a board as examples of trends).","Can resolve group disagreements on fashion ideas by guiding the discussion with simple language (e.g., 'Can we choose one trend, like eco-fashion?' while showing a picture of eco-friendly materials).","Can explain fashion terms, using visuals and simple phrases in group discussions (e.g., 'Sustainable means making choices that reduce environmental impact,' while holding up eco-friendly fabric samples)."]}},"competences":{"linguistic":{"grammar":["Past continuous with present simple to compare trends (e.g., 'In the early 2000s, people were wearing low-rise jeans. Today, both flared and ripped jeans are in style.')","Past perfect for completed actions (e.g., 'In the last decades, people had adopted more casual fashion styles, leaving the formal trends behind.')","Future simple for predictions (e.g., 'Fashion trends will continue to evolve.')"],"vocabulary":["fashion","trend","vintage","retro","collection","style","materials","sustainability","launch","show","industry","brands","designs","runway","environment","prediction","history","personality","future","evolve","predict","launch","adopt","reflect","discuss","shop","design","notice","gain","create","follow","introduce","showcase","wear","prefer","inspire","change","return","recycle","sustainable","fashionable","trendy","eco-friendly","vintage","retro","stylish","innovative","unique","recycled"],"pronunciation":"Practice the pronunciation of contrastive sounds, focusing on single consonants (e.g., /v/ in 'vintage' and /w/ in 'wear'). Practice stress in multisyllabic words and compounds (e.g., 'fashionable,' 'sustainability,' 'eco-friendly,' and 'runway')."},"pragmatic":"Asking about fashion trends (e.g., 'How have fashion trends evolved from the past to today?'). Discussing eco-friendly fashion choices (e.g., 'By using eco-friendly fabrics, fashion brands can reduce their carbon footprint, helping to protect the environment.').","sociolinguistic":"Organizing discussions about the future of fashion by focusing on how language reflects people's values and attitudes toward sustainability, and providing examples of sustainable practices and eco-friendly materials (e.g., 'Some people say, 'fast fashion is cheap and convenient,' while others describe it as 'harmful and wasteful,' showing how language reflects different values about sustainability.')."},"assessment":[]},{"id":7,"title":"Dream Jobs","themes":["What Are the Jobs of the Future?","What Skills Do I Need for a Future Career?"],"standards":{"listening":{"general":"","specific":["Receptive: Follow detailed oral instructions in class.","Interactive: Interpret and relay information in pair and group discussions."],"learning_outcomes":["Can follow instructions from a career planning workshop (e.g., 'I should study computer science and learn programming languages.').","Can interpret key details in a class discussion about future jobs and relay that information accurately during pair or group work (e.g., 'They said that jobs in AI will need skills like data analysis and programming.').","Can identify key points from a group discussion on career goals, taking notes and summarizing information (e.g., 'What career paths might emerge due to automation, and what skills are required?')."]},"reading":{"general":"","specific":["Reading: Evaluate arguments in opinion pieces.","Reading: Analyze the similarities and differences between two texts."],"learning_outcomes":["Can evaluate the strength of career predictions in an article, identifying key points and supporting arguments (e.g., 'I agree with the argument that there is a growing need for data scientists and software engineers due to technological advancements.').","Can compare perspectives in two texts about future careers by highlighting differences in predictions and evidence (e.g., 'One article supports remote work due to flexibility, while the other highlights challenges related to productivity.').","Can assess arguments in a text about AI's impact on careers (e.g., 'I think the article presents a strong case that AI will replace repetitive tasks.')."]},"speaking":{"general":"","specific":["Productive: Explain future career or educational plans.","Interactive: Participate in role-plays about job interviews."],"learning_outcomes":["Can explain to peers the required skills for a future job (e.g., 'You need to be good at math to work in engineering.').","Can participate in a role-play to practice for a job interview, asking and answering detailed questions about strengths, goals, and required skills (e.g., 'What is your greatest strength?' 'I am a quick learner, and I enjoy working with technology.').","Can share future educational plans and reasons (e.g., 'I will study engineering to work on technology projects.')."]},"writing":{"general":"","specific":["Productive: Compose a detailed personal narrative.","Interactive: Write collaborative stories or articles."],"learning_outcomes":["Can compose a detailed essay explaining why they chose a dream job, developing ideas across an introduction, body paragraphs, and a conclusion (e.g., 'I chose engineering because I enjoy solving problems. I also like working on projects that require creativity. In the future, I hope to contribute to sustainable building projects.').","Can write a story with peers about a future job (e.g., 'In the future, I will be working in technology.').","Can collaboratively write a description of skills needed for future careers (e.g., 'New jobs will require creativity and problem-solving.')."]},"mediation":{"general":"","specific":["Communication: Assist in negotiations between student groups.","Text: Mediate information from notices or announcements for broader understanding."],"learning_outcomes":["Can assist groups negotiating job ideas by simplifying phrases (e.g., 'Can we pick one dream job to research?' while showing job options like 'doctor, teacher, artist' on a chart).","Can mediate information from job announcements with visuals (e.g., pointing to job descriptions like 'Skills needed: computer skills' in a flyer).","Can explain terms from job notices, using examples (e.g., 'Requires teamwork' by saying, 'You work with others,' and pointing to a teamwork image)."]}},"competences":{"linguistic":{"grammar":["Future simple to predict jobs (e.g., 'Many new jobs will emerge.')","Future continuous for long-term goals (e.g., 'In ten years, people will be working...')","Modals for possibilities (e.g., 'Jobs may require...')"],"vocabulary":["jobs","skills","future","demand","advancement","automation","remote work","market","career","prediction","technology","opportunities","industries","AI (artificial intelligence)","fields","employment","innovation","workforce","adaptability","education","industries","disappear","evolve","work","adapt","acquire","require","advance","change","predict","automate","replace","develop","demand","learn","prepare","innovate","foresee","anticipate","grow","future","relevant","technological","automated","remote","in-demand","adaptable","advanced","evolving","innovative"],"pronunciation":"Practice the pronunciation of contrastive sounds, focusing on single consonants (e.g., /dʒ/ in 'change' and /ʒ/ in 'vision'). Practice stress in multisyllabic words and compounds (e.g., 'automation,' 'advancement,' 'adaptability,' 'employment,' 'artificial intelligence,' and 'remote work')."},"pragmatic":"Asking about future career paths (e.g., 'What careers do you think will be in demand?'). Explaining personal career goals (e.g., 'I will be an engineer and will work on innovative projects.').","sociolinguistic":"Participate in group discussions about future careers by giving advice that reflects an awareness of social context, such as adapting tone, formality, and language choices based on the audience, and by providing insights into the skills needed for evolving job markets."},"assessment":[]},{"id":8,"title":"Our Time Capsule","themes":["How I Am Preparing for the Next Five Years","In Ten Years, I Will..."],"standards":{"listening":{"general":"","specific":["Receptive: Show comprehension of everyday conversations, with some repetition of particular words and phrases.","Interactive: Respond appropriately when participating in discussions on familiar topics."],"learning_outcomes":["Can identify and summarize key points from a conversation about career plans, including relevant advice (e.g., 'The speaker plans to pursue software development and will take an internship with a local Panamanian tech company.').","Can respond appropriately in a discussion about future goals and summarize peers' plans (e.g., 'Carlos said that he is interested in studying marine biology.').","Can comprehend and summarize ideas in a conversation about career advice (e.g., 'The podcast suggested that you should reach out to local organizations to meet mentors in areas you are interested in for work.')."]},"reading":{"general":"","specific":["Reading: Analyze the similarities and differences between two texts.","Reading: Distinguish between facts and opinions in texts on everyday subjects."],"learning_outcomes":["Can analyze similarities and differences in articles on skill development (e.g., 'Both articles mention communication and critical thinking.').","Can distinguish between factual information and opinions in two articles about future careers, with examples related to Panama (e.g., 'The first article states that coding jobs are growing globally, while the second article argues that Panama needs to increase training for tech roles.').","Can compare views in two texts about career paths for students (e.g., 'I think this article about talking to family members about how they learned their skills is better advice than just reading about jobs on the internet.')."]},"speaking":{"general":"","specific":["Productive: Explain how to use common technological devices and applications.","Interactive: Exchange opinions about the results of surveys and investigations."],"learning_outcomes":["Can explain to classmates how to use a device to record goals for a time capsule (e.g., 'Press this button to start recording.').","Can exchange ideas about future goals and skills for career planning (e.g., 'I think critical thinking will be important for my career.').","Can discuss future career trends by sharing survey results and personal views related to Panama (e.g., 'According to our class survey, many students want to pursue careers in tourism and eco-friendly innovation, which reflects Panama's focus on environmental conservation.')."]},"writing":{"general":"","specific":["Productive: Write simple, informal emails/letters.","Interactive: Participate in a written discussion on paper, through apps, online, or in a forum discussion."],"learning_outcomes":["Can write a letter to their future self, describing detailed career goals and the steps needed to achieve them (e.g., 'In five years, I will be pursuing a degree in marine biology at the University of Panama, supported by an internship at a conservation organization.').","Can participate in a written discussion about time capsule items (e.g., 'The teacher said that we should include photos of our class in the project.').","Can write a brief note explaining a personal item for the time capsule (e.g., 'I have chosen this book because it will help me grow.')."]},"mediation":{"general":"","specific":["Communication: Facilitate discussions on project goals and tasks.","Text: Clarify written instructions in collaborative projects."],"learning_outcomes":["Can facilitate a discussion on future goals for the time capsule using gestures (e.g., 'What should we put in our time capsule?' while showing pictures of items like photos and letters.).","Can clarify project instructions by listing steps on the board (e.g., 'Step 1: Choose items; Step 2: Write descriptions').","Can help classmates understand project instructions by rephrasing in simple terms or using the native language when needed (e.g., 'Everyone must bring a personal object for the project,' while pointing to the list of items)."]}},"competences":{"linguistic":{"grammar":["Modals for career possibilities (e.g., 'I might pursue...')","Future continuous for ongoing plans (e.g., 'I will be working as...')","Reported speech to share advice (e.g., 'My teacher said that I should...')"],"vocabulary":["career","future","goals","possibilities","advice","education","training","technology","engineering","medicine","software developer","data analyst","internship","experience","skills","leadership","problem-solving","critical thinking","community service","opportunities","pursue","accomplish","reflect","suggest","recommend","develop","research","enhance","explore","volunteer","consider","gain","prepare","plan","train","learn","study","achieve","succeed","work","future-oriented","accomplished","skilled","practical","critical","adaptable","successful","educational","high-demand","relevant","will","would","might","can","could","what","how","why"],"pronunciation":"Practice the pronunciation of the long vowel /i/ in different types of spelling (e.g., -ie in 'achieve' and 'believe,' -ee in 'volunteer' and 'engineering,' and -ea in 'leadership'). Practice stress in multisyllabic words and compounds (e.g., 'leadership,' 'problem-solving,' 'critical thinking,' 'community service,' and 'high demand')."},"pragmatic":"Asking peers about future goals for the time capsule (e.g., 'What would you like to achieve in five years?'). Explaining item choices for the capsule (e.g., 'I am including a photo of my robotics project because it represents my goal to become an electronic engineer in the future.').","sociolinguistic":"Organize class discussions about personal goals for the future, assigning roles to peers (e.g., 'Let's have a recorder to write down everyone's goals and a presenter to summarize our discussion.')."},"assessment":[]}]},"Grade 11":{"level":"B1.2","scenarios":[{"id":1,"title":"Our Town Council","themes":["How Our Town Operates","How We Share Our Voice in the Community"],"standards":{"listening":{"general":"","specific":["Receptive: Identify a speaker's point of view in a simple presentation or lecture.","Interactive: Discuss information from audiovisual presentations like videos or movies."],"learning_outcomes":["Can identify the speaker's perspective and intentions in presentations on local issues, such as public work projects or environmental initiatives (e.g., 'The council announced plans to improve the water system to address shortages. What is the intended impact of this change?').","Can interpret and discuss details from audiovisual presentations on community topics (e.g., 'According to the speaker, I believe she means that by discussing recycling, we can help people change their habits, which is important.').","Can ask and answer questions about main ideas in video presentations (e.g., 'What did you think the main idea was?' 'I think it was about the structure of town management.')."]},"reading":{"general":"","specific":["Reading: Take basic notes on a text about a familiar topic.","Reading: Summarize arguments from general and academic articles."],"learning_outcomes":["Can take notes on town council meeting texts, recording key points on decisions and civic duties (e.g., 'The city mayor stated that the Town Council is responsible for two main tasks: waste collection and road maintenance.').","Can summarize arguments in articles about local governance, focusing on community involvement (e.g., 'The article argues that citizens should attend town meetings to influence decisions.').","Can outline civic responsibilities presented in articles, preparing for class discussions (e.g., 'The importance of voting and community feedback is emphasized in the article.')."]},"speaking":{"general":"","specific":["Productive: Present an analysis of a current issue, local or global.","Interactive: Engage in discussions of general or academic interests."],"learning_outcomes":["Can present an analysis of civic responsibilities, prompting classmates to share their views on community engagement (e.g., 'My analysis shows civic responsibility improves community well-being. What do you think?').","Can engage in role-play discussions simulating town council meetings to present key points and respond to community suggestions (e.g., 'The new park renovations were approved based on citizen feedback. What other suggestions should be implemented?').","Can summarize classmates' ideas during discussions on local governance, keeping the conversation focused (e.g., 'We all agree that voting is a key responsibility of citizens.')."]},"writing":{"general":"","specific":["Productive: Compose essays on general life experiences.","Interactive: Participate in text-based discussions like messages, email discussions, chats, or online forums."],"learning_outcomes":["Can compose essays on civic engagement, using examples from the Town Council scenario (e.g., 'Citizens must vote to have a say in community decisions.').","Can participate in online discussions about civic responsibilities, posting comments about local issues (e.g., 'I believe citizens should attend town meetings to share their views.').","Can respond to classmates' posts in a discussion forum, adding perspectives on community involvement (e.g., 'In my opinion, volunteering improves our town.')."]},"mediation":{"general":"","specific":["Text: Paraphrase articles and texts for clearer understanding.","Communication: Facilitate peer discussions on various topics."],"learning_outcomes":["Can paraphrase articles about local government projects using simple language and relevant visuals (e.g., shows an infographic with funding details and project phases and says, 'The city council allocated funds to renovate the sports complex.').","Can facilitate discussions on civic duties by encouraging classmates to express their opinions, using gestures to prompt responses (e.g., uses an open-hand gesture to invite ideas by saying, 'What do you think about participating in community projects?').","Can clarify complex information from civic articles by breaking down details and using key visuals for better understanding (e.g., shows a flowchart of the voting process and says, 'The article means that citizens should vote to have a say in town matters.')."]}},"competences":{"linguistic":{"grammar":["Passive voice (e.g., 'Decisions are made based on community feedback.')","Reported speech (e.g., 'The mayor said that new policies would be implemented soon.')","Modals 'can,' 'should,' 'must,' 'may,' 'might' (e.g., 'Citizens must vote to have a say in community decisions.')"],"vocabulary":["town council","community","voice","feedback","decisions","council","public services","municipal government","surveys","elections","authorities","responsibilities","projects","sustainability","involvement","citizens","participation","voting","committee","civil duties","rights","operate","provide","participate","vote","report","attend","prioritize","contribute","collect","involve","share","decide","express","inform","recommend","serve","lead","engage","elect","civic","responsible","sustainable","essential","community-based","informed","local","participatory","public","involved"],"pronunciation":"Practice the pronunciation of the short vowel sound /ɪ/ in words spelled with 'i' (e.g., public, civic) and 'y' (e.g., pretty, community, sustainability). Practice the pronunciation of words with the /eə/ sound followed by 'r' (e.g., share, serve). Continue practicing word stress in multisyllabic words and compound terms, such as 'decision,' 'participation,' 'responsibility,' 'authority,' 'feedback,' and 'public service'."},"pragmatic":"Asking for opinions on civic responsibilities (e.g., 'What do you think are important duties for citizens?'). Sharing viewpoints on community involvement (e.g., 'Citizens should vote to make their voices heard.').","sociolinguistic":"U
