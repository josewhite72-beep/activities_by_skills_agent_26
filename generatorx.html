sing formal language in civic discussions (e.g., 'Thank you for sharing your thoughts on our community.'). Showing respect in public dialogue (e.g., 'Could you tell us more about your ideas?')."},"assessment":[]},{"id":2,"title":"Our Changing Forests","themes":["I Explored the Ecological History Of...","How Our Ecology Is Changing"],"standards":{"listening":{"general":"","specific":["Receptive: Follow the linear structure of a short formal talk.","Interactive: Respond to questions and arguments in debates."],"learning_outcomes":["Can follow the linear sequence of points on a short history of local ecology (e.g., 'You can see from the photo in 2020 there was more rainforest in the area than in 2025.').","Can respond to questions in arguments or debates on forest change (e.g., 'The author makes a good argument about cutting down the forest for farming. It has a big impact on the environment.').","Can identify and discuss key points in a structured talk on ecological issues (e.g., 'The first part of the talk was about the water cycle of rainforests.')."]},"reading":{"general":"","specific":["Reading: Summarize arguments from general and academic articles.","Reading: Analyze authentic non-fiction texts."],"learning_outcomes":["Can summarize and evaluate arguments in articles about local governance and civic engagement, focusing on diverse viewpoints (e.g., 'This article highlights that participation in town meetings can lead to better street repairs, but others argue that online surveys could be more inclusive.').","Can analyze authentic texts about environmental restoration activities, evaluating their impact on the environment (e.g., 'Planting trees along the river has improved air quality and reduced erosion.').","Can extract main points from articles on forest health and share them in reviews, noting environmental improvements (e.g., 'Our community's recycling program has successfully reduced waste in local landfills.')."]},"speaking":{"general":"","specific":["Productive: Give a speech on an academic topic.","Interactive: Engage in negotiations on various topics."],"learning_outcomes":["Can give a speech about deforestation and its impact on local ecology (e.g., 'Deforestation has affected biodiversity in our area.').","Can engage in role-play discussions about ecological changes in the local area and propose environmentally responsible actions (e.g., 'If people planted more trees, the forests would recover faster.').","Can participate in negotiations about environmental changes and ask follow-up questions to encourage detailed answers (e.g., 'If we limited urban expansion, would local wildlife have more space to thrive?')."]},"writing":{"general":"","specific":["Productive: Create informative articles on common interests.","Interactive: Produce a collaborative story on local or global interest topics."],"learning_outcomes":["Can create informative articles explaining local ecological changes and their impact on the community (e.g., 'If the town plants more trees, the air quality will improve.').","Can create informative articles about environmental conservation guidelines, listing actions to protect local forests (e.g., 'If we prevent illegal logging, the forest ecosystem will recover faster.').","Can work with peers to produce a story about ecological changes, incorporating community conservation efforts (e.g., 'Over the past few years, our community has implemented several conservation projects that have significantly improved the local ecosystems.')."]},"mediation":{"general":"","specific":["Concept: Interpret non-verbal cues in communication.","Communication: Facilitate peer discussions on various topics."],"learning_outcomes":["Can interpret classmates' non-verbal cues, like nodding or frowning, in discussions about environmental issues and adjust responses accordingly (e.g., uses a hand gesture to invite contribution and says, 'I noticed you seemed interested; would you like to share your thoughts on recycling?').","Can facilitate discussions on ecological topics by prompting classmates to contribute ideas about conservation, using visuals like a deforestation map to spark conversation (e.g., 'How can we reduce pollution in our area?').","Can interpret reactions, such as looking puzzled, during discussions on deforestation, using simpler language and drawings to explain (e.g., points to a simple diagram of a forest and says, 'Deforestation means cutting down trees, which harms animals' habitats.')."]}},"competences":{"linguistic":{"grammar":["Present perfect (e.g., 'Deforestation has significantly affected biodiversity in our area.')","First and second conditional (e.g., 'If we preserve our forests, we will help reduce deforestation.' 'If people planted more trees, forests would recover faster.')","Comparatives (e.g., 'Urban ecosystems have less biodiversity compared to rural or natural habitats.')"],"vocabulary":["deforestation","biodiversity","pollution","rivers","marine life","ecosystems","plastic waste","trees","air quality","climate change","forest","conservation","landfills","recycling","forest health","logging","species","explore","change","impact","reduce","plant","improve","fight","protect","recycle","accumulate","affect","contribute","maintain","recover","healthier","increased","significant","dramatic","local","sustainable","environmental","comparative","ecological","plastic-free","illegal","approximate","accurate","dramatic","native"],"pronunciation":"Pronunciation of the long vowel sound /aɪ/ in words spelled with 'i' (e.g., 'life,' 'bio,' and 'diversity') and 'y' (e.g., 'try' and 'type'). Nouns and adjectives ending in -ate often have the ending reduced to /ɪt/ (e.g., 'climate,' 'approximate,' and 'accurate'). Word stress in multisyllabic words and compound terms, such as 'dramatic,' 'ecological,' and 'plastic-free'."},"pragmatic":"Asking about environmental impact (e.g., 'How has deforestation affected our area?'). Discussing conservation ideas (e.g., 'If we plant more trees, we can improve air quality.').","sociolinguistic":"Expressing environmental concerns politely (e.g., 'Protecting our forests benefits everyone.'). Using community-focused language (e.g., 'Together, we can make a difference in conservation.')."},"assessment":[]},{"id":3,"title":"Managing Stress in Changing Times","themes":["Breathing to Relax","Forest Bathing and Other Biohacks"],"standards":{"listening":{"general":"","specific":["Receptive: Infer opinions in a simple presentation or lecture.","Interactive: Participate in group discussions on various topics, including local and global interests."],"learning_outcomes":["Can infer and discuss opinions expressed in simple lectures on environmental topics (e.g., 'Visiting the Sendero Los Quetzales in Volcán Barú National Park helps people feel calmer and more relaxed due to the serene natural environment.').","Can participate in group discussions on global topics by sharing opinions (e.g., 'I think stress affects people's mental health by making them feel overwhelmed. Practicing mindfulness could really help reduce stress and improve focus.').","Can actively participate in group discussions on local and global topics related to managing stress and mindfulness by asking clarifying questions to understand better others' opinions (e.g., 'Why are more students practicing mindfulness these days?' 'People are practicing mindfulness to stay calm during stressful times.')."]},"reading":{"general":"","specific":["Reading: Analyze authentic non-fiction texts.","Reading: Understand the relationship between main points and examples in various texts."],"learning_outcomes":["Can compare examples from two wellness articles, evaluating how different stress-management techniques impact mental health (e.g., 'Guided meditation may work better for beginners, while mindfulness is effective for daily stress relief.').","Can understand the connections between the main points of an article on stress-relief methods and examples of their impact on mental health (e.g., 'Deep breathing exercises calm the body and mind, reducing anxiety.').","Can recognize examples that illustrate wellness practices in informational texts, using these to support personal wellness plans (e.g., 'Listening to calming music can help me focus during study sessions.')."]},"speaking":{"general":"","specific":["Productive: Describe a personal achievement.","Interactive: Engage in storytelling sessions using personal experiences."],"learning_outcomes":["Can describe personal achievements related to managing stress (e.g., 'Practicing mindfulness has helped me stay calm during stressful times.').","Can engage in storytelling by sharing personal experiences in managing stress and describing techniques like mindfulness (e.g., 'Walking in the Metropolitan Natural Park is a peaceful way to manage stress for me.').","Can answer questions about personal stress management practices, using examples to illustrate their effectiveness (e.g., 'Listening to calming music helps me focus before exams.')."]},"writing":{"general":"","specific":["Productive: Write reviews on general products or services.","Interactive: Revise classmates' essays on general topics."],"learning_outcomes":["Can write a comparative review of two wellness strategies, integrating real-life examples from local surroundings or meditation apps (e.g., 'The daily meditation app I downloaded is great, but hiking in the rainforest provides a unique sensory experience.').","Can edit classmates' essays on wellness practices, suggesting improvements and clarifying points (e.g., 'Consider explaining how breathing exercises reduce stress.').","Can revise essays by adding suggestions of stress management techniques (e.g., 'You should include how meditation helps you focus.')."]},"mediation":{"general":"","specific":["Communication: Resolve misunderstandings in group projects.","Communication: Aid in negotiating group roles."],"learning_outcomes":["Can resolve misunderstandings in group discussions about wellness practices by rephrasing statements and using gestures to guide focus (e.g., demonstrates a calming hand gesture and says, 'Mindfulness means focusing on the present moment to reduce stress.').","Can assist in assigning roles in wellness projects, ensuring that each classmate understands their responsibilities through visuals or examples (e.g., holds up a visual of relaxation techniques, and asks, 'Would you like to cover relaxation techniques?').","Can clarify group goals for wellness projects by using bilingual support and local examples (e.g., provides an infographic in both Spanish and English and explains, 'Our goal is to share ways to manage stress with the class, such as visiting Parque Natural Metropolitano for nature walks.')."]}},"competences":{"linguistic":{"grammar":["Gerunds (e.g., 'Practicing mindfulness has helped many people improve their focus and reduce stress.')","Modals for advice (e.g., 'You should try mindfulness.')","Present continuous for trends (e.g., 'People are practicing mindfulness to stay calm during stressful times.')"],"vocabulary":["breathing","relaxation","forest bathing","biohack","mindfulness","meditation","stress","wellness","nature","focus","music","exercise","retreats","techniques","practices","mind","body","balance","relief","habits","spot","practice","relax","meditate","calm","reduce","improve","benefit","promote","connect","focus","exercise","listen","try","suggest","encourage","relieve","manage","gain","participate","relaxing","mindful","deep","soothing","popular","beneficial","calming","traditional","outdoors","natural","helpful","wellness-focused","effective","stress-free","peaceful","serene","stressful","sensory","overwhelmed"],"pronunciation":"Practice the pronunciation of the long vowel sound /u:/ in most often words spelled with 'oo' (e.g., 'soothing,' and 'smooth'). Practicing alternation of full vowels and reduced vowels in multisyllabic words (e.g., mindfulness /ˈmaɪnd.fʊl.nəs/, beneficial /ˌbɛnɪˈfɪʃəl/)."},"pragmatic":"Giving advice on stress management (e.g., 'You should try spending 10 minutes meditating in a quiet spot, such as your backyard or a park bench at Parque Omar.'). Sharing relaxation techniques (e.g., 'Listening to music helps me relax.' 'When I attend Zumba classes at the community center, I feel more energized and focused afterward.').","sociolinguistic":"Offering suggestions for stress management politely (e.g., 'You could try relaxation techniques like deep breathing.'). Sharing personal wellness strategies, using appropriate language for social interaction, including personal experiences, and respectful tone (e.g., 'In my experience, exercise helps with focus.')."},"assessment":[]},{"id":4,"title":"Preserving Our Heritage","themes":["Learning How We Take Care of Our Past","What Should We Preserve in the Future?"],"standards":{"listening":{"general":"","specific":["Receptive: Summarize detailed explanations in academic lectures.","Interactive: Participate in group discussions on literature."],"learning_outcomes":["Can summarize the main ideas in a lecture about a historical Panamanian figure (e.g., 'The speaker talked about Victoriano Lorenzo, a Panamanian hero who fought for independence. He was a symbol of resistance against foreign control.').","Can participate in discussions on literature, sharing insights from a story (e.g., 'In the story, the Emberá villages are depicted as a vital part of Panama's heritage.').","Can respond constructively to classmates' views on cultural heritage by sharing examples and asking questions to deepen the discussion (e.g., 'I agree that the Emberá weaving tradition is important. What do you think about how it's passed down to younger generations?')."]},"reading":{"general":"","specific":["Reading: Recognize the writer's point of view in various texts.","Reading: Analyze authentic non-fiction texts."],"learning_outcomes":["Can recognize a writer's point of view in texts on heritage preservation and explain their reasoning with textual evidence (e.g., 'The writer argues that historical traditions are crucial for national identity because they strengthen community pride.').","Can analyze articles on cultural heritage, identifying examples that highlight preservation efforts (e.g., 'Restoring Casco Viejo attracts tourists and promotes local culture.').","Can summarize main points and viewpoints in articles about heritage, preparing for classroom presentations (e.g., 'The author argues that preserving Casco Viejo is essential for maintaining Panama's cultural legacy and historical identity.' 'Another viewpoint emphasizes the importance of protecting indigenous traditions, such as the craftsmanship of the Guna molas, to ensure that future generations value and celebrate their cultural roots.')."]},"speaking":{"general":"","specific":["Productive: Narrate a story about personal experiences.","Interactive: Engage in storytelling sessions using personal experiences."],"learning_outcomes":["Can narrate a story about personal experiences with cultural traditions, illustrating their importance for heritage preservation (e.g., 'During Corpus Christi celebrations in La Villa de Los Santos, I watched traditional dances that showcased our folkloric heritage.').","Can engage in storytelling to describe the personal importance of heritage (e.g., 'I visited the Panama Canal, which fills me with pride because my grandfather helped with its construction.' 'I visited the Panama Canal, where my grandfather worked during its construction.').","Can explain the cultural significance of Indigenous heritage by describing traditional practices (e.g., 'The Guna people's traditional use of molas, brightly colored hand-woven textiles, is an important expression of their cultural identity and history.')."]},"writing":{"general":"","specific":["Productive: Write personal letters or emails to express opinions.","Interactive: Engage in writing exchanges about future aspirations."],"learning_outcomes":["Can write emails to peers about the importance of preserving cultural heritage, sharing personal perspectives (e.g., 'I have learned about the importance of preserving both architectural sites like Casco Viejo and traditional crafts like mola weaving.').","Can participate in writing exchanges discussing the significance of Panama's historical landmarks (e.g., 'I believe Portobelo should be preserved because it's part of our history.').","Can compose letters to local officials, expressing opinions on cultural preservation efforts (e.g., 'It's essential to protect our heritage sites for future generations.')."]},"mediation":{"general":"","specific":["Concept: Explain general concepts in simple terms.","Text: Summarize information from instructions or announcements."],"learning_outcomes":["Can explain the importance of heritage sites to classmates, using simple language and a map or image of a heritage site to emphasize cultural value (e.g., shows a timeline of restoration efforts and explains, 'Casco Viejo is important because it represents Panama's colonial past and restoration efforts.').","Can summarize instructions for a field trip to a historical site, ensuring classmates understand the objectives by using visual aids (e.g., shows a timeline of events and says, 'We'll learn about Panama's history and see how it connects to today.').","Can clarify the purpose of cultural preservation by using bilingual explanations and visuals in peer discussions (e.g., 'Preserving our heritage sites helps us remember and share our history,' with a translated summary if needed)."]}},"competences":{"linguistic":{"grammar":["Relative clauses like 'which' and 'where' (e.g., 'Casco Viejo, which is a UNESCO World Heritage Site, attracts tourists from around the world.' 'The museum where the history of the Canal Zone is explained provides a great learning experience.')","Past simple vs. present perfect (e.g., 'The Panama Canal opened in 1914.' 'The Panama Canal has attracted many tourists.')","Future simple for predictions (e.g., 'We will continue to preserve our cultural and historical heritage.')"],"vocabulary":["heritage","history","sites","tourists","culture","restoration","villages","trade routes","weaving","landmark","legacy","identity","efforts","preserve","attract","live","offer","opened","became","transformed","continue","restore","play","relevant","historical","traditional","global","critical","cultural","significant","completed","interesting","restored","colonial","pre-hispanic"],"pronunciation":"Practice the pronunciation of the long vowel sound /eɪ/ in most words spelled with 'a' + CV and 'ai' or 'ay' (e.g., 'trade,' 'became,' 'great,' 'say'). Practice the alternation of full vowels and reduced vowels in multisyllabic words (e.g., 'important': /ɪmˈpɔːtənt/, 'heritage': /ˈhɛrɪtɪdʒ/)."},"pragmatic":"Asking about cultural significance: 'Why is preserving historic landmarks like Casco Viejo or the Panama Viejo ruins important?' Describing historical sites: 'The Panama Canal opened in 1914, becoming a pivotal part of Panama's global identity and transforming global trade.'","sociolinguistic":"Discussing heritage respectfully: 'I learned so much about the Emberá community when I visited their village, and it made me realize the importance of their traditions in preserving our national identity.' Showing interest in cultural diversity: 'Hearing about traditional festivals from the Ngäbe-Buglé region made me want to participate and understand their cultural roots.'"},"assessment":[]},{"id":5,"title":"Panama's Role in the World","themes":["The Importance of Panama in Global Trade","How the Canal Impacts Panama's Future"],"standards":{"listening":{"general":"","specific":["Receptive: Evaluate spoken information from radio or television.","Interactive: Engage in role-play scenarios to resolve everyday conflicts."],"learning_outcomes":["Can comprehend and evaluate information from a news broadcast on a local issue (e.g., 'After evaluating the news broadcast, it's clear that the proposed improvements to the Panama Canal's infrastructure are designed to ease congestion and enhance global trade efficiency.').","Can role-play resolving a disagreement over environmental concerns vs. economic growth (e.g., 'What would you say if a classmate suggested prioritizing development over sustainability?').","Can use questions to confirm understanding of key ideas in media broadcasts (e.g., 'Why did the speaker mention increased funding for infrastructure improvements around the Panama Canal?')."]},"reading":{"general":"","specific":["Reading: Evaluate texts for bias.","Reading: Understand the relationship between main points and examples in various texts."],"learning_outcomes":["Can evaluate bias in texts about the Canal expansion, identifying whether the text emphasizes economic gains but downplays the impact on biodiversity (e.g., 'The text mentions job creation, but omits the effects on mangrove ecosystems.').","Can understand relationships between trade benefits and environmental concerns in Canal texts (e.g., 'While the Canal boosts trade, it also affects local ecosystems.').","Can identify examples that support or contradict the argument that the Canal's expansion has increased national revenue at the expense of water conservation (e.g., 'Some reports praise trade efficiency, while others warn about water shortages in Lake Gatun.')."]},"speaking":{"general":"","specific":["Productive: Present an analysis of a current issue, local or global.","Interactive: Conduct interviews on various topics, including current events, academic topics, and past experiences."],"learning_outcomes":["Can present an analysis of the Panama Canal's impact during the 2023 drought to explain decisions (e.g., 'New regulations were imposed to limit the number of daily crossings to conserve water.').","Can conduct interviews on global trade topics, asking about the Canal's effects on trade (e.g., 'How has the Panama Canal impacted global trade?' 'If Panama had not built the Canal, global trade would have faced significant challenges in the early 20th century.').","Can summarize responses from interviews, focusing on the economic impact of the Canal (e.g., 'It was explained that without the Panama Canal, shipping would have been slower and more costly.')."]},"writing":{"general":"","specific":["Productive: Write analytical reports on current topics like social trends or global events.","Interactive: Produce a collaborative story on local or global interest topics."],"learning_outcomes":["Can write analytical reports on the Panama Canal's effects, comparing revenue statistics and environmental findings (e.g., 'Since the expansion, the Canal has increased annual profits by three billion dollars but has also reduced water levels in surrounding lakes.').","Can collaborate on writing a story about Panama's global impact, discussing its role in trade (e.g., 'Panama has always played an important role in global trade, thanks to the Panama Canal. If Panama invested more in its infrastructure, it could become an even more powerful trade hub in the future.').","Can work with classmates to outline a report on Panama's trade role, discussing key aspects like economic growth (e.g., 'Let's include sections on shipping routes and local job creation.')."]},"mediation":{"general":"","specific":["Text: Paraphrase articles and texts for clearer understanding.","Communication: Aid in negotiating group roles."],"learning_outcomes":["Can paraphrase articles on the Panama Canal's impact on international trade, using visuals like a map comparing shipping routes through the Canal vs. around Cape Horn (e.g., 'The map shows that using the Canal saves two weeks of travel time for ships.').","Can help negotiate roles in group projects on global trade, using gestures and encouraging eye contact to keep focus (e.g., 'Would you like to focus on the economic or environmental aspects of the Canal?').","Can clarify main ideas in trade-related texts for group work, using visuals like pie charts to illustrate key concepts (e.g., 'Our project will cover how the Canal influences trade and local jobs.')."]}},"competences":{"linguistic":{"grammar":["Passive voice (e.g., 'The Canal has been managed by the Panama Canal Authority since 1999.')","Second and third conditionals (e.g., 'If Panama had not built the Canal, global trade would have faced significant challenges in the early 20th century.')","Present Perfect Continuous (e.g., 'The Canal has been improving global trade, but it has also been causing environmental concerns.')"],"vocabulary":["Panama Canal","operation","traffic","congestion","routes","shipping","trade","infrastructure","efficiency","costs","delays","government","investments","environmental groups","ecosystems","authority","global relationships","influence","construction","future","operate","manage","monitor","prevent","invest","enhance","raise concerns","affect","complete","speculate","improve","face","delay","impact","influence","navigate","control","oversee","transport","adjust","global","expensive","efficient","long-term","environmental","local","impactful","sustainable","monitored","influential","completed","significant","costly","delayed","congested","speculative"],"pronunciation":"Practice the pronunciation of the long vowel sound /oʊ/, which is spelled 'o' alone or 'oa' + consonant or 'ow' (e.g., 'global,' 'local,' 'boat,' and 'show'). Practice the alternation of full vowels and reduced vowels in multisyllabic words (e.g., 'environmental' /ɪnˌvaɪrənˈmɛntəl/ and 'impactful' /ɪmˈpæktfʊl/)."},"pragmatic":"Discussing the canal's impact (e.g., 'How has the Panama Canal been impacting global trade over the past few decades?'). Expressing hypothetical ideas (e.g., 'If Panama had not built the Canal, global trade would have faced significant challenges in the early 20th century.').","sociolinguistic":"Talking about Panama's impact on trade respectfully (e.g., 'The Canal supports global commerce.'). Using specific trade-related terms appropriately according to the social or academic context (e.g., 'The Panama Canal is vital for international shipping.')."},"assessment":[]},{"id":6,"title":"Entrepreneurial Spirit","themes":["How to Market a Business Idea","My Genius Innovations"],"standards":{"listening":{"general":"","specific":["Receptive: Interpret instructions for more complex technology like using an application or a computer program.","Interactive: Respond to questions and arguments in debates."],"learning_outcomes":["Can interpret instructions on using a computer program to present an original innovation (e.g., explains the steps for creating a presentation, such as: 'selecting a template layout, organizing key features on each slide, and adding images of the invention').","Can respond to classmates' questions during a debate on whether Panamanian businesses should rely on automated customer service (e.g., 'I think chatbots make communication more efficient, but they lack the human touch that customers expect.').","Can ask for clarification when debating complex topics, like technology's impact on privacy (e.g., 'What do you mean by 'data security'?')."]},"reading":{"general":"","specific":["Reading: Comprehend detailed technical instructions.","Reading: Evaluate texts for bias."],"learning_outcomes":["Can comprehend detailed instructions on launching a business, identifying key steps in planning (e.g., 'The guide recommends conducting market research before launching a product.').","Can evaluate bias and perspectives in articles about marketing strategies and use this information to respond to classmates' questions during a debate on how Panamanian entrepreneurs should promote their business ideas (e.g., 'One article has emphasized influencer marketing as a key strategy but has ignored its cost and limited reach in local markets. I think small businesses should also consider community-based strategies that build trust.')","Can summarize steps in technical instructions, preparing an outline for classmates (e.g., 'First, brainstorm and create a solid business idea that meets a market need. Next, draft a detailed business plan outlining goals, target audience, and financial projections. Afterward, register the business with the corresponding government entities. Finally, secure financing from banks or investors.')."]},"speaking":{"general":"","specific":["Productive: Give a speech on an academic topic.","Interactive: Collaborate in developing plans for group activities."],"learning_outcomes":["Can give a speech on innovations, providing examples to support ideas (e.g., 'Businesses have started using renewable energy to cut costs and attract eco-conscious customers.').","Can collaborate on planning a business idea to discuss potential outcomes (e.g., 'If we advertise on social media, we might reach more customers.').","Can lead discussions to share plans for ideas and evaluate others' ideas (e.g., 'I think launching an app could enhance customer engagement.')."]},"writing":{"general":"","specific":["Productive: Write reviews on general products or services.","Interactive: Collaborate on creating guidelines for group work."],"learning_outcomes":["Can write reviews of business innovations and ideas, evaluating their benefits for efficiency (e.g., 'This app helps track sales, which can improve customer service.').","Can collaborate on creating business guidelines identifying product marketing strategies (e.g., 'Our guidelines should suggest social media advertising to attract customers.').","Can develop a collaborative guide for planning a business, assigning sections to each team member (e.g., 'I'll be analyzing the market trends, and you will be preparing the social media campaigns.')."]},"mediation":{"general":"","specific":["Concept: Simplify explanations of common phenomena.","Communication: Resolve misunderstandings in group projects."],"learning_outcomes":["Can simplify explanations of business concepts for classmates using hand gestures or examples (e.g., 'Marketing is like making a movie trailer; it's designed to grab people's attention while showing a sample video ad.').","Can resolve misunderstandings in group discussions on business plans by rephrasing ideas and using simple visual examples (e.g., points to survey questions as an example, and says, 'Market research means finding out what people want to buy.').","Can clarify tasks in group projects on entrepreneurship by using a checklist to make sure everyone understands their part (e.g., 'We need to describe our product and explain why people will want it.')."]}},"competences":{"linguistic":{"grammar":["First conditional (e.g., 'If we advertise on social media, we might reach more customers.')","Present perfect for innovations (e.g., 'Local shops have begun using social media to tell more people about their products.')","Future continuous (e.g., 'I'll be analyzing the market trends.')"],"vocabulary":["innovation","business","strategy","marketing","customer base","automation","efficiency","costs","advances","technology","app","engagement","demand","product line","promotional events","visibility","success","collaboration","entrepreneur","target","vision","mission","objective","implement","increase","improve","reduce","develop","enhance","streamline","launch","collaborate","host","promote","establish","automate","innovate","create","invest","engage","market","advertise","succeed","innovative","automated","efficient","unique","great","renewable","successful","strategic","potential","visible","entrepreneurial","collaborative","advanced","streamlined","customer-focused","competitive","impactful"],"pronunciation":"Practice the pronunciation of the long vowel sound /ɔː/, which is usually spelled 'o' + consonant, 'al' + consonant, or 'au'/'aw' (e.g., 'cost,' 'talk,' 'launch,' and 'law'). Practice the alternation of full vowels and reduced vowels in multisyllabic words (e.g., 'renewable' /rɪˈnuːəbl/, 'successful' /səkˈsɛsfəl/)."},"pragmatic":"Asking about business strategies (e.g., 'What strategies have increased customer engagement?'). Sharing ideas for innovation (e.g., 'If we use social media, we can reach a larger audience.').","sociolinguistic":"Using professional language for business ideas (e.g., 'This strategy could attract more customers to our project.'). Showing respect for innovative suggestions (e.g., 'Your idea adds an interesting approach.')."},"assessment":[]},{"id":7,"title":"Intelligent Robots","themes":["How Technology Changes Society","What is Artificial Intelligence?"],"standards":{"listening":{"general":"","specific":["Receptive: Interpret instructions for more complex technology like using an application or a computer program.","Interactive: Facilitate discussions on future career paths."],"learning_outcomes":["Can interpret and explain instructions on using a professional networking site (e.g., 'Some steps include choosing a platform, creating an account, and entering your experience, such as internships in tech hubs in Panama like Ciudad del Saber.').","Can facilitate and lead a group discussion on career interests, guiding classmates to share their goals (e.g., 'What skills do you think are important for a career in technology?').","Can interpret classmates' career-related feedback during discussions on job skills (e.g., 'How would you improve your teamwork skills?')."]},"reading":{"general":"","specific":["Reading: Recognize the writer's point of view in various texts.","Reading: Comprehend detailed technical instructions."],"learning_outcomes":["Can recognize a writer's viewpoint on AI in articles, noting positive or cautious perspectives (e.g., 'The author is optimistic about AI's contribution to financial automation, such as Panama's advancements in fintech, but warns about job displacement in customer service roles.').","Can comprehend technical instructions for AI software, explaining steps to peers (e.g., 'The manual instructs users to set up an algorithm and test it with data.').","Can summarize technical details for classmates, ensuring understanding of AI concepts (e.g., 'The software learns from data inputs to improve its predictions.')."]},"speaking":{"general":"","specific":["Productive: Give a simple, prepared presentation on current events or past experiences.","Interactive: Participate in debates on issues of general interest, current or historical."],"learning_outcomes":["Can give a simple presentation about the future impact of artificial intelligence by expressing hypothetical outcomes (e.g., 'If AI continues to evolve, it might change the job market significantly.').","Can participate in debates, responding to arguments and agreeing or disagreeing with respect and clarity (e.g., 'It is agreed that AI could create jobs, but new skills may also be required.').","Can conduct interviews about AI and technology, asking open questions (e.g., 'How do you think Panama's logistics and trade industries could change with AI integration in the future?')."]},"writing":{"general":"","specific":["Productive: Develop instructions for everyday tasks.","Interactive: Revise classmates' essays on general topics."],"learning_outcomes":["Can develop step-by-step instructions for using AI tools in everyday life, using simple language for clarity (e.g., 'Open the app and select a task to get suggestions from the AI assistant.').","Can edit and revise essays on AI, ensuring clarity in descriptions of technology (e.g., 'Explain how AI assists in daily tasks like organizing schedules.').","Can provide feedback on classmates' writing about AI, suggesting examples to clarify abstract ideas (e.g., 'Add examples of AI used in customer service.')."]},"mediation":{"general":"","specific":["Communication: Resolve misunderstandings in group projects.","Communication: Aid in negotiating group roles."],"learning_outcomes":["Can resolve misunderstandings about AI's impact on society by using simple terms and gestures to explain (e.g., uses hand motions to simulate learning and says, 'AI is a technology that is programmed to learn from data and perform tasks like humans.').","Can help assign roles in group projects on AI, using visuals or quick sketches to illustrate roles based on classmates' interests (e.g., 'Would you like to focus on AI in education or in the workplace?' with icons representing each sector).","Can clarify the group's goals for projects on AI's societal impacts, ensuring each role is understood with visual aids (e.g., 'Our project will discuss how AI could change jobs and daily life,' using a timeline of technology evolution for context)."]}},"competences":{"linguistic":{"grammar":["Conditional forms (e.g., 'If AI continues to evolve, it might change the job market significantly.')","Future simple (e.g., 'AI will create new employment opportunities.')","Passive voice (e.g., 'AI systems are programmed to learn from data and perform tasks.')"],"vocabulary":["artificial intelligence","robots","technology","society","opportunities","challenges","job markets","employment","algorithms","data","software","functionality","systems","updates","improvements","careers","customer service","experiences","programming languages","guidelines","advance","evolve","revolutionize","adapt","create","enhance","personalize","integrate","prepare","learn","apply","improve","program","control","update","predict","enable","develop","establish","shift","intelligent","artificial","responsible","complex","societal","drastic","significant","evolving","future","revolutionary","personalized","controlled","passive","functional","enhanced","innovative","technological"],"pronunciation":"Practice the pronunciation of the long vowel sound /ɑː/, which is usually spelled 'o' + consonant and, in some common words, 'a' (e.g., 'robot,' 'job,' 'adopt,' and 'start'). Practice the alternation of full vowels and reduced vowels in multisyllabic words (e.g., 'innovative' /ˈɪnəvətɪv/, 'technological' /ˌtɛknəˈlɒdʒɪkəl/)."},"pragmatic":"Asking about AI's future impact (e.g., 'How will AI change the job market?'). Sharing predictions about technology (e.g., 'AI could improve efficiency in many fields.').","sociolinguistic":"Asking about technology thoughtfully (e.g., 'How might AI change jobs in Panama?'). Discussing AI's societal role sensitively (e.g., 'AI brings new possibilities but also some challenges for the future.')."},"assessment":[]},{"id":8,"title":"International English","themes":["How English Is Used in Workplaces Globally","What Communication Skills Are Important in the Workplace?"],"standards":{"listening":{"general":"","specific":["Receptive: Follow the linear structure of a short formal talk.","Interactive: Facilitate discussions on future career paths."],"learning_outcomes":["Can follow key points in a structured talk about career planning (e.g., Explain the speaker's advice on gaining experience, for example, 'He said that we should gain more experience in our field by taking on diverse projects or internships.').","Can facilitate discussions on career options, prompting classmates to share ideas on communication-related skills (e.g., 'Which industries in Panama require English fluency, and why?').","Can ask follow-up questions to encourage classmates to elaborate on career choices (e.g., 'Can you explain which skills can help you advance your career?')."]},"reading":{"general":"","specific":["Reading: Take basic notes on a text about a familiar topic.","Reading: Recognize the writer's point of view in various texts."],"learning_outcomes":["Can take introductory notes on articles about English as a global language, recording main ideas (e.g., 'English connects people from different cultures in business').","Can recognize a writer's viewpoint on the spread of English, noting arguments about its importance in international business (e.g., 'The article highlights that sectors like logistics and finance in Panama rely heavily on English for communication.').","Can summarize points from texts on English in the workplace, preparing for discussions on language learning (e.g., 'The text argues that English skills can enhance career opportunities.')."]},"speaking":{"general":"","specific":["Productive: Share future career plans and aspirations.","Interactive: Lead a discussion on various areas including academic topics or past experiences."],"learning_outcomes":["Can share future career aspirations, explaining the role English will play (e.g., 'I want to work in diplomacy, so learning English is essential.').","Can lead discussions about the role of English in global workplaces, prompting classmates to share perspectives (e.g., 'Why do you think English is important in international business?').","Can clarify classmates' points in discussions on global English, ensuring understanding (e.g., 'So, you believe English helps people connect across cultures?')."]},"writing":{"general":"","specific":["Productive: Create narratives based on hypothetical scenarios.","Interactive: Engage in writing exchanges about future aspirations."],"learning_outcomes":["Can create narratives imagining future careers, highlighting the importance of English in global settings (e.g., 'As a diplomat, I'll use English to communicate with people worldwide.').","Can participate in writing exchanges about future career goals, describing how English will be beneficial and including relevant workplace contexts and detailed examples (e.g., 'Learning English will help me communicate in an international business career by allowing me to negotiate contracts, participate in meetings, and collaborate with international partners.').","Can write letters to classmates describing aspirations, mentioning English as a key skill (e.g., 'I want to become a doctor and use English to read medical research from around the world.')."]},"mediation":{"general":"","specific":["Concept: Explain general concepts in simple terms.","Text: Summarize information from instructions or announcements."],"learning_outcomes":["Can explain the concept of English as a global language to classmates, using relatable visuals like a world map to show countries where English is spoken (e.g., 'English has become an international language, widely used in business to help people communicate.').","Can summarize instructions for an English language workshop, using gestures to highlight key session goals (e.g., points to icons of travel and work, and says, 'We'll practice English skills for work and travel situations.').","Can clarify the importance of English in international communication, using bilingual support and visuals as needed to convey the message (e.g., shows symbols of different career fields and explains, 'Knowing English can help in global careers like business and diplomacy.')."]}},"competences":{"linguistic":{"grammar":["Present perfect (e.g., 'English has become an international language, widely used in business to help people communicate.')","Modals for necessity 'must,' 'could,' 'should,' and 'can' (e.g., 'It could be a good idea to gain experience through internships.')","Indirect questions (e.g., 'Can you explain which skills can help you advance your career?')"],"vocabulary":["English","workplaces","communication","skills","fluency","resources","business","diplomacy","lingua franca","backgrounds","students","employees","courses","access","contexts","cross-cultural communication","online platforms","academic resources","global","interactions","spread","learn","practice","connect","recognize","become","access","explain","communicate","express","wonder","tell","use","enhance","explain","engage","explore","employ","global","international","dominant","relevant","necessary","important","formal","fluent","communicative","cross-cultural","recognized","linguistic","wide-ranging","accessible","vital","proficient","interactive"],"pronunciation":"Practice the pronunciation of the long vowel sound /ɛ/, which is usually spelled 'e' + consonant and sometimes 'ea' (e.g., 'relevant,' 'necessary,' with one exception: 'says,' 'said'). Practice the alternation of full vowels and reduced vowels in multisyllabic words (e.g., 'communication' /kəˌmjuːnɪˈkeɪʃən/, 'accessible' /əkˈsɛsɪbəl/)."},"pragmatic":"Asking about English's global role (e.g., 'Why has English become such an important language for international business?'). Discussing communication skills (e.g., 'Practicing English helps in cross-cultural workplaces.').","sociolinguistic":"Using formal language in workplace contexts (e.g., 'Effective communication skills help us succeed globally.'). Recognizing cross-cultural communication needs (e.g., 'It's important to adapt language for different audiences.')."},"assessment":[]}]},"Grade 12":{"level":"B1.3","scenarios":[{"id":1,"title":"Supporting Our Community","themes":["How Does the Government Support Communities?","Volunteering in Our Community"],"standards":{"listening":{"general":"","specific":["Receptive: Interpret dialogues from various social contexts.","Interactive: Highlight opinions, both positive and negative, related to an audio or video recording, during discussions."],"learning_outcomes":["Can interpret perspectives in dialogues on volunteer work (e.g., 'In Panama, volunteer programs such as disaster relief initiatives help during emergencies, but some believe the government should allocate more resources for long-term infrastructure.').","Can highlight positive and negative opinions in audio recordings about community support (e.g., 'Some community members believe we should increase support for Basura Cero initiatives, while others argue that more focus is needed on improving public transportation.').","Can ask questions to clarify viewpoints in community discussions (e.g., 'What have the local authorities been doing to improve services for residents?' 'The local authorities have been expanding public transportation.')."]},"reading":{"general":"","specific":["Reading: Analyze articles on societal trends.","Reading: Construct critical analyses of non-fiction works."],"learning_outcomes":["Can analyze articles on how government support impacts community services (e.g., 'In the article, it says that local programs are funded by the government to improve public infrastructure. This shows that public services are influenced by government priorities.').","Can construct critical analyses of non-fiction works on volunteerism (e.g., 'The article discusses how the Jóvenes Unidos program helps at-risk youth and suggests that increasing partnerships with local organizations could extend its impact.').","Can ask and answer questions on public service articles to explore civic responsibility (e.g., 'What have volunteers been doing to improve education?' 'Volunteers have been organizing programs and distributing materials to students.')."]},"speaking":{"general":"","specific":["Productive: Explain how to organize projects or events.","Interactive: Facilitate group decision-making on project planning."],"learning_outcomes":["Can explain the steps involved in how the government or local authorities support a community event (e.g., 'To organize a community event, you should first plan the route. Then, you should apply for permits and coordinate with local government officials for road closures and safety. Finally, you should collaborate with community outreach departments to promote the event.').","Can facilitate group discussions to decide on key elements for planning a community volunteer project (e.g., 'To plan the project, we should choose a cause we care about, select a date that works for everyone, and decide how to divide tasks, such as gathering supplies, creating signs, or reaching out to local organizations.').","Can respond to group questions during planning sessions (e.g., 'We have been discussing what resources are needed for the event, and it seems we still need volunteers and supplies.')."]},"writing":{"general":"","specific":["Productive: Create instructions for everyday activities.","Interactive: Write a group text on various topics, collaboratively, to be shared in a digital format."],"learning_outcomes":["Can create a pamphlet with clear instructions explaining how the government or local authorities support a community event (e.g., 'The event begins at 8:30 a.m. You should arrive at the community center by 8:00 a.m. for the Panamá Verde clean-up, which is supported by the local environmental agency. Then, check in at the registration booth.').","Can collaboratively write a group text on community issues to share online (e.g., 'The community clean-up event will be on Saturday at 10 a.m. Volunteers have been working hard to prepare for the event. Join us at the park!').","Can review and revise group writing for clarity before digital publication (e.g., 'I think the post should be checked for correct spelling and the message should be reviewed for clarity before it is shared online.')."]},"mediation":{"general":"","specific":["Text: Simplify articles for easier understanding.","Text: Paraphrase short passages in a simple fashion."],"learning_outcomes":["Can simplify articles on community support, using visuals or diagrams for main points (e.g., 'This diagram shows how Jóvenes Unidos por la Educación provides support to improve school facilities, increase resources, and create safer learning environments.').","Can paraphrase short passages on volunteer work, using gestures and simple language (e.g., 'Volunteering means helping without being paid, like when we clean the streets or help at food banks. I can show this by acting like I'm picking up trash and handing out food to people.').","Can explain complex community terms using simple definitions and examples (e.g., 'Volunteering is when people help others without expecting money, like organizing a park clean-up or helping at an animal shelter. It's about supporting the community.')."]}},"competences":{"linguistic":{"grammar":["Passive voice to explain support structures (e.g., 'Community programs are funded by the government.')","Modals for necessity (e.g., 'Individuals should contribute to community projects.')","Present perfect continuous for detailed descriptions (e.g., 'Volunteers have been working to improve community services.')"],"vocabulary":["government","programs","resources","services","responsibilities","volunteers","projects","community","influence","decision-making","public services","development","impact","participants","backgrounds","perspectives","opportunities","involvement","meetings","areas","volunteer brigade","initiative","shelter","support","fund","allocate","improve","promote","contribute","assess","address","participate","influence","dedicate","involve","lead","bring","play","take responsibility","engage","provide","develop","clean up","underserved","meaningful","positive","crucial","responsible","diverse","active","impactful","essential","appropriate","local","supportive","governmental","public","community-based","involved","collaborative","high-risk"],"pronunciation":"Practice alternating between stressed and unstressed syllables: reading words and sentences to improve rhythm and fluency (e.g., 'Community programs are funded by the government.'). Stress pattern: Com-MU-ni-ty PRO-grams are FUN-ded by the GOV-ern-ment. Focus on stressing content words: Stressing nouns, main verbs, and adjectives while reducing stress on function words, such as auxiliary verbs, prepositions, and articles."},"pragmatic":"Engaging in discussions about civic responsibilities: 'How has the local government been encouraging more people to volunteer in our community?' Explore how different communities express and value support needs through language and communication: 'Why has community involvement been important for everyone?'","sociolinguistic":"Lead collaborative discussions about volunteer projects, offering diverse solutions for community involvement."},"assessment":[]},{"id":2,"title":"My Personal Success Story","themes":["How I Am Successful","Saving for Future Goals!"],"standards":{"listening":{"general":"","specific":["Receptive: Interpret dialogues from various social contexts.","Interactive: Highlight positive and negative opinions related to an audio or video recording during discussions."],"learning_outcomes":["Can interpret dialogues about achieving personal goals, relating them to real-life examples (e.g., 'The speaker shared how a scholarship from IFARHU helped him/her achieve his/her educational goals while saving money for other priorities.').","Can highlight diverse opinions in audio stories about saving money and planning toward future goals (e.g., 'I've saved part of my allowance for a new laptop, but some of my friends find it hard to save because they spend their money on other things.').","Can ask questions to clarify ideas in success stories (e.g., 'What strategies has the speaker used to overcome challenges?' 'The speaker mentioned that he/she asked friends for support, which helped him/her stay motivated during tough times.')."]},"reading":{"general":"","specific":["Reading: Analyze opinion editorials on general interest topics.","Reading: Analyze persuasive pieces on current events."],"learning_outcomes":["Can analyze opinion pieces on personal success, identifying main arguments (e.g., 'If young adults start planning their finances early, they will build a strong foundation for future success.').","Can compare persuasive language in articles on financial and career planning, identifying different viewpoints (e.g., 'One article argues that savings should be prioritized, while another suggests investing small amounts monthly for long-term growth.').","Can discuss editorial viewpoints on success strategies (e.g., 'The author uses personal stories, such as how he/she managed his/her finances carefully and saved for future goals, to promote responsible spending.')."]},"speaking":{"general":"","specific":["Productive: Narrate a personal experience with learning a skill.","Interactive: Engage in role-plays about navigating new environments."],"learning_outcomes":["Can narrate a personal experience of learning a valuable skill (e.g., 'Learning to manage my finances has helped me save for my higher education.').","Can answer questions about skill development experiences (e.g., 'What was the most challenging part of managing finances?' 'The most challenging part of learning to manage my finances was creating a budget that I could stick to.').","Can write a reflective essay on a personal experience with saving or managing money, connecting it to future goals or aspirations (e.g., 'Learning to budget my allowance has taught me discipline and patience. If I keep saving consistently, I will be able to afford paying my university tuition next year, which will help me become more independent.')."]},"writing":{"general":"","specific":["Productive: Write reflective essays on personal experiences.","Interactive: Exchange essays for peer review on common themes."],"learning_outcomes":["Can exchange essays with classmates for feedback on personal themes (e.g., 'In Amelia's essay, she described overcoming challenges, and I suggested improving the clarity of her conclusion.').","Can write a reflective essay on a significant learning experience, relating it to future aspirations (e.g., 'Working at the local youth center has taught me leadership skills. If I continue mentoring students, I will build connections that could support my future career in social work.').","Can provide constructive peer feedback in written form (e.g., 'Your essay is well organized, but I think you could improve the introduction by adding more context.')."]},"mediation":{"general":"","specific":["Text: Summarize technical instructions clearly.","Communication: Facilitate diverse group discussions."],"learning_outcomes":["Can summarize technical instructions on budgeting and lead group activities to practice these steps (e.g., 'Let's create a group budget for a school trip. First, we list our expenses. Then, we compare costs and agree on how much each team member will contribute.').","Can facilitate group discussions on personal goals using, supportive body language to encourage engagement (e.g., nods and gestures to encourage classmates to share their future goals.).","Can clarify technical terms in English and Spanish for diverse groups (e.g., 'Budgeting means planning your money, like how you decide to save five dollars every month for your future goals.')."]}},"competences":{"linguistic":{"grammar":["Present perfect to reflect achievements (e.g., 'I have saved enough to pursue my goals.')","Future continuous to describe long-term goals (e.g., 'In five years, I will be managing my own company.')","First conditional to discuss future success (e.g., 'If I continue my studies, I will find more opportunities.')"],"vocabulary":["success","community service","goals","finances","savings","investment","career","projects","growth","initiative","network","training","achievements","opportunities","strategies","future","organization","understanding","neighborhood","impact","contest","save","complete","manage","invest","build","broaden","volunteer","pursue","participate","support","work","achieve","aspire","succeed","reflect","continue","lead","improve","contribute","initiate","successful","positive","underprivileged","professional","essential","significant","impactful","leading","career-related","financial","careful","long-term","future-oriented","trained","involved","collaborative","personal"],"pronunciation":"Practice stressing content words: Stressing nouns, main verbs, adjectives while reducing the stress on function words, such as auxiliary verbs, prepositions, and articles, to improve sentence rhythm and natural speech (e.g., 'In five years, I will be managing my own company.' Stress pattern: In FIVE YEARS, I will be MANaging my OWN COMpany. 'I have saved some money for my college studies.' Stress pattern: I have SAVED some MONey for my COLlege STUDies.). Focus on reducing stress on auxiliary verbs: Reducing stress on 'have' emphasizing key content words for natural speech."},"pragmatic":"Respectfully discussing personal achievements: 'How has volunteering helped you grow?' Engaging in conversations on goals and aspirations: 'What skills would you like to develop for your future goals?'","sociolinguistic":"Lead group discussions on saving strategies and personal goals, ensuring all voices are heard and respected."},"assessment":[]},{"id":3,"title":"Exploring Our Global Community","themes":["A Dream Trip Around the World","What Can I Learn From Other Cultures?"],"standards":{"listening":{"general":"","specific":["Receptive: Comprehend lectures on general academic subjects.","Interactive: Engage in debates on change, including local or global changes."],"learning_outcomes":["Can comprehend main ideas in academic lectures or presentations about global travel and tourism (e.g., 'The speaker explained that Machu Picchu is one of the most famous ancient sites in the world, but Chichen Itza is larger and has more well-preserved structures.').","Can participate in debates on global cultural issues, recognizing and responding to different opinions (e.g., 'Some people believe traveling sustainably is expensive, while others argue that it benefits local economies in the long run.').","Can ask questions about global changes discussed in debates (e.g., 'What ideas were the speakers sharing about how different cultures were managing tourism impacts?' 'During the debate, community leaders were explaining how they were balancing tourism with preserving their cultural heritage and natural environments.')."]},"reading":{"general":"","specific":["Reading: Evaluate informational content from various sources.","Reading: Summarize discussions from academic texts."],"learning_outcomes":["Can evaluate information from travel articles and summarize cultural learning experiences related to other countries (e.g., 'I read an article comparing the preservation efforts at the National Museum of Archaeology and Ethnology in Guatemala City and the Ixchel Museum of Indigenous Textiles and Clothing. Both emphasize the importance of preserving Mayan history and cultural identity.').","Can summarize discussions on intercultural exchange in academic texts (e.g., 'The text explained that travel promotes global understanding by exposing people to different cultures, allowing them to experience new perspectives and challenge their own assumptions.').","Can discuss insights gained from informational texts on global travel (e.g., 'The article suggests that learning a second language while traveling opens up new opportunities for communication, helps travelers understand local customs, and enhances their overall cultural experience.')."]},"speaking":{"general":"","specific":["Productive: Describe experiences from a cultural exchange.","Interactive: Conduct interviews on general interest topics."],"learning_outcomes":["Can describe cultural exchange experiences, noting specific learning points (e.g., 'On my cultural exchange, I adapted to new customs, like greeting with a kiss on the cheek and respecting local food traditions.').","Can conduct interviews to explore cultural interests and perspectives about traveling and learning from other cultures (e.g., 'If you could travel anywhere in the future, where would you go?' 'If I traveled to Paris, I would explore the history and architecture.' 'If you visited another country, which one would you choose?' 'If I visited Japan, I would experience the cherry blossom festivals, and if I went to the USA, I would explore historical landmarks like the Smithsonian museums in Washington D.C.').","Can respond to interview questions with thoughtful reflections (e.g., 'How was your trip abroad influencing your understanding of different cultures and global challenges?' 'During the trip, I was noticing cultural differences and learning about global issues, especially how climate change was affecting communities worldwide.')."]},"writing":{"general":"","specific":["Productive: Write formal and informal letters on general topics.","Interactive: Write different types of messages to coordinate group projects."],"learning_outcomes":["Can write a formal letter requesting information about a cultural exchange or travel program (e.g., 'I am writing to inquire about the requirements for your cultural travel program. Could you please provide information on the application process and schedule?').","Can write messages to coordinate logistics for a group project focused on cultural exploration (e.g., 'Hi everyone, just confirming that we'll meet at 9 a.m. on Saturday to discuss travel details. Please let me know if you have any specific preferences for the trip.').","Can write informal letters sharing cultural experiences with a friend (e.g., 'Hey! I had an amazing time in Emberá-Wounaan. I learned so much about their traditional jewelry.')."]},"mediation":{"general":"","specific":["Communication: Resolve misunderstandings in team interactions.","Communication: Assist in clear communication of plans and roles."],"learning_outcomes":["Can resolve misunderstandings by miming or gesturing roles in a group travel project (e.g., uses gestures to show who is in charge of booking transportation and who is responsible for finding accommodations).","Can clarify project plans with role cards or diagrams to show responsibilities (e.g., uses labeled visuals to show each group member's role in coordinating a cultural trip).","Can repeat and rephrase using gestures to confirm understanding in multilingual settings (e.g., signals agreement by nodding and confirms details with simple phrases)."]}},"competences":{"linguistic":{"grammar":["Second conditional for hypothetical travel experiences (e.g., 'If I could go anywhere, I would visit Egypt.')","Superlatives for comparing places (e.g., 'Paris is considered the most beautiful city in Europe.')","Past continuous to narrate past experiences (e.g., 'While traveling, I was learning new cultures.')"],"vocabulary":["travel","culture","experience","diversity","adventure","destination","trip","pyramids","beaches","mountains","world","waterfall","wonders","understanding","perspectives","skills","benefits","Exchange Program","traditions","explore","compare","travel","visit","experience","learn","enjoy","hike","encounter","enhance","develop","meet","understand","broaden","narrate","dream","reflect","gain","discover","share","breathtaking","global","romantic","natural","diverse","cultural","beautiful","unforgettable","personal","year-long","enriching","different","unique","educational","stunning","exciting","magnificent","remote","distant","traditional"],"pronunciation":"Practice alternating between stressed and unstressed syllables: focusing on vowel reduction in modal verbs like 'could' (/kəd/ or /kʊd/) and 'would' (/wəd/ or /wʊd/) (e.g., 'If I could travel around the world, I would visit Egypt.' Stress pattern: If I could TRAVel aROUND the WORLD, I would VISit EGYPT.). Practice stress on multisyllabic words: emphasizing the correct syllables in words like: 'adVENTure,' 'des-ti-NA-tion,' and 'PYR-a-mids'."},"pragmatic":"Respectfully discussing cultural differences and travel experiences: 'What is one tradition you found interesting while you were traveling?' Showing interest in classmates' stories: 'How was your experience abroad in regards to changing your perspective?'","sociolinguistic":"Lead group projects that explore cultural diversity and the personal benefits of travel, ensuring everyone has input."},"assessment":[]},{"id":4,"title":"International Communication","themes":["Introducing Panama to the World","Communicating Panama's Importance"],"standards":{"listening":{"general":"","specific":["Receptive: Follow complex instructions in unfamiliar tasks.","Interactive: Collaborate in planning multi-step projects."],"learning_outcomes":["Can follow complex instructions in planning projects that aim to introduce Panama's culture and heritage to the world (e.g., 'First, the traditional dance performers must be scheduled, then the costumes must be prepared, and finally, the cultural showcase must be presented to the international audience.').","Can collaborate and ask clarifying questions about task sequences in projects that aim to communicate Panama's national and global importance (e.g., 'When should we complete the setup phase?' 'It should be done before the morning of the event.').","Can interpret roles and tasks from recordings of international planning meetings related to promoting Panama's global relevance (e.g., 'The recording mentions that Sara will oversee logistics for the cultural exhibit, while Ana and Ivan will manage the trade presentation on the Panama Canal')."]},"reading":{"general":"","specific":["Reading: Comprehend complex narrative texts.","Reading: Analyze persuasive pieces on current events."],"learning_outcomes":["Can comprehend narratives that introduce Panama's global role, identifying main events (e.g., 'In the story, Panama's strategic position in global trade is highlighted, showing how the Panama Canal plays a crucial role in connecting oceans and facilitating international commerce.').","Can analyze persuasive elements in articles promoting Panama (e.g., 'The article uses phrases like 'Panama is a key player in global trade' and 'a vital hub for international commerce' to emphasize Panama's global importance.').","Can discuss themes of cultural pride in narratives about Panama (e.g., 'The text promotes values of sustainability and conservation, celebrating Panama's biodiversity as a source of national pride and ecological importance.')."]},"speaking":{"general":"","specific":["Productive: Present a summary of various content including products, entertainment, or recreational activities.","Interactive: Debate on topics relevant to current social trends."],"learning_outcomes":["Can summarize content that highlights Panama's cultural identity, innovations, or contributions as part of introducing the country to the world (e.g., 'It is said that Panama has been praised for its efforts in preserving biodiversity.').","Can participate in debates on issues related to Panama's national and global significance, presenting clear and well-supported arguments (e.g., 'The Panama Canal's expansion has greatly boosted global trade efficiency, which I argue strengthens Panama's position in the international economy.').","Can answer questions during a debate, defending or expanding on their argument about the importance of English proficiency to effectively communicate Panama's significance as a global trade location (e.g., 'Panama's position as a key trade hub requires clear communication in English to engage international partners and promote economic growth.')."]},"writing":{"general":"","specific":["Productive: Compose opinion essays on broad topics.","Interactive: Provide feedback on narrative writing."],"learning_outcomes":["Can compose an opinion essay on Panama's role in international relations (e.g., 'The Panama Canal strengthens global trade by reducing travel time between continents, making Panama a strategic trade partner and economic hub for international companies. Additionally, Panama's diplomatic efforts, such as hosting international summits, demonstrate its commitment to fostering cooperation and dialogue among nations.').","Can edit narrative texts for clarity and style, providing feedback to peers related to Panama's global or national significance (e.g., 'I think you can improve your story by adding more details about Panama's role in international trade.').","Can offer feedback on essays about Panama's relevance and impact, focusing on structure and argument strength (e.g., 'Your essay needs clearer topic sentences to guide the reader through your points.')."]},"mediation":{"general":"","specific":["Concept: Explain complex ideas with simple examples.","Concept: Cl
