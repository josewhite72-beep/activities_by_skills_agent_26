<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activities By Skills Agent · Admin</title>
<style>
:root {
  --navy:#0f2d4a;--teal:#00b896;--amber:#f5a623;
  --red:#e53e3e;--green:#38a169;
  --cream:#faf8f3;--text:#1a1a2e;--muted:#5a6a7a;
  --border:#dde4ed;--surface:#ffffff;
  --radius:12px;--shadow:0 4px 24px rgba(15,45,74,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
.topbar{background:var(--navy);color:white;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{width:34px;height:34px;background:var(--teal);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--navy)}
.brand-name{font-weight:700;font-size:16px}
.brand-sub{font-size:11px;opacity:.5}
.badge-admin{background:rgba(245,166,35,.2);color:var(--amber);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.main{max-width:900px;margin:0 auto;padding:24px 16px 60px}
.login-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:32px;max-width:440px;margin:60px auto;box-shadow:var(--shadow)}
.login-title{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:6px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.input-group{margin-bottom:14px}
.input-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
.input-group input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none}
.input-group input:focus{border-color:var(--teal)}
.btn-primary{width:100%;padding:13px;background:var(--navy);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:var(--navy)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;margin-top:28px}
.section-title{font-size:17px;font-weight:700;color:var(--navy)}
.btn-add{display:flex;align-items:center;gap:6px;padding:9px 16px;background:var(--teal);color:white;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
.table-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--navy);color:white;padding:10px 14px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.5px}
td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafd}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-active{background:rgba(56,161,105,.12);color:var(--green)}
.badge-inactive{background:rgba(229,62,62,.12);color:var(--red)}
.btn-action{padding:5px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid;margin-right:4px;background:transparent;transition:all .15s}
.btn-view{border-color:var(--teal);color:var(--teal)}
.btn-deactivate{border-color:var(--red);color:var(--red)}
.btn-activate{border-color:var(--green);color:var(--green)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--surface);border-radius:var(--radius);padding:28px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:20px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-cancel{padding:10px 20px;border:1.5px solid var(--border);border-radius:10px;background:transparent;cursor:pointer;font-size:14px}
.btn-save{padding:10px 20px;background:var(--teal);color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.token-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:16px;margin:16px 0;word-break:break-all;font-family:monospace;font-size:13px;color:#166534}
.token-note{font-size:12px;color:var(--muted);margin-top:8px}
.log-entry{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;display:flex;gap:12px}
.log-time{color:var(--muted);white-space:nowrap;min-width:140px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:white;padding:12px 24px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;animation:fadeUp .2s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.limit-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.script-url-bar{background:#f0f9ff;border:1.5px solid #93c5fd;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:12px;color:#1e40af;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>
<header class="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="logo">AG</div>
    <div>
      <div class="brand-name">Activities By Skills Agent</div>
      <div class="brand-sub">Desarrollado por José R. White · Panamá</div>
    </div>
  </div>
  <span class="badge-admin">⚙️ Admin Panel</span>
</header>

<div class="main" id="app"></div>

<script>
let adminKey = '';
let scriptUrl = '';
let docentes = [];

function init() {
  const savedKey = sessionStorage.getItem('admin_key');
  const savedUrl = localStorage.getItem('script_url');
  if (savedKey && savedUrl) {
    adminKey = savedKey;
    scriptUrl = savedUrl;
    loadDashboard();
  } else {
    showLogin();
  }
}

function showLogin() {
  document.getElementById('app').innerHTML = `
    <div class="login-card">
      <div class="login-title">🔐 Admin Access</div>
      <div class="login-sub">Enter your Apps Script URL and admin password.</div>
      <div class="input-group">
        <label>APPS SCRIPT URL</label>
        <input type="text" id="scriptInput" placeholder="https://script.google.com/macros/s/..."/>
      </div>
      <div class="input-group">
        <label>ADMIN PASSWORD</label>
        <input type="password" id="adminInput" placeholder="Your admin password..."/>
      </div>
      <button class="btn-primary" onclick="login()">Access Panel</button>
    </div>`;
}

async function login() {
  const url = document.getElementById('scriptInput').value.trim();
  const key = document.getElementById('adminInput').value.trim();
  if (!url || !key) { toast('⚠️ Both fields required'); return; }
  
  scriptUrl = url;
  adminKey = key;
  
  const res = await apiFetch('stats');
  if (res.error === 'No autorizado') { toast('❌ Wrong password'); return; }
  
  localStorage.setItem('script_url', url);
  sessionStorage.setItem('admin_key', key);
  loadDashboard();
}

async function loadDashboard() {
  document.getElementById('app').innerHTML = '<div class="empty">Loading...</div>';
  const [stats, docentesData] = await Promise.all([
    apiFetch('stats'),
    apiFetch('list'),
  ]);
  docentes = Array.isArray(docentesData) ? docentesData : [];
  renderDashboard(stats.error ? {} : stats);
}

function renderDashboard(stats) {
  const activos = docentes.filter(d => d.activo === true || d.activo === 'TRUE').length;
  document.getElementById('app').innerHTML = `
    <div class="script-url-bar">
      🔗 <strong>Apps Script URL</strong> — share this with no one · 
      <span style="opacity:.7;word-break:break-all">${scriptUrl.substring(0,60)}...</span>
    </div>
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-num">${docentes.length}</div><div class="stat-label">Total teachers</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--teal)">${stats.totalHoy||0}</div><div class="stat-label">Generations today</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${stats.totalMes||0}</div><div class="stat-label">This month</div></div>
    </div>
    <div class="section-header">
      <div class="section-title">👩‍🏫 Teachers</div>
      <button class="btn-add" onclick="showAddModal()">+ Add teacher</button>
    </div>
    <div class="table-wrap">
      ${docentes.length === 0 ? '<div class="empty">No teachers yet. Add the first one.</div>' : `
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Daily limit</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody>
          ${docentes.map(d => `
            <tr>
              <td><strong>${d.nombre}</strong></td>
              <td>${d.email}</td>
              <td><span class="badge ${(d.activo===true||d.activo==='TRUE') ? 'badge-active':'badge-inactive'}">
                ${(d.activo===true||d.activo==='TRUE') ? 'Active':'Inactive'}</span></td>
              <td>${d.limiteD||20}/day</td>
              <td>${d.creado ? new Date(d.creado).toLocaleDateString() : '-'}</td>
              <td>
                <button class="btn-action btn-view" onclick="viewLogs('${d.id}','${d.nombre}')">Logs</button>
                ${(d.activo===true||d.activo==='TRUE')
                  ? `<button class="btn-action btn-deactivate" onclick="toggleDocente('${d.token}',false)">Deactivate</button>`
                  : `<button class="btn-action btn-activate" onclick="toggleDocente('${d.token}',true)">Activate</button>`
                }
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`}
    </div>
    <div style="margin-top:12px;text-align:right">
      <button onclick="sessionStorage.removeItem('admin_key');showLogin();" 
        style="background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer">Sign out</button>
    </div>`;
}

function showAddModal() {
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="addModal">
      <div class="modal">
        <div class="modal-title">➕ Add teacher</div>
        <div class="input-group"><label>Full name *</label><input type="text" id="newNombre" placeholder="Ana García"/></div>
        <div class="input-group"><label>Email *</label><input type="email" id="newEmail" placeholder="ana@escuela.edu.pa"/></div>
        <div class="input-group">
          <label>Access limits</label>
          <div class="limit-inputs">
            <input type="number" id="newDiario" placeholder="Daily (default: 20)" min="1"/>
            <input type="number" id="newMensual" placeholder="Monthly (default: 200)" min="1"/>
          </div>
        </div>
        <div class="input-group"><label>Expiry date (optional)</label><input type="date" id="newExpira"/></div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal('addModal')">Cancel</button>
          <button class="btn-save" onclick="addDocente()">Create & get token</button>
        </div>
      </div>
    </div>`);
}

async function addDocente() {
  const nombre = document.getElementById('newNombre').value.trim();
  const email = document.getElementById('newEmail').value.trim();
  const limiteD = parseInt(document.getElementById('newDiario').value) || 20;
  const limiteM = parseInt(document.getElementById('newMensual').value) || 200;
  const expira = document.getElementById('newExpira').value || '';
  if (!nombre || !email) { toast('⚠️ Name and email required'); return; }

  const res = await apiFetch('create', { nombre, email, limiteD, limiteM, expira });
  if (res.error) { toast('❌ ' + res.error); return; }

  closeModal('addModal');
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="tokenModal">
      <div class="modal">
        <div class="modal-title">✅ Teacher created!</div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:8px;">
          Send this token to <strong>${nombre}</strong> via WhatsApp.
        </p>
        <div class="token-box" id="tokenText">${res.token}</div>
        <div class="token-note">⚠️ Copy it now — it won't show again.</div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="copyToken()">📋 Copy token</button>
          <button class="btn-save" onclick="closeModal('tokenModal');loadDashboard()">Done</button>
        </div>
      </div>
    </div>`);
}

function copyToken() {
  navigator.clipboard.writeText(document.getElementById('tokenText').textContent)
    .then(() => toast('✅ Token copied!'));
}

async function viewLogs(id, nombre) {
  const logs = await apiFetch('logs', null, `&id=${id}`);
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="logsModal">
      <div class="modal" style="max-width:600px;max-height:80vh;overflow-y:auto">
        <div class="modal-title">📊 ${nombre} — Logs</div>
        <div style="border:1.5px solid var(--border);border-radius:10px;overflow:hidden;max-height:350px;overflow-y:auto">
          ${!Array.isArray(logs) || logs.length === 0
            ? '<div class="empty">No activity yet</div>'
            : logs.map(l => `
              <div class="log-entry">
                <span class="log-time">${new Date(l.timestamp).toLocaleString()}</span>
                <span>Grade ${l.grade} · ${l.skill} · ${l.tokens||0} tokens</span>
              </div>`).join('')
          }
        </div>
        <div class="modal-footer"><button class="btn-save" onclick="closeModal('logsModal')">Close</button></div>
      </div>
    </div>`);
}

async function toggleDocente(token, activate) {
  const res = await apiFetch('toggle', { token, activo: activate });
  if (res.error) { toast('❌ ' + res.error); return; }
  toast(activate ? '✅ Teacher activated' : '🚫 Teacher deactivated');
  loadDashboard();
}

// FIXED: all requests use GET — no POST body
async function apiFetch(action, params, extra) {
  try {
    let url = scriptUrl + '?action=' + action + '&adminKey=' + encodeURIComponent(adminKey) + (extra || '');
    if (params) {
      for (const [k, v] of Object.entries(params)) {
        url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(v);
      }
    }
    const res = await fetch(url);
    return await res.json();
  } catch(e) {
    return { error: e.message };
  }
}

function closeModal(id) { document.getElementById(id)?.remove(); }

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

init();
</script>
</body>
</html>
