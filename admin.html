<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activities By Skills Agent · Admin</title>
<style>
:root {
  --navy: #0f2d4a; --teal: #00b896; --amber: #f5a623;
  --red: #e53e3e; --green: #38a169;
  --cream: #faf8f3; --text: #1a1a2e; --muted: #5a6a7a;
  --border: #dde4ed; --surface: #ffffff;
  --radius: 12px; --shadow: 0 4px 24px rgba(15,45,74,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

/* TOPBAR */
.topbar {
  background: var(--navy); color: white;
  padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.topbar-brand { display: flex; align-items: center; gap: 10px; }
.logo { width: 34px; height: 34px; background: var(--teal); border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px; color: var(--navy); }
.brand-name { font-weight: 700; font-size: 16px; }
.brand-sub { font-size: 11px; opacity: 0.5; }
.badge-admin { background: rgba(245,166,35,0.2); color: var(--amber);
  padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }

/* MAIN */
.main { max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }

/* LOGIN */
.login-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 32px; max-width: 400px;
  margin: 60px auto; box-shadow: var(--shadow);
}
.login-title { font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
.login-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.input-group { margin-bottom: 14px; }
.input-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
.input-group input {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 14px; outline: none;
}
.input-group input:focus { border-color: var(--teal); }
.btn-primary {
  width: 100%; padding: 13px; background: var(--navy); color: white;
  border: none; border-radius: 10px; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: opacity .2s;
}
.btn-primary:hover { opacity: 0.9; }

/* STATS BAR */
.stats-bar {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px;
}
.stat-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 16px; text-align: center;
}
.stat-num { font-size: 28px; font-weight: 700; color: var(--navy); }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* SECTION */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; margin-top: 28px;
}
.section-title { font-size: 17px; font-weight: 700; color: var(--navy); }
.btn-add {
  display: flex; align-items: center; gap: 6px;
  padding: 9px 16px; background: var(--teal); color: white;
  border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
  cursor: pointer;
}

/* TABLE */
.table-wrap { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--navy); color: white; padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8fafd; }
.badge {
  display: inline-block; padding: 3px 9px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}
.badge-active { background: rgba(56,161,105,0.12); color: var(--green); }
.badge-inactive { background: rgba(229,62,62,0.12); color: var(--red); }
.btn-action {
  padding: 5px 10px; border-radius: 7px; font-size: 11px; font-weight: 600;
  cursor: pointer; border: 1.5px solid; margin-right: 4px; background: transparent;
  transition: all .15s;
}
.btn-view { border-color: var(--teal); color: var(--teal); }
.btn-view:hover { background: rgba(0,184,150,0.1); }
.btn-deactivate { border-color: var(--red); color: var(--red); }
.btn-deactivate:hover { background: rgba(229,62,62,0.1); }
.btn-activate { border-color: var(--green); color: var(--green); }
.btn-activate:hover { background: rgba(56,161,105,0.1); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center; z-index: 200;
  padding: 16px;
}
.modal {
  background: var(--surface); border-radius: var(--radius);
  padding: 28px; width: 100%; max-width: 480px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.modal-title { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 20px; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.btn-cancel {
  padding: 10px 20px; border: 1.5px solid var(--border);
  border-radius: 10px; background: transparent; cursor: pointer; font-size: 14px;
}
.btn-save {
  padding: 10px 20px; background: var(--teal); color: white;
  border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
}

/* TOKEN DISPLAY */
.token-box {
  background: #f0fdf4; border: 1.5px solid #86efac;
  border-radius: 10px; padding: 16px; margin: 16px 0;
  word-break: break-all; font-family: monospace; font-size: 13px;
  color: #166534;
}
.token-note { font-size: 12px; color: var(--muted); margin-top: 8px; }

/* LOGS */
.log-entry {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  font-size: 12px; display: flex; gap: 12px; align-items: flex-start;
}
.log-time { color: var(--muted); white-space: nowrap; min-width: 140px; }
.log-detail { color: var(--text); }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--navy); color: white; padding: 12px 24px;
  border-radius: 20px; font-size: 13px; font-weight: 600;
  z-index: 300; animation: fadeUp .2s ease-out;
}
@keyframes fadeUp { from { opacity:0; transform: translateX(-50%) translateY(10px); } }

.empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
.limit-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <div class="logo">AG</div>
    <div>
      <div class="brand-name">Activities By Skills Agent</div>
      <div class="brand-sub">Desarrollado por José R. White · Panamá</div>
    </div>
  </div>
  <span class="badge-admin">⚙️ Admin Panel</span>
</header>

<div class="main" id="app">
  <!-- Rendered by JS -->
</div>

<script>
let adminKey = '';
let docentes = [];

// ── INIT ──────────────────────────────────────────────
function init() {
  const saved = sessionStorage.getItem('admin_key');
  if (saved) { adminKey = saved; loadDashboard(); }
  else showLogin();
}

// ── LOGIN ─────────────────────────────────────────────
function showLogin() {
  document.getElementById('app').innerHTML = `
    <div class="login-card">
      <div class="login-title">🔐 Admin Access</div>
      <div class="login-sub">Enter your admin secret to continue.</div>
      <div class="input-group">
        <label>ADMIN SECRET</label>
        <input type="password" id="adminInput" placeholder="Your admin secret..."
          onkeydown="if(event.key==='Enter') login()"
          oninput="document.getElementById('btnLogin').disabled = this.value.length < 4"
        />
      </div>
      <button class="btn-primary" id="btnLogin" onclick="login()" disabled>
        Access Panel
      </button>
    </div>`;
}

async function login() {
  const key = document.getElementById('adminInput').value.trim();
  if (!key) return;
  adminKey = key;
  sessionStorage.setItem('admin_key', key);
  loadDashboard();
}

// ── DASHBOARD ─────────────────────────────────────────
async function loadDashboard() {
  document.getElementById('app').innerHTML = '<div class="empty">Loading...</div>';
  const docentesData = await apiFetch('/api/admin/docentes', 'GET');
  if (docentesData.status === 403) {
    sessionStorage.removeItem('admin_key');
    adminKey = '';
    toast('❌ Invalid admin secret');
    showLogin();
    return;
  }
  const stats = await apiFetch('/api/admin/stats', 'GET');
  docentes = Array.isArray(docentesData) ? docentesData : [];
  renderDashboard(stats.error ? {} : stats);
}

function renderDashboard(stats) {
  const activos = docentes.filter(d => d.activo !== false).length;
  document.getElementById('app').innerHTML = `
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-num">${docentes.length}</div>
        <div class="stat-label">Total teachers</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--teal)">${stats.totalHoy || 0}</div>
        <div class="stat-label">Generations today</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--amber)">${stats.totalMes || 0}</div>
        <div class="stat-label">This month</div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">👩‍🏫 Teachers</div>
      <button class="btn-add" onclick="showAddModal()">+ Add teacher</button>
    </div>

    <div class="table-wrap">
      ${docentes.length === 0 ? '<div class="empty">No teachers yet. Add the first one.</div>' : `
       <table>
        <thead>
           <tr>
            <th>Name</th><th>Email</th><th>Status</th>
            <th>Daily limit</th><th>Created</th><th>Actions</th>
           </tr>
        </thead>
        <tbody>
          ${docentes.map(d => `
             <tr>
              <td><strong>${d.nombre}</strong></td>
              <td>${d.email}</td>
              <td><span class="badge ${d.activo !== false ? 'badge-active' : 'badge-inactive'}">
                ${d.activo !== false ? 'Active' : 'Inactive'}
              </span></td>
              <td>${d.limites?.diario ?? 20}/day</td>
              <td>${d.creado ? new Date(d.creado).toLocaleDateString() : '-'}</td>
              <td>
                <button class="btn-action btn-view" onclick="viewDocente('${d.token}')">Logs</button>
                ${d.activo !== false
                  ? `<button class="btn-action btn-deactivate" onclick="toggleDocente('${d.token}', false)">Deactivate</button>`
                  : `<button class="btn-action btn-activate" onclick="toggleDocente('${d.token}', true)">Activate</button>`
                }
              </td>
             </tr>
          `).join('')}
        </tbody>
       </table>`}
    </div>

    <div style="margin-top:12px; text-align:right;">
      <button onclick="sessionStorage.removeItem('admin_key'); showLogin();" 
        style="background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;">
        Sign out
      </button>
    </div>
  `;
}

// ── ADD TEACHER MODAL ─────────────────────────────────
function showAddModal() {
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="addModal">
      <div class="modal">
        <div class="modal-title">➕ Add teacher</div>
        <div class="input-group">
          <label>Full name *</label>
          <input type="text" id="newNombre" placeholder="Ana García"/>
        </div>
        <div class="input-group">
          <label>Email *</label>
          <input type="email" id="newEmail" placeholder="ana@escuela.edu.pa"/>
        </div>
        <div class="input-group">
          <label>Access limits</label>
          <div class="limit-inputs">
            <input type="number" id="newDiario" placeholder="Daily (default: 20)" min="1" max="200"/>
            <input type="number" id="newMensual" placeholder="Monthly (default: 200)" min="1" max="2000"/>
          </div>
        </div>
        <div class="input-group">
          <label>Expiry date (optional)</label>
          <input type="date" id="newExpira"/>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal('addModal')">Cancel</button>
          <button class="btn-save" onclick="addDocente()">Create & get token</button>
        </div>
      </div>
    </div>`);
}

async function addDocente() {
  const nombre = document.getElementById('newNombre').value.trim();
  const email = document.getElementById('newEmail').value.trim();
  const diario = parseInt(document.getElementById('newDiario').value) || 20;
  const mensual = parseInt(document.getElementById('newMensual').value) || 200;
  const expira = document.getElementById('newExpira').value || null;

  if (!nombre || !email) { toast('⚠️ Name and email required'); return; }

  const res = await apiFetch('/api/admin/docentes', 'POST', { 
    nombre, 
    email, 
    limites: { diario, mensual }, 
    expira 
  });

  if (res.error) { toast('❌ ' + res.error); return; }

  const token = res.token;
  if (!token) { toast('❌ Error: no se recibió token'); return; }

  closeModal('addModal');

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="tokenModal">
      <div class="modal">
        <div class="modal-title">✅ Teacher created!</div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:8px;">
          Send this token to <strong>${nombre}</strong> via WhatsApp or email.
          They paste it once in the app.
        </p>
        <div class="token-box" id="tokenText">${token}</div>
        <div class="token-note">⚠️ Copy it now — you won't see it again in this panel.</div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="copyToken()">📋 Copy token</button>
          <button class="btn-save" onclick="closeModal('tokenModal'); loadDashboard();">Done</button>
        </div>
      </div>
    </div>`);
}

function copyToken() {
  const t = document.getElementById('tokenText').textContent;
  navigator.clipboard.writeText(t).then(() => toast('✅ Token copied!'));
}

// ── VIEW LOGS ─────────────────────────────────────────
async function viewDocente(token) {
  const d = docentes.find(x => x.token === token);
  if (!d) return;
  const logs = await apiFetch(`/api/admin/logs/${d.id}`, 'GET');

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="logsModal">
      <div class="modal" style="max-width:600px;max-height:80vh;overflow-y:auto;">
        <div class="modal-title">📊 ${d.nombre} — Activity logs</div>
        <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">
          Today: <strong>${logs.diario?.[today()] || 0}</strong> ·
          This month: <strong>${logs.mensual?.[month()] || 0}</strong> ·
          Limit: ${d.limites?.diario ?? 20}/day
        </p>
        <div style="border:1.5px solid var(--border);border-radius:10px;overflow:hidden;max-height:300px;overflow-y:auto;">
          ${!logs.logs || logs.logs.length === 0
            ? '<div class="empty">No activity yet</div>'
            : [...logs.logs].reverse().map(l => `
              <div class="log-entry">
                <span class="log-time">${new Date(l.timestamp).toLocaleString()}</span>
                <span class="log-detail">Grade ${l.grade} · ${l.skill} · ${l.tokens || 0} tokens</span>
              </div>`).join('')
          }
        </div>
        <div class="modal-footer">
          <button class="btn-save" onclick="closeModal('logsModal')">Close</button>
        </div>
      </div>
    </div>`);
}

// ── TOGGLE ACTIVE ─────────────────────────────────────
async function toggleDocente(token, activate) {
  const res = await apiFetch(`/api/admin/docentes/${token}`, 'PATCH', { activo: activate });
  if (res.error) { toast('❌ ' + res.error); return; }
  toast(activate ? '✅ Teacher activated' : '🚫 Teacher deactivated');
  loadDashboard();
}

// ── HELPERS ───────────────────────────────────────────
async function apiFetch(path, method, body) {
  try {
    const options = {
      method: method,
      headers: {
        'Content-Type': 'application/json',
        'x-admin-key': adminKey || sessionStorage.getItem('admin_key') || '',
      },
    };
    if (body) options.body = JSON.stringify(body);

    const res = await fetch(path, options);
    let data;
    try {
      data = await res.json();
    } catch (e) {
      const text = await res.text();
      console.error('Non-JSON response:', text);
      return { error: `Servidor devolvió: ${text.substring(0, 100)}`, status: res.status };
    }
    return { ...data, status: res.status };
  } catch (e) {
    return { error: e.message };
  }
}

function closeModal(id) {
  document.getElementById(id)?.remove();
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function today() { return new Date().toISOString().split('T')[0]; }
function month() { return today().substring(0, 7); }

init();
</script>
</body>
</html>
